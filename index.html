<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Grid — Gestion de business UEFN</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Cdefs%3E%3ClinearGradient%20id%3D%22a%22%20x1%3D%220%22%20y1%3D%220%22%20x2%3D%220%22%20y2%3D%221%22%3E%3Cstop%20offset%3D%220%22%20stop-color%3D%22%2345C6FF%22/%3E%3Cstop%20offset%3D%221%22%20stop-color%3D%22%230A6BF2%22/%3E%3C/linearGradient%3E%3CradialGradient%20id%3D%22b%22%20cx%3D%2250%25%22%20cy%3D%2240%25%22%20r%3D%2264%25%22%3E%3Cstop%20offset%3D%220%22%20stop-color%3D%22%23F0FCFF%22/%3E%3Cstop%20offset%3D%22.5%22%20stop-color%3D%22%237BDBFF%22/%3E%3Cstop%20offset%3D%221%22%20stop-color%3D%22%2331ABFF%22/%3E%3C/radialGradient%3E%3CclipPath%20id%3D%22c%22%3E%3Crect%20x%3D%223%22%20y%3D%223%22%20width%3D%2294%22%20height%3D%2294%22%20rx%3D%2226%22/%3E%3C/clipPath%3E%3C/defs%3E%3Cg%20clip-path%3D%22url%28%23c%29%22%3E%3Crect%20x%3D%223%22%20y%3D%223%22%20width%3D%2294%22%20height%3D%2294%22%20fill%3D%22url%28%23a%29%22/%3E%3Cellipse%20cx%3D%2250%22%20cy%3D%2274%22%20rx%3D%2243%22%20ry%3D%2243%22%20fill%3D%22url%28%23b%29%22/%3E%3Cellipse%20cx%3D%2239%22%20cy%3D%2267%22%20rx%3D%227%22%20ry%3D%2210%22%20fill%3D%22%23F4FCFF%22/%3E%3Cellipse%20cx%3D%2261%22%20cy%3D%2263%22%20rx%3D%227.4%22%20ry%3D%2210.7%22%20fill%3D%22%23F4FCFF%22/%3E%3C/g%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Familjen+Grotesk:wght@400;500;600;700&family=Inter+Tight:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#EDEEF0;
  --glow:#FFFFFF;
  --card:#FFFFFF;
  --ink:#15171C;
  --muted:#8C919B;
  --dim:#4A4F59;
  --hair:#E4E6EA;
  --track:#E6E8EC;
  --hover:#F5F6F8;
  --soft:#F7F8FA;
  --key:#F2F3F5;
  --field:#FCFCFD;
  --amber:#FFC42E;
  --amber-soft:#FFF3D0;
  --mint:#4FBF8B;
  --coral:#F0655A;
  --glass:rgba(255,255,255,.46);
  --glass-hi:rgba(255,255,255,.80);
  --glass-pop:rgba(255,255,255,.74);
  --glass-rim:rgba(255,255,255,.72);
  --glass-top:rgba(255,255,255,.65);
  --glass-blur:blur(24px) saturate(180%);
  --btn-hi:#4EABFF;
  --btn-lo:#0B69F0;
  --btn-halo:rgba(45,145,255,.42);
  --r:18px;
  --shadow:0 1px 2px rgba(20,23,30,.04), 0 8px 24px rgba(20,23,30,.06);
  --shadow-lift:0 2px 4px rgba(20,23,30,.05), 0 18px 48px rgba(20,23,30,.10);
  --shadow-pop:0 2px 6px rgba(20,23,30,.05), 0 24px 60px rgba(20,23,30,.16);
  --display:'Familjen Grotesk',system-ui,sans-serif;
  --body:'Inter Tight',system-ui,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
}
[data-theme="dark"]{
  --paper:#0F1115;
  --glow:#1B1F27;
  --card:#171A20;
  --ink:#EDEFF2;
  --muted:#7C838E;
  --dim:#AAB1BB;
  --hair:#252932;
  --track:#20242C;
  --hover:#1E222A;
  --soft:#1B1F26;
  --key:#20242C;
  --field:#13161B;
  --amber-soft:#3A2F14;
  --glass:rgba(255,255,255,.055);
  --glass-hi:rgba(255,255,255,.115);
  --glass-pop:rgba(26,30,38,.72);
  --glass-rim:rgba(255,255,255,.10);
  --glass-top:rgba(255,255,255,.10);
  --btn-halo:rgba(45,145,255,.34);
  --shadow:0 1px 2px rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.35);
  --shadow-lift:0 2px 4px rgba(0,0,0,.45), 0 18px 48px rgba(0,0,0,.5);
  --shadow-pop:0 2px 6px rgba(0,0,0,.5), 0 24px 60px rgba(0,0,0,.6);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:
    radial-gradient(1200px 600px at 70% -10%, var(--glow) 0%, transparent 60%),
    var(--paper);
  color:var(--ink);
  font-family:var(--body);
  -webkit-font-smoothing:antialiased;
  transition:background-color .35s ease, color .35s ease;
}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
:focus-visible{outline:2px solid var(--ink);outline-offset:2px;border-radius:6px}
input{font:inherit}


/* ---------- La bulle ---------- */
:root{
  --blob-1:#F2FCFF;   /* coeur */
  --blob-2:#7BDBFF;   /* corps */
  --blob-3:#2AA4FF;   /* bord  */
  --blob-eye:#F6FDFF;
}
.blob{display:block;overflow:visible}
.blob .body{transform-box:fill-box;transform-origin:center;animation:breathe 4.2s ease-in-out infinite}
@keyframes breathe{
  0%,100%{transform:scale(1,1)}
  50%{transform:scale(1.035,.965)}
}
.blob .eye,.blob .lid,.blob .mood{transform-box:fill-box;transform-origin:center}
.blob .eye{transition:transform .5s cubic-bezier(.22,.8,.3,1)}
.blob .lid{transition:transform .1s ease}
.blob .mood{transition:transform .3s cubic-bezier(.34,1.5,.5,1)}
.blob .e-open,.blob .e-arc{transition:opacity .16s ease}
.blob .e-arc{opacity:0;fill:none;stroke:var(--blob-eye);stroke-width:4.6;stroke-linecap:round}
.blob .e-open{fill:var(--blob-eye)}

/* clignement */
.blob.blink .lid{transform:scaleY(.06)}

/* expressions */
.blob.ex-happy .e-open{opacity:0}
.blob.ex-happy .e-arc{opacity:1}
.blob.ex-squint .mood{transform:scaleY(.42)}
.blob.ex-wow .mood{transform:scale(1.22)}
.blob.ex-think .mood{transform:scaleY(.8)}
.blob.ex-sleep .lid{transform:scaleY(.16)}
.blob.ex-curious .eye-r .mood{transform:scale(1.18)}
.blob.ex-curious .eye-l .mood{transform:scale(.88)}
.blob.bounce .body{animation:blobBounce .55s cubic-bezier(.34,1.5,.5,1)}
@keyframes blobBounce{
  0%{transform:scale(1,1)} 28%{transform:scale(1.16,.84)}
  55%{transform:scale(.92,1.1)} 78%{transform:scale(1.05,.96)} 100%{transform:scale(1,1)}
}


/* ---------- Barre de demande ---------- */
.ask{
  position:absolute;top:calc(100% + 11px);left:-10px;z-index:30;width:318px;
  opacity:0;transform:translateY(-8px) scale(.96);transform-origin:26px -8px;pointer-events:none;
  transition:opacity .2s ease,transform .3s cubic-bezier(.34,1.3,.5,1);
}
.ask.on{opacity:1;transform:none;pointer-events:auto}
.ask-bar{
  display:flex;align-items:center;gap:10px;border-radius:16px;
  background:var(--glass-pop);-webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);
  box-shadow:inset 0 0 0 1px var(--glass-rim), inset 0 1px 0 var(--glass-top), var(--shadow-pop);
  padding:0 12px 0 14px;height:46px;
}
.ask-bar > svg{color:var(--muted);flex:none}
.ask-bar input{flex:1;min-width:0;border:none;background:none;outline:none;color:var(--ink);font-size:13.5px;padding:0}
.ask-bar input::placeholder{color:var(--muted)}
.kbd{font-family:var(--mono);font-size:9.5px;color:var(--muted);background:var(--key);border-radius:6px;padding:3px 5px;flex:none}
.ask-list{
  margin-top:8px;border-radius:16px;padding:7px;
  background:var(--glass-pop);-webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);
  box-shadow:inset 0 0 0 1px var(--glass-rim), inset 0 1px 0 var(--glass-top), var(--shadow-pop);
  max-height:238px;overflow:auto;scrollbar-width:none;
}
.ask-list::-webkit-scrollbar{display:none}
.ask-row{
  display:flex;align-items:center;gap:10px;width:100%;
  padding:10px 11px;border-radius:11px;
  font-size:13px;color:var(--dim);text-align:left;
  transition:background .14s,color .14s;
}
.ask-row .go{margin-left:auto;color:var(--muted);opacity:.7;flex:none}
.ask-row.cursor{background:var(--hover);color:var(--ink)}
.ask-row.done{color:var(--muted);opacity:.6}
.ask-none{padding:14px 11px;font-size:12.5px;color:var(--muted);line-height:1.5}

/* ---------- Lancement : la grille devient la bulle ---------- */
.boot-blob{
  width:92px;height:92px;
  transition:width .7s cubic-bezier(.34,1.35,.5,1),
             height .7s cubic-bezier(.34,1.35,.5,1),
             transform .3s cubic-bezier(.34,1.4,.5,1);
}
#boot.gate .boot-blob{
  width:164px;height:164px;cursor:pointer;
  border-radius:50%;
}
#boot.gate .boot-blob:hover{transform:scale(1.05)}
#boot.gate .boot-blob:active{transform:scale(.97)}
#boot.gate .boot-blob:focus-visible{outline:none;filter:drop-shadow(0 0 14px rgba(58,150,255,.75))}
.boot-foot{display:grid;place-items:center;min-height:34px;margin-top:-4px}
.boot-foot > *{grid-area:1/1}
.boot-load{display:flex;flex-direction:column;align-items:center;gap:13px;transition:opacity .3s ease}
#boot.gate .boot-load{opacity:0;pointer-events:none}
.boot-cta{
  opacity:0;pointer-events:none;transition:opacity .45s ease .25s;
  font-size:12px;color:var(--muted);letter-spacing:.02em;
  padding:9px 18px;border-radius:99px;box-shadow:inset 0 0 0 1px var(--hair);
}
#boot.gate .boot-cta{opacity:1;pointer-events:auto;animation:ctaPulse 2.8s ease-in-out infinite}
.boot-cta:hover{color:var(--ink);box-shadow:inset 0 0 0 1px var(--ink)}
@keyframes ctaPulse{0%,100%{opacity:1}50%{opacity:.5}}


/* Grid parle par la couleur */
.blob stop{transition:stop-color .5s ease}
.blob .body > path{transition:fill .5s ease}
.blob.tone-green {--blob-1:#F0FFF7;--blob-2:#6FE3AC;--blob-3:#12A05C;--blob-eye:#F4FFFA}
.blob.tone-orange{--blob-1:#FFF8EE;--blob-2:#FFC486;--blob-3:#F07C1E;--blob-eye:#FFFAF3}
.blob.tone-orange .body{animation:breathe 1.1s ease-in-out infinite}
.blob.tone-red   {--blob-1:#FFF3F2;--blob-2:#FFA79E;--blob-3:#E03A2B;--blob-eye:#FFF7F6}
.blob.tone-red .body{animation:breathe .95s ease-in-out infinite}
.blob.tone-purple{--blob-1:#F8F3FF;--blob-2:#C0A4FF;--blob-3:#6635DF;--blob-eye:#FBF8FF}
.blob.ex-shut .lid{transform:scaleY(.05)}


/* Il dort : les Z montent. Par défaut ils n'existent pas. */
.blob .zzz{opacity:0;pointer-events:none;transition:opacity .5s ease}
.blob.night.ex-sleep .zzz{opacity:1}
.blob .zzz text{
  font-family:var(--display);font-weight:600;fill:var(--blob-3);
  transform-box:fill-box;transform-origin:center;
  animation:zzz 3.4s ease-in-out infinite;
}
.blob .zzz text:nth-child(2){animation-delay:1.1s}
.blob .zzz text:nth-child(3){animation-delay:2.2s}
@keyframes zzz{
  0%{opacity:0;transform:translate(0,4px) scale(.7)}
  30%{opacity:.9;transform:none}
  70%{opacity:.55;transform:translate(-3px,-9px) scale(1.05)}
  100%{opacity:0;transform:translate(-6px,-16px) scale(1.15)}
}

@keyframes pulseDot{0%,100%{transform:scale(1)}50%{transform:scale(1.35)}}

.skill{display:flex;align-items:center;gap:10px;width:100%;text-align:left;
  padding:9px 10px;border-radius:11px;font-size:12.5px;color:var(--dim);transition:background .14s,color .14s}
.skill{cursor:default}
.skill .ex{margin-left:auto;flex:none;font-family:var(--mono);font-size:9px;color:var(--muted);
  background:var(--key);border-radius:6px;padding:3px 6px;max-width:132px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.skill i{width:5px;height:5px;border-radius:50%;flex:none;background:var(--sk-c)}
.ask-sec{padding:9px 11px 5px;font-size:9.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted)}
.ask-prev{
  display:flex;align-items:flex-start;gap:11px;width:100%;text-align:left;
  padding:11px;border-radius:12px;background:var(--soft);
  box-shadow:inset 0 0 0 1px var(--hair);
}
.ask-prev .what{font-size:13px;color:var(--ink);font-weight:500;line-height:1.35}
.ask-prev .when{font-size:11.5px;color:var(--muted);margin-top:3px}
.ask-prev .when b{color:var(--blob-3);font-weight:600}
.ask-ans{padding:12px 11px 4px}
.ask-ans .said{font-size:13.5px;font-weight:500;line-height:1.4}
.ask-ans .none{font-size:12.5px;color:var(--muted);line-height:1.5}
.ask-ans .list{margin-top:10px;display:flex;flex-direction:column;gap:7px}
.ask-ans .list div{font-size:12.5px;color:var(--dim);display:flex;gap:8px;line-height:1.35}
.ask-ans .list b{color:var(--muted);font-family:var(--mono);font-size:9px;margin-top:3px;flex:none}
.urg{color:var(--coral);font-weight:600;margin-right:5px}
.rep{display:inline-flex;align-items:center;gap:3px}
.ask-conf{padding:12px 11px 11px;border-radius:12px;background:var(--soft);box-shadow:inset 0 0 0 1px var(--hair)}
.ask-conf .what{font-size:13.5px;font-weight:500;line-height:1.35}
.ask-conf .q{font-size:12px;color:var(--muted);margin-top:5px;line-height:1.45}
.ask-conf .acts{display:flex;gap:6px;margin-top:12px}
.ask-conf .acts button{flex:1;padding:8px;border-radius:9px;font-size:12px;font-weight:500;transition:.15s}

.ask-conf .no{background:var(--key);color:var(--dim)}
.ask-conf .no:hover{background:var(--hair);color:var(--ink)}
.ask-conf .hint{font-size:10.5px;color:var(--muted);margin-top:9px;text-align:center}
.ask-prev .ret{margin-left:auto;flex:none;font-family:var(--mono);font-size:9.5px;color:var(--muted);background:var(--key);border-radius:6px;padding:3px 6px}
.note-when{margin-left:auto;flex:none;font-size:10.5px;color:var(--muted);white-space:nowrap}
.ask-row.late .note-when{color:var(--coral)}
.ask-row .tick{width:15px;height:15px;border-radius:5px;flex:none;box-shadow:inset 0 0 0 1.5px var(--hair);display:grid;place-items:center;color:transparent;transition:.15s}
.ask-row:hover .tick,.ask-row.cursor .tick{box-shadow:inset 0 0 0 1.5px var(--mint);color:var(--mint)}

/* Le mot qu'il vous glisse quand l'heure est venue */
.nudge{
  position:absolute;top:calc(100% + 11px);left:-10px;z-index:31;width:290px;
  border-radius:16px;padding:14px;
  background:var(--glass-pop);-webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);
  box-shadow:inset 0 0 0 1px var(--glass-rim), inset 0 1px 0 var(--glass-top), var(--shadow-pop);
  opacity:0;transform:translateY(-8px) scale(.96);pointer-events:none;transform-origin:26px -8px;
  transition:opacity .2s ease,transform .3s cubic-bezier(.34,1.3,.5,1);
}
.nudge.on{opacity:1;transform:none;pointer-events:auto}
.nudge.insist{animation:insist .38s ease}
@keyframes insist{0%,100%{transform:none}20%{transform:translateX(-5px)}45%{transform:translateX(5px)}70%{transform:translateX(-2px)}}
.nudge .lab{font-size:9.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--coral)}
.nudge .txt{font-size:14px;line-height:1.4;margin:7px 0 3px;font-weight:500}
.nudge .sub{font-size:11.5px;color:var(--muted)}
.nudge .acts{display:flex;gap:6px;margin-top:13px}
.nudge .acts button{flex:1;padding:8px;border-radius:9px;font-size:12px;font-weight:500;transition:.15s}

.nudge .later{background:var(--key);color:var(--dim)}
.nudge .later:hover{background:var(--hair);color:var(--ink)}


/* ---------- Les boutons de Grid ----------
   Bleu, rond, et posé sur son propre halo : le bouton appartient au personnage. */
.gbtn{
  position:relative;
  background:linear-gradient(180deg, var(--btn-hi) 0%, var(--btn-lo) 100%);
  color:#fff;
  border-radius:99px;
  font-weight:500;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.34),
    inset 0 0 0 1px rgba(255,255,255,.14),
    0 6px 18px var(--btn-halo),
    0 0 26px var(--btn-halo);
  transition:box-shadow .25s ease, transform .16s cubic-bezier(.34,1.4,.5,1), filter .2s;
}
.gbtn:hover{
  filter:brightness(1.07);
  transform:translateY(-1px);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.4),
    inset 0 0 0 1px rgba(255,255,255,.18),
    0 9px 24px var(--btn-halo),
    0 0 40px var(--btn-halo);
}
.gbtn:active{transform:translateY(0) scale(.985);filter:brightness(.97)}
.gbtn[disabled]{opacity:.4;box-shadow:none;transform:none;filter:none;cursor:not-allowed}
.gbtn:focus-visible{outline:none;box-shadow:
  inset 0 1px 0 rgba(255,255,255,.34),
  0 0 0 3px var(--card), 0 0 0 5px var(--btn-lo), 0 0 30px var(--btn-halo)}
/* la pastille blanche du + */
.gbtn .ic{
  width:21px;height:21px;border-radius:50%;flex:none;
  background:#fff;color:var(--btn-lo);
  display:grid;place-items:center;
  box-shadow:0 1px 3px rgba(0,0,0,.14);
}



/* ---------- Grid, centré en haut ----------
   .pop-wrap est déclaré plus bas dans la feuille et impose position:relative.
   À poids égal, c'est le dernier qui gagne : il faut donc un sélecteur plus fort. */
.tabbar .grid-mid{
  position:absolute;left:50%;top:2px;bottom:16px;
  transform:translateX(-50%);
  display:flex;align-items:center;gap:7px;z-index:25;
}
.tabbar .tabs{max-width:calc(50% - 156px)}
.grid-mid .ask,.grid-mid .nudge{
  left:50%;right:auto;top:calc(100% + 8px);
  transform:translate(-50%,-8px) scale(.96);
  transform-origin:top center;
}
.grid-mid .ask.on,.grid-mid .nudge.on{transform:translate(-50%,0) scale(1)}

/* ---------- Grid en haut, au centre ---------- */
.grid-tab{
  position:relative;display:flex;align-items:center;gap:8px;
  height:34px;padding:0 13px 0 5px;border-radius:99px;color:var(--ink);
  background:var(--glass-hi);
  -webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);
  box-shadow:inset 0 0 0 1px var(--glass-rim), inset 0 1px 0 rgba(255,255,255,.9),
             0 3px 10px rgba(20,23,30,.09), 0 12px 30px rgba(20,23,30,.10);
  transition:transform .25s cubic-bezier(.34,1.4,.5,1), box-shadow .25s;
}
.grid-tab:hover{transform:translateY(-1px) scale(1.03)}
.grid-tab[aria-expanded="true"]{
  transform:scale(1.03);
  box-shadow:inset 0 0 0 1px var(--glass-rim), inset 0 1px 0 rgba(255,255,255,.9),
             0 4px 12px rgba(20,23,30,.12), 0 14px 34px rgba(20,23,30,.14), 0 0 0 3px var(--dot-soft);
}
.gt-blob{width:24px;height:24px;flex:none;display:block}
.gt-blob .blob{width:24px;height:24px}
.gt-name{font-family:var(--display);font-weight:600;font-size:12.5px;letter-spacing:.01em}

/* La pastille dit son état, sans un mot. */
.gt-dot{
  position:relative;width:7px;height:7px;border-radius:50%;flex:none;
  background:var(--dot-c);
  /* le halo : il ne clignote pas, il est simplement allumé */
  box-shadow:0 0 0 3px var(--dot-soft), 0 0 8px var(--dot-c), 0 0 17px var(--dot-soft);
  transition:background .5s ease, box-shadow .5s ease;
}
.gt-dot::after{content:"";position:absolute;inset:0;border-radius:50%;box-shadow:0 0 0 0 var(--dot-c)}
.grid-tab              {--dot-c:#37B0FF;--dot-soft:rgba(55,176,255,.34)}
.grid-tab[data-tone="green"] {--dot-c:#2BD489;--dot-soft:rgba(43,212,137,.34)}
.grid-tab[data-tone="orange"]{--dot-c:#FF9A22;--dot-soft:rgba(255,154,34,.34)}
.grid-tab[data-tone="red"]   {--dot-c:#FF5F4F;--dot-soft:rgba(255,95,79,.34)}
.grid-tab[data-tone="purple"]{--dot-c:#9C7BFF;--dot-soft:rgba(156,123,255,.34)}
/* quand il n'est pas au repos, le halo respire par-dessus */
.grid-tab:not([data-tone="blue"]) .gt-dot::after{animation:dotLive 1.5s ease-out infinite}
@keyframes dotLive{
  0%{box-shadow:0 0 0 0 var(--dot-c);opacity:.7}
  75%{box-shadow:0 0 0 7px var(--dot-c);opacity:0}
  100%{box-shadow:0 0 0 7px var(--dot-c);opacity:0}
}
.grid-tab .badge{
  position:absolute;top:-2px;right:-3px;min-width:9px;height:9px;border-radius:99px;
  background:var(--coral);border:2px solid var(--paper);
  animation:pulseDot 1.8s ease-in-out infinite;
}


/* ---------- Les artefacts de sa mémoire ---------- */
.mem-wrap{display:none}
.mem-wrap.on{display:block;animation:memBorn .55s cubic-bezier(.34,1.5,.5,1)}
@keyframes memBorn{from{opacity:0;transform:scale(.2)}to{opacity:1;transform:none}}
.mem{
  width:30px;height:30px;border-radius:50%;flex:none;position:relative;
  display:grid;place-items:center;
  background:var(--glass-hi);-webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);
  box-shadow:inset 0 0 0 1px var(--glass-rim), inset 0 1px 0 var(--glass-top), 0 3px 10px rgba(20,23,30,.08);
  transition:transform .25s cubic-bezier(.34,1.4,.5,1),box-shadow .25s;
}
.mem:hover{transform:scale(1.09)}
.mem[aria-expanded="true"]{box-shadow:var(--shadow),0 0 0 2px var(--mem-c)}
.mem::after{
  content:"";position:absolute;inset:0;border-radius:50%;
  box-shadow:inset 0 0 0 1.5px var(--mem-c);opacity:.5;
}
.mem svg{color:var(--mem-c);position:relative;z-index:1}
.mem .n{
  position:absolute;top:-3px;right:-4px;z-index:2;
  min-width:15px;height:15px;padding:0 4px;border-radius:99px;
  background:var(--mem-c);color:#fff;border:2px solid var(--card);
  font-family:var(--mono);font-size:8.5px;font-weight:500;
  display:grid;place-items:center;line-height:1;
}
.mem.land{animation:memLand .5s cubic-bezier(.34,1.6,.5,1)}
@keyframes memLand{0%{transform:scale(1)}35%{transform:scale(1.3)}100%{transform:scale(1)}}
#memTasks{--mem-c:var(--amber)}
#memNotes{--mem-c:#7C6CF0}
#tasksPop{--mem-c:var(--amber)}
#notesPop{--mem-c:#7C6CF0}
#tasksPop,#notesPop{right:-6px;width:290px;transform-origin:calc(100% - 26px) -8px}
#tasksPop::before,#notesPop::before{right:24px}

/* L'artefact en vol. X sur l'extérieur, Y sur l'intérieur :
   deux courbes différentes = une vraie trajectoire, pas une ligne. */
.fly{position:fixed;left:0;top:0;z-index:60;pointer-events:none;will-change:transform}
.fly i{display:block;border-radius:50%;will-change:transform,opacity;transition:opacity .2s ease}
.fly.pop i{transition:transform .36s cubic-bezier(.34,1.75,.5,1)}
.fly.go{transition:transform .74s cubic-bezier(.6,0,.85,.45)}
.fly.go i{transition:transform .74s cubic-bezier(.18,.92,.32,1)}

.mem-head{display:flex;align-items:center;gap:8px;padding:4px 6px 10px;border-bottom:1px solid var(--hair);margin-bottom:4px}
.mem-head .t{font-family:var(--display);font-size:14px;font-weight:600;letter-spacing:-.01em}
.mem-head .c{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--muted)}
.mem-row{
  display:flex;align-items:flex-start;gap:10px;width:100%;text-align:left;
  padding:9px 8px;border-radius:11px;font-size:13px;color:var(--dim);
  transition:background .14s,color .14s;
}
.mem-row:hover{background:var(--hover);color:var(--ink)}
.mem-row .tick{margin-top:1px}
.mem-row .body{flex:1;min-width:0;line-height:1.4}
.mem-row .meta{font-size:10.5px;color:var(--muted);margin-top:3px}
.mem-row.late .meta{color:var(--coral)}
.mem-row .kill{flex:none;color:var(--muted);opacity:0;padding:2px;border-radius:6px;transition:.15s}
.mem-row:hover .kill{opacity:1}
.mem-row .kill:hover{color:var(--coral)}
.mem-empty{padding:16px 10px;font-size:12px;color:var(--muted);line-height:1.5}
.mem-dot{width:5px;height:5px;border-radius:50%;background:var(--mem-c);flex:none;margin-top:6px}


/* ---------- Le bureau et ses widgets ---------- */
.wall{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:14px;align-items:start}

/* Le widget des rappels : ils attendent les uns derrière les autres. */
.stack{position:relative;margin-bottom:22px}
.stk-back{
  position:absolute;background:var(--card);border-radius:22px;
  box-shadow:0 1px 2px rgba(20,23,30,.05), 0 10px 26px rgba(20,23,30,.07);
  height:70px;transition:all .4s cubic-bezier(.34,1.3,.5,1);
}
.stk-back.b1{left:11px;right:11px;bottom:-10px;z-index:2}
.stk-back.b2{left:23px;right:23px;bottom:-19px;z-index:1}
.stk-card{
  position:relative;z-index:3;background:var(--card);border-radius:22px;padding:17px 17px 15px;
  box-shadow:0 1px 2px rgba(20,23,30,.05), 0 14px 36px rgba(20,23,30,.10);
}
.stk-card.gone{animation:stkGone .38s cubic-bezier(.5,0,.75,.4) forwards}
@keyframes stkGone{to{opacity:0;transform:translateY(-14px) scale(.94)}}
.stk-card.arrive{animation:stkIn .42s cubic-bezier(.34,1.4,.5,1)}
@keyframes stkIn{from{opacity:0;transform:translateY(10px) scale(.96)}}
.stk-top{display:flex;align-items:flex-start;gap:12px}
.stk-ic{
  width:34px;height:34px;border-radius:11px;flex:none;display:grid;place-items:center;
  background:var(--key);color:var(--stk-c);
}
.stk-lab{font-size:11px;color:var(--muted);letter-spacing:.01em}
.stk-lab b{color:var(--stk-c);font-weight:600}
.stk-title{
  font-family:var(--display);font-size:20px;font-weight:600;letter-spacing:-.03em;
  line-height:1.15;margin-top:4px;
  overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
}
.stk-x{
  margin-left:auto;flex:none;width:24px;height:24px;border-radius:50%;
  display:grid;place-items:center;color:var(--muted);background:var(--key);
  transition:.15s;
}
.stk-x:hover{background:var(--hair);color:var(--ink)}
.stk-acts{display:flex;gap:8px;margin-top:15px}
.stk-acts button{
  flex:1;display:flex;align-items:center;justify-content:center;gap:7px;
  padding:11px;border-radius:99px;font-size:13px;font-weight:500;transition:.18s;
}
.stk-later{background:var(--key);color:var(--muted)}
.stk-later:hover{background:var(--hair);color:var(--ink)}
.stk-done{
  color:#fff;
  background:linear-gradient(180deg,#54DC90 0%,#10A25C 100%);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.34), 0 6px 16px rgba(18,160,92,.36), 0 0 22px rgba(18,160,92,.28);
}
.stk-done:hover{filter:brightness(1.06);transform:translateY(-1px);box-shadow:inset 0 1px 0 rgba(255,255,255,.4), 0 9px 22px rgba(18,160,92,.42), 0 0 34px rgba(18,160,92,.32)}
.stk-done:active{transform:translateY(0) scale(.985)}
.stk-count{font-size:11px;color:var(--muted);text-align:center;margin-top:11px;font-family:var(--mono)}


/* ---------- Marque ---------- */
.brand{display:flex;align-items:center;gap:9px;flex:none;padding:0 6px 0 4px}
.brand-name{font-family:var(--display);font-weight:700;text-transform:uppercase;letter-spacing:.13em;font-size:12.5px}

/* ---------- Lancement ---------- */
#boot{position:fixed;inset:0;z-index:50;background:var(--paper);display:none;place-items:center;transition:opacity .5s ease}
#boot.on{display:grid}
#boot.out{opacity:0;pointer-events:none}
.boot-inner{display:flex;flex-direction:column;align-items:center;gap:26px}
.boot-word{
  font-family:var(--display);font-weight:700;font-size:14px;text-transform:uppercase;
  letter-spacing:1.2em;text-indent:1.2em;opacity:0;transform:translateY(4px);
  animation:word .7s ease .55s forwards;
}
@keyframes word{to{opacity:1;transform:none}}
.boot-track{width:132px;height:2px;border-radius:99px;background:var(--hair);overflow:hidden}
.boot-track i{display:block;height:100%;width:0;background:var(--ink);border-radius:99px;transition:width .35s ease}
.boot-status{font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;height:12px}
@media(prefers-reduced-motion:reduce){.boot-word{animation:none;opacity:1;transform:none}}

/* ---------- Profil (écran d'entrée) ---------- */
#auth{
  position:fixed;inset:0;z-index:40;
  background:radial-gradient(900px 500px at 50% -20%, var(--glow) 0%, transparent 65%), var(--paper);
  display:none;place-items:center;padding:24px;animation:fadeUp .5s ease;
}
#auth.on{display:grid}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.auth-card{width:100%;max-width:376px;background:var(--card);border-radius:22px;box-shadow:var(--shadow-lift);padding:30px 28px 26px}
.auth-brand{margin-bottom:24px}
.auth-row{display:flex;gap:15px;align-items:center;margin-top:14px}
.auth-mate{width:54px;height:54px;flex:none;display:block}
.auth-fields{flex:1;min-width:0}
.auth-fields .field:first-child{margin-top:0}
.auth-h{font-family:var(--display);font-weight:500;font-size:24px;letter-spacing:-.03em;line-height:1.15}
.auth-p{font-size:12.5px;color:var(--muted);margin-top:7px;line-height:1.5}
.field{margin-top:16px}
.field label{display:block;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.field .box{display:flex;align-items:center;gap:9px;border:1px solid var(--hair);border-radius:12px;padding:0 12px;background:var(--field);transition:border-color .15s,background .15s}
.field .box:focus-within{border-color:var(--ink);background:var(--card)}
.field input{border:none;background:none;outline:none;color:var(--ink);width:100%;padding:12px 0;font-size:14px}
.field input::placeholder{color:var(--muted);opacity:.6}
.field .box .reveal{color:var(--muted);font-size:11px;padding:4px;flex:none}
.field .box .reveal:hover{color:var(--ink)}
.strength{display:flex;gap:3px;margin-top:7px}
.strength i{flex:1;height:2px;border-radius:99px;background:var(--hair);transition:background .25s}
.strength-lab{font-size:10.5px;color:var(--muted);margin-top:5px;min-height:13px}
.auth-btn{width:100%;margin-top:22px;padding:13px;font-size:13.5px}
.auth-err{font-size:12px;color:var(--coral);margin-top:13px;display:none;align-items:center;gap:7px}
.auth-err.on{display:flex}
.auth-alt{margin-top:18px;padding-top:16px;border-top:1px solid var(--hair);font-size:12.5px;color:var(--muted);text-align:center}
.auth-alt button{color:var(--ink);font-weight:500;text-decoration:underline;text-underline-offset:2px}
.auth-note{margin-top:18px;font-size:11px;color:var(--muted);line-height:1.5;background:var(--soft);border-radius:10px;padding:11px 12px}
.auth-note b{color:var(--dim);font-weight:600}

/* ---------- Shell ---------- */
.app{display:none;flex-direction:column;height:100vh;height:100dvh;padding:12px 16px}
.app.on{display:flex;animation:fadeUp .45s ease}

/* ---------- Barre d'onglets ---------- */
.tabbar{display:flex;align-items:center;gap:10px;padding:2px 0 16px;flex:none;position:relative;z-index:20}
.tabs{
  display:flex;align-items:center;gap:2px;border-radius:99px;padding:3px;
  min-width:0;overflow-x:auto;scrollbar-width:none;
  background:var(--glass);-webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);
  box-shadow:inset 0 0 0 1px var(--glass-rim), inset 0 1px 0 var(--glass-top);
}
.tabs::-webkit-scrollbar{display:none}
.tab{
  display:flex;align-items:center;gap:7px;padding:7px 13px;border-radius:99px;
  font-size:12.5px;color:var(--muted);white-space:nowrap;position:relative;
  transition:color .18s,background .18s;animation:tabIn .32s cubic-bezier(.34,1.3,.5,1);
}
@keyframes tabIn{from{opacity:0;transform:translateY(-5px) scale(.9)}to{opacity:1;transform:none}}
.tab.out{animation:tabOut .2s ease forwards;pointer-events:none}
@keyframes tabOut{to{opacity:0;transform:scale(.85);margin-left:-6px}}
.tab:hover{color:var(--ink)}
.tab[aria-selected="true"]{
  color:var(--ink);font-weight:500;
  background:var(--glass-hi);-webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);
  box-shadow:inset 0 0 0 1px var(--glass-rim), inset 0 1px 0 rgba(255,255,255,.8), 0 2px 8px rgba(20,23,30,.10);
}
.tab svg{flex:none;opacity:.65;transition:opacity .18s}
.tab[aria-selected="true"] svg{opacity:1;animation:pop .42s cubic-bezier(.34,1.5,.5,1)}
@keyframes pop{0%{transform:scale(.6) rotate(-12deg);opacity:.3}60%{transform:scale(1.14) rotate(3deg)}100%{transform:none;opacity:1}}
.tab-close{display:grid;place-items:center;width:15px;height:15px;margin:-4px -5px -4px 1px;border-radius:50%;color:var(--muted);opacity:0;transition:opacity .15s,background .15s,color .15s}
.tab:hover .tab-close,.tab[aria-selected="true"] .tab-close{opacity:1}
.tab-close:hover{background:var(--track);color:var(--coral)}
.tab.pinned .tab-close{display:none}
.tab-add{
  width:30px;height:30px;border-radius:50%;flex:none;display:grid;place-items:center;color:var(--muted);
  background:var(--glass-hi);-webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);
  box-shadow:inset 0 0 0 1px var(--glass-rim), inset 0 1px 0 var(--glass-top), 0 3px 10px rgba(20,23,30,.08);
  transition:transform .25s cubic-bezier(.34,1.4,.5,1),color .18s;
}
.tab-add:hover{color:var(--ink);transform:scale(1.08)}
.tab-add[aria-expanded="true"]{color:var(--ink);transform:rotate(45deg)}
.spacer{flex:1;min-width:8px}

/* ---------- Menus flottants ---------- */
.pop-wrap{position:relative;flex:none}
.pop{
  position:absolute;top:calc(100% + 11px);z-index:30;
  border-radius:20px;
  background:var(--glass-pop);-webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);
  box-shadow:inset 0 0 0 1px var(--glass-rim), inset 0 1px 0 var(--glass-top), var(--shadow-pop);
  opacity:0;transform:translateY(-8px) scale(.96);pointer-events:none;
  transition:opacity .2s ease, transform .28s cubic-bezier(.34,1.3,.5,1), width .3s cubic-bezier(.4,0,.2,1);
}
.pop.on{opacity:1;transform:none;pointer-events:auto}
.pop::before{content:"";position:absolute;top:-5px;width:12px;height:12px;background:var(--glass-pop);border-radius:3px;transform:rotate(45deg);box-shadow:inset 1px 1px 0 var(--glass-rim)}
.pop-inner{overflow:hidden;transition:height .3s cubic-bezier(.4,0,.2,1)}
.pop-pad{padding:8px}
.pop-view{animation:viewFade .26s ease}
@keyframes viewFade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

#menu{left:-8px;width:262px;transform-origin:34px -8px}
#menu::before{left:30px}
#account{right:-6px;width:236px;transform-origin:calc(100% - 26px) -8px}
#account::before{right:24px}

.menu-row{
  position:relative;display:flex;align-items:center;gap:12px;width:100%;
  padding:10px;border-radius:13px;color:var(--muted);font-size:13.5px;text-align:left;
  transition:color .16s,background .16s;
}
.menu-row:hover:not([disabled]){background:var(--hover);color:var(--ink);font-weight:500}
.menu-row svg{flex:none;opacity:.85}
.menu-row .keys{margin-left:auto;display:flex;gap:4px}
.menu-row .keys span{display:grid;place-items:center;min-width:24px;height:24px;padding:0 5px;border-radius:7px;background:var(--key);color:var(--muted);font-family:var(--mono);font-size:10.5px;transition:background .16s,color .16s,box-shadow .16s}
.menu-row:hover:not([disabled]) .keys span{background:var(--card);color:var(--dim);box-shadow:0 1px 3px rgba(20,23,30,.10)}
.menu-row[disabled]{opacity:.45;cursor:default}
.menu-row .open-flag{margin-left:auto;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.menu-row.danger:hover{color:var(--coral)}
.menu-row .chev{margin-left:auto;opacity:.5}
.menu-sep{height:1px;background:var(--hair);margin:6px 10px}
.menu-foot{padding:4px 10px 5px;font-size:10.5px;color:var(--muted);display:flex;gap:6px;align-items:center}

/* ---------- Avatar ---------- */
.av-btn{width:30px;height:30px;border-radius:50%;flex:none;padding:2px;background:conic-gradient(from 210deg,var(--amber),var(--coral),var(--amber));transition:transform .25s cubic-bezier(.34,1.4,.5,1)}
.av-btn:hover{transform:scale(1.07)}
.av-btn[aria-expanded="true"]{transform:scale(1.07)}
.av{width:100%;height:100%;border-radius:50%;display:grid;place-items:center;overflow:hidden;background:var(--ink);color:var(--card);font-family:var(--display);font-size:11px;font-weight:600;border:1.5px solid var(--card)}
.av img{width:100%;height:100%;object-fit:cover;display:block}

/* ---------- Panneaux du compte ---------- */
.pan-head{display:flex;align-items:center;gap:8px;padding:4px 4px 10px;margin-bottom:4px;border-bottom:1px solid var(--hair)}
.pan-back{width:24px;height:24px;border-radius:8px;display:grid;place-items:center;color:var(--muted);flex:none}
.pan-back:hover{background:var(--hover);color:var(--ink)}
.pan-title{font-family:var(--display);font-size:14px;font-weight:600;letter-spacing:-.01em}
.pan-body{padding:6px 4px 2px}
.pan-hint{font-size:10.5px;color:var(--muted);margin-top:9px;line-height:1.45}
.pan-hint b{color:var(--dim);font-weight:600}
.pan-lab{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin:14px 0 7px}
.pan-lab:first-child{margin-top:4px}

.av-edit{display:flex;align-items:center;gap:13px;padding:4px 0 2px}
.av-big{width:52px;height:52px;border-radius:50%;flex:none;padding:2px;background:conic-gradient(from 210deg,var(--amber),var(--coral),var(--amber))}
.av-big > span{width:100%;height:100%;border-radius:50%;overflow:hidden;display:grid;place-items:center;background:var(--ink);color:var(--card);font-family:var(--display);font-size:18px;font-weight:600;border:2px solid var(--card)}
.av-big img{width:100%;height:100%;object-fit:cover;display:block}
.av-acts{display:flex;flex-direction:column;gap:5px}
.mini{font-size:11.5px;padding:5px 10px;border-radius:8px;background:var(--key);color:var(--dim);text-align:center;transition:background .15s,color .15s}
.mini:hover{background:var(--hair);color:var(--ink)}
.mini.quiet{background:none;color:var(--muted)}
.mini.quiet:hover{color:var(--coral);background:none}

.pin{display:flex;align-items:center;gap:8px;border:1px solid var(--hair);border-radius:10px;background:var(--field);padding:0 10px;transition:border-color .15s}
.pin:focus-within{border-color:var(--ink);background:var(--card)}
.pin input{border:none;background:none;outline:none;color:var(--ink);width:100%;padding:9px 0;font-size:13px}
.pin input::placeholder{color:var(--muted);opacity:.55}
.pin + .pin{margin-top:6px}
.pan-btn{width:100%;margin-top:10px;padding:9px;font-size:12.5px}
.pan-msg{font-size:11.5px;margin-top:9px;min-height:14px;line-height:1.4}
.pan-msg.err{color:var(--coral)}
.pan-msg.ok{color:var(--mint)}

.row-toggle{display:flex;align-items:center;gap:12px;padding:9px 4px}
.row-toggle .t{font-size:13px}
.row-toggle .d{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.4}
.sw{margin-left:auto;flex:none;width:38px;height:22px;border-radius:99px;background:var(--track);position:relative;transition:background .25s}
.sw::after{content:"";position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:var(--card);box-shadow:0 1px 3px rgba(0,0,0,.25);transition:transform .28s cubic-bezier(.34,1.4,.5,1)}
.sw[aria-checked="true"]{background:var(--ink)}
.sw[aria-checked="true"]::after{transform:translateX(16px)}

/* ---------- Vue ---------- */
.view{flex:1;min-height:0;overflow:auto}
.view.swap{animation:viewIn .34s cubic-bezier(.22,.8,.3,1)}
@keyframes viewIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}

.page-head{padding:0 4px 18px}
.eyebrow{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
h1{font-family:var(--display);font-weight:500;font-size:clamp(28px,3.2vw,40px);letter-spacing:-.035em;line-height:1.05;margin-top:7px}
h1 em{font-style:normal;color:var(--muted)}

.card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);padding:18px}

/* ---------- État vide ---------- */
.empty{padding:64px 24px;text-align:center;display:flex;flex-direction:column;align-items:center}
@keyframes breathe{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.55;transform:scale(.86)}}
.empty h2{font-family:var(--display);font-weight:500;font-size:21px;letter-spacing:-.02em;margin-bottom:9px}
.empty p{font-size:13px;color:var(--muted);max-width:330px;line-height:1.55;margin-bottom:20px}
.btn{display:inline-flex;align-items:center;gap:9px;padding:9px 18px 9px 10px;font-size:13px}
.btn.quiet{background:none;color:var(--muted);box-shadow:inset 0 0 0 1px var(--hair);filter:none;padding:10px 18px}
.btn.quiet:hover{color:var(--ink);background:none;filter:none;transform:none;box-shadow:inset 0 0 0 1px var(--muted)}

/* =========================================================
   TÉLÉPHONE — le PC n'est pas touché.
   ========================================================= */
@media(hover:none){
  /* pas de survol : ce qui n'apparaissait qu'au survol doit être là */
  .tab[aria-selected="true"] .tab-close{opacity:1}
  .menu-row:hover:not([disabled]){background:none;color:var(--muted);font-weight:400}
  .menu-row:active:not([disabled]){background:var(--hover);color:var(--ink)}
  .ask-row:active{background:var(--hover)}
  .mini:active{background:var(--hair)}
}

@media(max-width:720px){
  html{-webkit-tap-highlight-color:transparent}

  .app{
    padding:10px;
    padding-top:calc(10px + env(safe-area-inset-top, 0px));
    padding-bottom:calc(10px + env(safe-area-inset-bottom, 0px));
  }
  .tabbar{gap:8px;padding-bottom:12px}

  /* la barre du haut : onglets qui défilent, puis les trois boutons */
  .tabs{flex:1}
  .tab{padding:8px 12px;font-size:12px}
  .tab span:not(.tab-close){display:none}
  .tab[aria-selected="true"] span:not(.tab-close){display:inline}

  /* pouces : 34px minimum */
  .tab-add,.av-btn{width:34px;height:34px}
  .tab-add svg{width:15px;height:15px}
  .spacer{display:none}

  /* Au centre, Grid écraserait les onglets sur 360px : il retourne dans la file. */
  .tabbar .tabs{order:1;max-width:none}
  .menu-holder{order:2}
  .tabbar .grid-mid{position:static;transform:none;order:3;height:auto;bottom:auto;top:auto;display:block}
  .mem-wrap{order:4}
  .av-holder{order:5}
  .grid-tab{height:32px;padding:0 5px 0 4px}
  .gt-name{display:none}
  .grid-tab .gt-dot{margin-right:3px}
  .grid-mid .ask,.grid-mid .nudge{left:10px;right:10px;top:calc(56px + env(safe-area-inset-top, 0px));transform:translateY(-8px) scale(.96)}
  .grid-mid .ask.on,.grid-mid .nudge.on{transform:none}

  /* Les bulles flottantes deviennent des panneaux pleine largeur,
     posés SOUS la barre : le clavier monte par le bas, ils restent visibles. */
  .pop,.ask,.nudge{
    position:fixed;
    top:calc(56px + env(safe-area-inset-top, 0px));
    left:10px; right:10px;
    width:auto !important;
    max-width:none;
    transform-origin:top center;
  }
  .pop::before{display:none}
  .ask-list{max-height:46dvh}
  .pop-inner{max-height:72dvh;overflow-y:auto}

  /* iOS zoome sur tout champ sous 16px : on ne lui laisse pas l'occasion */
  .field input,.ask-bar input,.pin input{font-size:16px}
  .ask-bar{height:50px}

  /* respirations réduites */
  .auth-card{padding:26px 20px 22px;border-radius:20px}
  #auth{padding:16px}
  .empty{padding:44px 18px}
  .empty p{font-size:12.5px}
  .page-head{padding-bottom:14px}
  .view{-webkit-overflow-scrolling:touch}

  /* le mot de rappel : des boutons qu'on attrape */
  .nudge{padding:16px}
  .nudge .acts button,.ask-conf .acts button{padding:11px;font-size:13px}
  .ask-conf .acts{margin-top:14px}
}

/* très petits écrans */
@media(max-width:380px){
  .tab{padding:8px 10px}
  .tabbar{gap:6px}
  h1{font-size:25px}
}

/* téléphone couché : la barre mange l'écran */
@media(max-height:480px) and (orientation:landscape){
  .empty{padding:22px 18px}
  .empty .empty-blob{width:44px;height:44px;margin-bottom:12px}
  .ask-list{max-height:38dvh}
  .pop-inner{max-height:60dvh}
}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>

<!-- APP -->

  <div class="tabbar">

          <input id="askInput" placeholder="Demandez quelque chose à Grid" autocomplete="off" spellcheck="false">

<input type="file" id="picker" accept="image/*" hidden>

<script>
/* ================= Stockage ================= */
const Store = (() => {
  const mem = {};
  const hasWin = typeof window.storage?.get === 'function';
  let hasLS = false;
  try { localStorage.setItem('__t','1'); localStorage.removeItem('__t'); hasLS = true; } catch(e){}
  return {
    async get(k){
      if(hasWin){ try{ const r = await window.storage.get(k); return r ? JSON.parse(r.value) : null; }catch(e){ return null; } }
      if(hasLS){ const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; }
      return mem[k] ?? null;
    },
    async set(k,v){
      const s = JSON.stringify(v);
      if(hasWin){ try{ await window.storage.set(k,s); return; }catch(e){} }
      if(hasLS){ try{ localStorage.setItem(k,s); return; }catch(e){} }
      mem[k] = v;
    },
    async del(k){
      if(hasWin){ try{ await window.storage.delete(k); return; }catch(e){} }
      if(hasLS){ try{ localStorage.removeItem(k); return; }catch(e){} }
      delete mem[k];
    }
  };
})();
const K_USERS='grid:users', K_SESSION='grid:session', K_THEME='grid:theme';
const $ = id => document.getElementById(id);
const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
const wait = ms => new Promise(r=>setTimeout(r, reduce ? Math.min(ms,60) : ms));

/* ================= Hachage ================= */
const salt = () => [...crypto.getRandomValues(new Uint8Array(16))].map(b=>b.toString(16).padStart(2,'0')).join('');
async function hash(pw, s){
  const data = new TextEncoder().encode(s + '·grid·' + pw);
  if(crypto.subtle){
    const buf = await crypto.subtle.digest('SHA-256', data);
    return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
  }
  let h = 2166136261;
  for(const b of data){ h ^= b; h = Math.imul(h, 16777619); }
  return (h>>>0).toString(16);
}
const eq = (a,b) => {
  if(a.length !== b.length) return false;
  let d = 0; for(let i=0;i<a.length;i++) d |= a.charCodeAt(i) ^ b.charCodeAt(i);
  return d === 0;
};

let SESSION = { id:'', pseudo:'', photo:null };
let USERS = {};

/* ================= Thème ================= */
async function applyTheme(dark, save=true){
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  if(save) await Store.set(K_THEME, dark ? 'dark' : 'light');
}
const isDark = () => document.documentElement.getAttribute('data-theme') === 'dark';

/* ================= Données ================= */
const DATA = { maps: [], feed: [] };
const nf = n => n.toLocaleString('fr-FR');

/* ================= Pages ================= */
const PAGES = {};

const emptyState = (title, body, cta) => `
  <div class="card empty">
    <span class="empty-blob" style="width:62px;height:62px;display:block;margin-bottom:20px"></span>
    <h2>${title}</h2>
    <p>${body}</p>
    ${cta || ''}
  </div>`;





/* ================= Le bureau ================= */
const ago = ts => {
  const s = Math.round((Date.now() - ts) / 1000);
  if(s < 60) return "à l'instant";
  if(s < 3600) return 'il y a ' + Math.round(s/60) + ' min';
  if(s < 86400) return 'il y a ' + Math.round(s/3600) + ' h';
  const j = Math.round(s/86400);
  return j === 1 ? 'hier' : 'il y a ' + j + ' j';
};
/* Ce qui attend vraiment quelque chose de vous. */
const waiting = () => NOTES.filter(n => !n.done && (n.kind !== 'note' || n.due)).sort(byDue);
let STK_I = 0;

function stackWidget(){
  const list = waiting();
  if(!list.length) return '';        // rien à rappeler : pas de widget

  if(STK_I >= list.length) STK_I = 0;
  const n = list[STK_I];
  const isN = n.kind === 'note';
  const late = n.due && n.due <= Date.now();
  const col = n.urgent ? 'var(--coral)' : isN ? '#7C6CF0' : 'var(--amber)';

  const lab = n.urgent ? '<b>Urgent</b> · ' : isN ? '<b>Note</b> · ' : '<b>Tâche</b> · ';
  const when = n.due
    ? (late ? 'à faire depuis ' + whenLabel(new Date(n.due), n.hasTime, n.repeat) : whenLabel(new Date(n.due), n.hasTime, n.repeat))
    : 'notée ' + ago(n.created);

  return `
  <section class="stack" style="--stk-c:${col}">
    ${list.length > 2 ? '<div class="stk-back b2"></div>' : ''}
    ${list.length > 1 ? '<div class="stk-back b1"></div>' : ''}
    <article class="stk-card arrive" data-stk="${n.id}">
      <div class="stk-top">
        <span class="stk-ic">
          ${isN ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 6h14M5 11h14M5 16h8"/></svg>'
                : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12l5.5 5.5L20 6"/></svg>'}
        </span>
        <div style="min-width:0">
          <div class="stk-lab">${lab}${esc(when)}</div>
          <div class="stk-title">${esc(n.what)}</div>
        </div>
        ${list.length > 1 ? `<button class="stk-x" data-stknext="1" aria-label="Voir le suivant">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
        </button>` : ''}
      </div>
      <div class="stk-acts">
        <button class="stk-later" data-stklater="${n.id}">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 006 8c0 7-3 8-3 8h18s-3-1-3-8"/><path d="M10.3 21a2 2 0 003.4 0"/></svg>
          Plus tard
        </button>
        <button class="stk-done" data-stkdone="${n.id}">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12l5.5 5.5L20 6"/></svg>
          ${isN ? 'Vu' : "C'est fait"}
        </button>
      </div>
    </article>
    ${list.length > 1 ? `<div class="stk-count">${STK_I+1} / ${list.length}</div>` : ''}
  </section>`;
}

PAGES.dashboard = () => {
  const n = waiting().length;
  return `
  <div class="page-head" style="padding-top:4px">
    <h1>Bonjour ${SESSION.pseudo}. <em>${n ? n + (n>1 ? ' choses vous attendent.' : ' chose vous attend.') : 'Rien à piloter pour l\u2019instant.'}</em></h1>
  </div>
  ${n ? `<div class="wall">${stackWidget()}</div>` : ''}`;
};



/* ================= Onglets ================= */
const ICON = {
  dashboard:'<path d="M3 12l9-8 9 8"/><path d="M5 10v10h14V10"/>',
  left:'<path d="M15 6l-6 6 6 6"/>',
  right:'<path d="M9 6l6 6-6 6"/>',
  user:'<circle cx="12" cy="8" r="3.4"/><path d="M5 20c0-3.6 3.1-6 7-6s7 2.4 7 6"/>',
  settings:'<rect x="2.5" y="7" width="19" height="10" rx="5"/><circle cx="8" cy="12" r="2.6"/>',
  out:'<path d="M15 4h3a2 2 0 012 2v12a2 2 0 01-2 2h-3"/><path d="M10 17l-5-5 5-5M5 12h11"/>',
  back:'<path d="M14 6l-6 6 6 6"/>',
  chev:'<path d="M9 6l6 6-6 6"/>',
};
const svg = (k, size=14) =>
  `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">${ICON[k]}</svg>`;

const META = {
  dashboard:{ label:'Tableau de bord', key:'D', pinned:true },
};
const MAC = /Mac|iPhone|iPad/.test(navigator.platform || navigator.userAgent);
const MOD = MAC ? '⌥' : 'Alt';

let TABS = ['dashboard'];
let ACTIVE = 'dashboard';

function renderTabs(){
  $('tabs').innerHTML = TABS.map(id=>{
    const m = META[id];
    return `<button class="tab ${m.pinned?'pinned':''}" data-tab="${id}" role="tab" aria-selected="${id===ACTIVE}">
      ${svg(id)}<span>${m.label}</span>
      <span class="tab-close" data-close="${id}" role="button" aria-label="Fermer ${m.label}">
        <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </span>
    </button>`;
  }).join('');
}
let VIEW_BUB = null;
function renderView(){
  const v = $('view');
  if(VIEW_BUB){ VIEW_BUB.destroy(); VIEW_BUB = null; }
  v.innerHTML = (PAGES[ACTIVE] || PAGES.dashboard)();
  const host = v.querySelector('.empty-blob');
  if(host){ VIEW_BUB = new Blob(host); LIVE.push(VIEW_BUB); VIEW_BUB.set('curious'); }
  v.classList.remove('swap'); void v.offsetWidth; v.classList.add('swap');
  v.scrollTop = 0;
}
function go(id){
  if(!META[id]) id = 'dashboard';
  if(!TABS.includes(id)) TABS.push(id);
  ACTIVE = id;
  renderTabs(); renderView(); saveTabs(); closeAll();
}
function closeTab(id){
  if(META[id].pinned) return;
  const el = $('tabs').querySelector(`[data-tab="${id}"]`);
  const i = TABS.indexOf(id);
  const next = ACTIVE === id ? (TABS[i-1] || TABS[i+1] || 'dashboard') : ACTIVE;
  TABS = TABS.filter(t=>t!==id);
  const done = () => { ACTIVE = next; renderTabs(); renderView(); saveTabs(); };
  if(el && !reduce){ el.classList.add('out'); setTimeout(done, 190); } else done();
}
const saveTabs = () => SESSION.id && Store.set('grid:tabs:'+SESSION.id, {tabs:TABS, active:ACTIVE});

/* ================= Popovers ================= */
function popSize(pop, html, width){
  const inner = pop.querySelector('.pop-inner');
  const body  = pop.querySelector('.pop-pad');
  const from  = inner.offsetHeight;
  body.innerHTML = `<div class="pop-view">${html}</div>`;
  pop.style.width = width + 'px';
  const to = body.offsetHeight;
  if(reduce || !pop.classList.contains('on')){ inner.style.height = 'auto'; return; }
  inner.style.height = from + 'px';
  void inner.offsetWidth;
  inner.style.height = to + 'px';
  clearTimeout(inner._t);
  inner._t = setTimeout(()=>{ inner.style.height = 'auto'; }, 320);
}
function openPop(pop, btn){
  closeAll(pop);
  pop.classList.add('on');
  btn.setAttribute('aria-expanded','true');
}
function closePop(pop, btn){
  pop.classList.remove('on');
  btn.setAttribute('aria-expanded','false');
}
function closeAll(except){
  if($('menu') !== except) closePop($('menu'), $('tabAdd'));
  if($('account') !== except){ closePop($('account'), $('avBtn')); ACC_VIEW = 'root'; }
  if($('ask') !== except && typeof closeAsk === 'function') closeAsk();
  if(typeof MEM === 'object') for(const m of Object.values(MEM))
    if($(m.pop) !== except) closePop($(m.pop), $(m.orb));
}

/* ---- Menu + ---- */
function menuHTML(){
  const rows = Object.entries(META).filter(([id])=>!META[id].pinned).map(([id,m])=>{
    const open = TABS.includes(id);
    return `<button class="menu-row" role="menuitem" data-open="${id}" ${open?'disabled':''}>
      ${svg(id,16)}<span>${m.label}</span>
      ${open ? '<span class="open-flag">Ouvert</span>' : `<span class="keys"><span>${MOD}</span><span>${m.key}</span></span>`}
    </button>`;
  }).join('');
  return (rows || `<div class="ask-none" style="padding:12px 10px">Aucune page pour l'instant. On les construira une par une.</div>`) + `<div class="menu-sep"></div>
    <div class="menu-foot">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6L6 18"/></svg>
      ${MOD} W ferme l'onglet ouvert
    </div>`;
}

/* ---- Compte ---- */
let ACC_VIEW = 'root';
const initial = () => (SESSION.pseudo[0] || '?').toUpperCase();
const avInner = () => SESSION.photo ? `<img src="${SESSION.photo}" alt="">` : initial();

const ACC = {
  root: () => ({ w:236, html: `
    <button class="menu-row" data-acc="profile">${svg('user',16)}<span>Profil</span><span class="chev">${svg('chev',13)}</span></button>
    <button class="menu-row" data-acc="settings">${svg('settings',16)}<span>Réglages</span><span class="chev">${svg('chev',13)}</span></button>
    <div class="menu-sep"></div>
    <button class="menu-row danger" data-acc="signout">${svg('out',16)}<span>Se déconnecter</span></button>` }),

  profile: () => ({ w:308, html: `
    <div class="pan-head">
      <button class="pan-back" data-acc="root" aria-label="Retour">${svg('back',15)}</button>
      <span class="pan-title">Profil</span>
    </div>
    <div class="pan-body">
      <div class="av-edit">
        <span class="av-big"><span id="avBig">${avInner()}</span></span>

/* ================= Ce que Grid comprend ================= */
const strip = t => t.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
const DAYS   = {dimanche:0,lundi:1,mardi:2,mercredi:3,jeudi:4,vendredi:5,samedi:6};
const MONTHS = {janvier:0,fevrier:1,mars:2,avril:3,mai:4,juin:5,juillet:6,aout:7,septembre:8,octobre:9,novembre:10,decembre:11};
/* Les moments de la journée, tels qu'on les dit vraiment. */
const PART = {matin:9, matinee:10, midi:12, aprem:15, 'apres-midi':15, 'apres midi':15, soir:20, soiree:20, nuit:22, minuit:0};

/* Repère une date, une heure, une récurrence. Dit ce qu'il a consommé. */
function readWhen(raw){
  const t = strip(raw);
  const now = new Date();
  const d = new Date(now); d.setSeconds(0,0);
  let hasDay = false, hasTime = false, repeat = null, before = false, past = false;
  const eaten = [];
  const eat = re => { const m = t.match(re); if(m) eaten.push(m[0]); return m; };
  const done = () => {
    if(!hasDay && !hasTime) return { due:null, eaten:[], hasTime:false, repeat:null, before:false, past:false };
    if(!hasTime) d.setHours(9,0,0,0);
    if(!hasDay && d <= now) d.setDate(d.getDate()+1);
    return { due:d, eaten, hasTime, repeat, before, past: d < now };
  };
  let m;

  /* --- récurrence : « tous les jours », « chaque lundi » --- */
  if((m = eat(/\b(?:tous les|toutes les|chaque)\s+(jours?|matins?|soirs?|semaines?|mois|lundis?|mardis?|mercredis?|jeudis?|vendredis?|samedis?|dimanches?)\b/))){
    const u = m[1];
    hasDay = true;
    if(/^jour|^matin|^soir/.test(u)){
      repeat = 'jour';
      if(/matin/.test(u)){ d.setHours(9,0); hasTime = true; }
      if(/soir/.test(u)){ d.setHours(20,0); hasTime = true; }
    } else if(/^semaine/.test(u)) repeat = 'semaine';
    else if(/^mois/.test(u))      repeat = 'mois';
    else {
      repeat = 'semaine';
      const gap = (DAYS[u.replace(/s$/,'')] - d.getDay() + 7) % 7 || 7;
      d.setDate(d.getDate() + gap);
    }
  }

  /* --- échéance : « avant vendredi », « d'ici lundi » --- */
  if(eat(/\b(avant|d'?ici)\s+(?=[a-z0-9])/)) before = true;

  /* --- durées : « dans une demi-heure », « dans 1h30 », « dans 3 jours » --- */
  if(!repeat){
    if(eat(/\bdans\s+(?:une?\s+)?demi[- ]heure\b/)){ d.setMinutes(d.getMinutes()+30); hasDay = hasTime = true; return done(); }
    if(eat(/\bdans\s+(?:un\s+)?quart\s+d'?heure\b/)){ d.setMinutes(d.getMinutes()+15); hasDay = hasTime = true; return done(); }
    if((m = eat(/\bdans\s+(\d+)\s*h\s*(\d{2})\b/))){
      d.setHours(d.getHours() + +m[1]); d.setMinutes(d.getMinutes() + +m[2]);
      hasDay = hasTime = true; return done();
    }
    if((m = eat(/\bdans\s+(une?|\d+)\s*(min\w*|h\b|heures?|jours?|semaines?|mois|ans?)\b/))){
      const n = /^une?$/.test(m[1]) ? 1 : parseInt(m[1],10), u = m[2];
      if(/^min/.test(u))       d.setMinutes(d.getMinutes()+n);
      else if(/^h/.test(u))    d.setHours(d.getHours()+n);
      else if(/^jour/.test(u)) d.setDate(d.getDate()+n);
      else if(/^sem/.test(u))  d.setDate(d.getDate()+n*7);
      else if(/^mois/.test(u)) d.setMonth(d.getMonth()+n);
      else                     d.setFullYear(d.getFullYear()+n);
      hasDay = hasTime = true; return done();
    }
  }

  /* --- le jour --- */
  if(!hasDay){
    if(eat(/\bapres[- ]demain\b/))                     { d.setDate(d.getDate()+2); hasDay = true; }
    else if(eat(/\bdemain\b/))                         { d.setDate(d.getDate()+1); hasDay = true; }
    else if(eat(/\bhier\b/))                           { d.setDate(d.getDate()-1); hasDay = past = true; }
    else if(eat(/\baujourd'?hui\b/))                   { hasDay = true; }
    else if(eat(/\bce week[- ]?end\b/))                { d.setDate(d.getDate() + ((6 - d.getDay() + 7) % 7 || 7)); d.setHours(10,0); hasDay = hasTime = true; }
    else if(eat(/\bla semaine prochaine\b/))           { d.setDate(d.getDate()+7); hasDay = true; }
    else if(eat(/\ble mois prochain\b/))               { d.setMonth(d.getMonth()+1); hasDay = true; }
    else if((m = eat(/\b(?:ce\s+)?(lundi|mardi|mercredi|jeudi|vendredi|samedi|dimanche)(\s+prochain)?\b/))){
      let gap = (DAYS[m[1]] - d.getDay() + 7) % 7;
      if(gap === 0 || m[2]) gap = gap || 7;
      d.setDate(d.getDate() + gap); hasDay = true;
    }
    else if((m = eat(/\b(?:le\s+)?(\d{1,2})\s+(janvier|fevrier|mars|avril|mai|juin|juillet|aout|septembre|octobre|novembre|decembre)\b/))){
      d.setMonth(MONTHS[m[2]], +m[1]);
      if(d < now) d.setFullYear(d.getFullYear()+1);
      hasDay = true;
    }
    else if((m = eat(/\b(\d{1,2})[\/](\d{1,2})\b/))){
      d.setMonth(+m[2]-1, +m[1]);
      if(d < now) d.setFullYear(d.getFullYear()+1);
      hasDay = true;
    }
    else if((m = eat(/\b(debut|mi|fin)[- ](janvier|fevrier|mars|avril|mai|juin|juillet|aout|septembre|octobre|novembre|decembre)\b/))){
      d.setMonth(MONTHS[m[2]], m[1]==='debut' ? 3 : m[1]==='mi' ? 15 : 27);
      if(d < now) d.setFullYear(d.getFullYear()+1);
      hasDay = true;
    }
  }

  /* --- l'heure au cadran : « à 18h », « 18h30 », « à 8h du soir » --- */
  const tm = t.match(/\b(?:a|vers)\s*(\d{1,2})\s*h\s*(\d{2})?\b/)
          || t.match(/\b(\d{1,2})\s*h\s*(\d{2})\b/)
          || t.match(/\b(?:a|vers)\s+(\d{1,2})\s*:\s*(\d{2})\b/);
  if(tm){
    let H = +tm[1]; const M = tm[2] ? +tm[2] : 0;
    if(H <= 23 && M <= 59){
      const pm = t.match(/\bdu soir\b|\bde l'?apres[- ]midi\b/);
      if(pm && H < 12){ H += 12; eaten.push(pm[0]); }
      const am = t.match(/\bdu matin\b/);
      if(am) eaten.push(am[0]);
      eaten.push(tm[0]); d.setHours(H, M, 0, 0); hasTime = true;
    }
  }

  /* --- le moment de la journée : « demain matin », « vendredi soir », « à midi » --- */
  if(!hasTime && (m = eat(/\b(?:ce |cet |cette |le |la |a |de la )?(matinee|matin|midi|minuit|apres[- ]midi|aprem|soiree|soir|nuit)\b/))){
    const key = m[1].replace('apres-midi','apres-midi').replace('apres midi','apres-midi');
    const h = PART[key] ?? PART[key.replace('-',' ')];
    if(h !== undefined){
      d.setHours(h, 0, 0, 0); hasTime = true;
      if(!hasDay){ hasDay = true; if(d <= now) d.setDate(d.getDate()+1); }
    }
  }

  return done();
}

/* --- Les verbes d'un créateur au travail. --- */
const VERBS = ['fini','termin','achev','boucl','fair','fais','fass','ref','pay','regl','rembours','factur',
 'envoy','envoi','transmet','soumet','publi','depos','post','partag','upload','export','import',
 'corrig','fix','repar','test','essay','verifi','check','relir','valid','revoir','revois',
 'relanc','recontact','contact','appel','ecrir','ecris','repond','demand','prevenir','previen',
 'achet','command','vend','negoci','renouvel','annul','resili','reserv','planifi','organis','prepar',
 'creer','cree','construir','construis','build','deploy','install','configur','optimis','nettoy',
 'rang','tri','class','compar','analys','mesur','calcul','budget','sauvegard','backup','archiv',
 'ajout','retir','supprim','chang','modifi','mettre','met','lanc','demarr','arret','stop',
 'mont','edit','rendre','stream','film','regarder','regard','lire','lis','suivre','suiv','boost','promouvoir'];
const VERB_RE = new RegExp('^(?:' + VERBS.join('|') + ')');
const NOT_VERBS = /^(bonjour|salut|coucou|merci|oui|non|ok|hey|yo|hier|super|cher|mer|fier|leger|premier|dernier|entier|papier|metier|quartier|hiver|amer|clair|noir|soir|faire-part)$/;

function looksLikeTask(raw){
  const words = strip(raw).replace(/[^a-z0-9'\s-]/g,' ').trim().split(/\s+/).filter(Boolean);
  if(!words.length) return false;
  if(NOT_VERBS.test(words[0])) return false;
  const w = words[0].replace(/^(re|r)(?=[a-z]{4})/, '');
  if(VERB_RE.test(w) || VERB_RE.test(words[0])) return true;   // « finir », « payer » : un mot suffit
  if(words.length < 2) return false;
  return /(?:er|ir|re|oir)$/.test(words[0]);
}

/* Une phrase qui décrit un état, pas une action : c'est une note. */
const STATE = /\b(est|sont|etait|etaient|sera|seront|ai|as|ont|avait|prend|prennent|coute|coutent|vaut|valent|gagne|gagnent|rapporte|rapportent|fait|font|cloture|termine|commence|passe|represente|correspond|equivaut|reste|dure|contient|utilise|s'appelle|signifie|sort|sortent|paie|paient|repond|repondent)\b/;
const DET   = /^(le|la|les|l'|un|une|des|du|de|mon|ma|mes|ton|ta|tes|son|sa|ses|notre|nos|ce|cet|cette|ces|il|elle|on|ils|elles|nous|vous|ca|cela)$/;

function looksLikeNote(raw){
  const t = strip(raw);
  const words = t.replace(/[^a-z0-9'\s-]/g,' ').trim().split(/\s+/).filter(Boolean);
  if(words.length < 3) return false;
  if(STATE.test(t)) return true;
  return DET.test(words[0]) && words.length >= 4;
}

/* --- Les portes d'entrée, tolérantes aux fautes --- */
const TASK_TRIG = /^\s*(rap+el+e?z?[- ]?(?:moi|nous)|rap+el+e?z?\b|n'?oubli[ez]+\s+pas|pense[zr]?[- ]?y|pense[zr]?|tache\s*:?|todo\s*:?)\s*(?:de\s+|d'|qu'|que\s+|[aà]\s+)?/i;
const DUTY_TRIG = /^\s*(je\s+dois|j'?ai\s+[aà]\s|il\s+faut(?:\s+que\s+je|\s+que\s+j'|\s+qu'on)?|faut(?:\s+que\s+je|\s+qu'on)?|j'?ai\s+besoin\s+d[e']|[aà]\s+faire\s*:?)\s*(?:de\s+|d')?/i;
const NOTE_TRIG = /^\s*(note[rz]?\s*(?:que\s+|:\s*)?|retiens?\s*(?:que\s+)?|souviens[- ]toi\s*(?:que\s+)?|pour\s+info\s*:?\s*|info\s*:\s*|[aà]\s+savoir\s*:?\s*)/i;
const FORGET    = /^\s*(annule[rz]?|oublie[rz]?|supprime[rz]?|efface[rz]?|enleve[rz]?|retire[rz]?|vire[rz]?)\s+/i;
const QUESTION  = /^\s*(combien|comment|quand|pourquoi|qui\s|quoi|quel|quelle|quels|quelles|ou\s+(est|sont)|est-ce|qu'est-ce|c'est\s+quoi|y\s+a-t-il)/i;
const URGENT    = /\b(urgent(?:e|es|s)?|asap|au plus vite|en urgence|tres important|important)\b/;

const clean = w => w.replace(/\s+/g,' ')
  .replace(/^\s*[:,\-–]\s*/,'')
  .replace(/^\s*(de|d'|à|a|au|aux|que|qu')\s+/i,'')
  .replace(/\s+(avant|pour|d'ici|vers|jusqu'a|jusqu'à|le|la|les|du|de|à|a|et)\s*$/i,'')
  .replace(/[\s,.;:–-]+$/,'').trim();

/* Comprend un message. Le type se déduit, on ne le demande jamais. */
function read(raw){
  const q0 = raw.trim();
  if(!q0) return { kind:'vide' };
  const flat0 = strip(q0);

  /* 1. Une question ? Il répondra avec ce qu'il sait. */
  if(QUESTION.test(flat0) || /\?\s*$/.test(q0)) return { kind:'question', what:q0, sure:true };

  /* 2. Un ordre d'oublier ? */
  const fm = flat0.match(FORGET);
  if(fm){
    const target = clean(q0.slice(fm[0].length).replace(/^(le\s+|la\s+|les\s+|mon\s+|ma\s+)?(rappel|tache|tâche|note|truc)\s*(de\s+|sur\s+|du\s+|d')?/i,''));
    return target ? { kind:'oubli', what:target, sure:true } : { kind:'incomplet' };
  }

  /* 3. L'urgence se retire avant tout : elle qualifie, elle ne classe pas. */
  let q = q0, urgent = false;
  const um = strip(q).match(URGENT);
  if(um){
    urgent = true;
    const i = strip(q).indexOf(um[0]);
    q = (q.slice(0, i) + q.slice(i + um[0].length)).replace(/\s+/g,' ').trim();
    q = q.replace(/^\s*[:,\-–]\s*/,'').replace(/\s*[:,\-–]\s*$/,'').trim();
  }
  if(!q) return { kind:'incomplet' };

  const flat = strip(q);
  const when = readWhen(q);

  let kind = null, trig = null;
  if(NOTE_TRIG.test(flat))       { kind = 'note';  trig = NOTE_TRIG; }
  else if(TASK_TRIG.test(flat))  { kind = 'tache'; trig = TASK_TRIG; }
  else if(DUTY_TRIG.test(flat))  { kind = 'tache'; trig = DUTY_TRIG; }
  else if(looksLikeTask(q))      { kind = 'tache'; }
  else if(looksLikeNote(q))      { kind = 'note';  }
  else if(when.due)              { kind = 'tache'; }
  else return { kind:'inconnu' };

  let what = trig ? q.replace(new RegExp(trig.source, 'i'), '') : q;
  for(const bit of when.eaten){
    const i = strip(what).indexOf(bit);
    if(i >= 0) what = what.slice(0, i) + what.slice(i + bit.length);
  }
  what = clean(what);
  if(!what) return { kind: trig ? 'incomplet' : 'inconnu' };

  return {
    kind, urgent,
    sure: !!(trig || when.due || urgent),
    what: what.charAt(0).toUpperCase() + what.slice(1),
    due: when.due, hasTime: when.hasTime,
    repeat: when.repeat, before: when.before, past: when.past,
  };
}

/* ---- mise en mots d'une échéance ---- */
const HM = d => d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
function whenLabel(due, hasTime=true, repeat=null){
  if(!due) return 'sans échéance';
  const h = hasTime ? ' à ' + HM(due) : '';
  if(repeat === 'jour')    return 'tous les jours' + h;
  if(repeat === 'semaine') return 'chaque ' + due.toLocaleDateString('fr-FR',{weekday:'long'}) + h;
  if(repeat === 'mois')    return 'chaque mois le ' + due.getDate() + h;
  const now = new Date();
  const day = x => new Date(x.getFullYear(), x.getMonth(), x.getDate());
  const gap = Math.round((day(due) - day(now)) / 86400000);
  if(gap === 0)  return "aujourd'hui" + h;
  if(gap === 1)  return 'demain' + h;
  if(gap === -1) return 'hier' + h;
  if(gap < 0)    return 'le ' + due.toLocaleDateString('fr-FR',{day:'numeric',month:'short'}) + h;
  if(gap < 7)    return due.toLocaleDateString('fr-FR',{weekday:'long'}) + h;
  return 'le ' + due.toLocaleDateString('fr-FR',{day:'numeric',month:'long'}) + h;
}

/* Chaque bulle vivante est pilotée par un Blob */
class Blob {
  constructor(host){
    host.innerHTML = blobSVG();
    this.el = host.querySelector('.blob');
    this.eyes = [...this.el.querySelectorAll('.eye')];
    this.mood = 'idle';
    this.locked = false;
    if(!reduce){ this.loopBlink(); this.loopIdle(); }
  }
  /* --- clignement : deux battements rapprochés de temps en temps --- */
  loopBlink(){
    const next = 2200 + Math.random()*3600;
    this._b = setTimeout(async ()=>{
      await this.blink();
      if(Math.random() < .3){ await wait(140); await this.blink(); }
      this.loopBlink();
    }, next);
  }
  async blink(){
    if(this.mood === 'sleep' || this.mood === 'shut') return;
    this.el.classList.add('blink');
    await wait(105);
    this.el.classList.remove('blink');
  }
  /* --- regard baladeur quand personne ne bouge la souris --- */
  loopIdle(){
    this._i = setTimeout(()=>{
      if(!this.locked && Date.now() - LAST_MOVE > 2400){
        const a = Math.random()*Math.PI*2, r = 2 + Math.random()*3.4;
        this.look(Math.cos(a)*r, Math.sin(a)*r*.7);
        if(Math.random() < .22) this.flash('curious', 1100);
      }
      this.loopIdle();
    }, 1600 + Math.random()*1800);
  }
  look(x, y){
    this.eyes.forEach(e => e.style.transform = `translate(${x.toFixed(2)}px, ${y.toFixed(2)}px)`);
  }
  set(m){
    this.el.classList.remove('ex-happy','ex-squint','ex-wow','ex-think','ex-sleep','ex-curious','ex-shut');
    this.mood = m;
    if(m !== 'idle') this.el.classList.add('ex-' + m);
  }
  flash(m, ms=900){
    this.set(m);
    clearTimeout(this._f);
    this._f = setTimeout(()=>{ if(this.mood === m) this.set('idle'); }, ms);
  }
  destroy(){ clearTimeout(this._b); clearTimeout(this._i); clearTimeout(this._f); const i = LIVE.indexOf(this); if(i>=0) LIVE.splice(i,1); }
  night(on){ this.el.classList.toggle('night', !!on); }
  tone(t){
    this.el.classList.remove('tone-green','tone-orange','tone-red','tone-purple');
    if(t !== 'blue') this.el.classList.add('tone-' + t);
    const host = this.el.closest('[data-tone-host]');   // la pastille suit
    if(host) host.dataset.tone = t;
  }
  bounce(){
    this.el.classList.remove('bounce'); void this.el.offsetWidth;
    this.el.classList.add('bounce');
    setTimeout(()=>this.el.classList.remove('bounce'), 560);
  }
}

/* --- la bulle suit le curseur --- */
let LAST_MOVE = 0;
const LIVE = [];
function eyesTo(e){
  LAST_MOVE = Date.now();
  if(reduce) return;
  for(const b of LIVE){
    if(b.locked) continue;
    const r = b.el.getBoundingClientRect();
    if(!r.width) continue;
    const dx = e.clientX - (r.left + r.width/2);
    const dy = e.clientY - (r.top + r.height/2);
    const d = Math.hypot(dx, dy) || 1;
    const amp = Math.min(d/26, 4.6);
    b.look(dx/d*amp, dy/d*amp*.75);
  }
}
window.addEventListener('pointermove', eyesTo, {passive:true});
window.addEventListener('pointerdown', eyesTo, {passive:true});

  }

  /* Un ordre d'oublier : il montre ce qu'il s'apprête à jeter. */

  /* Il a un indice franc : il montre ce qu'il a compris, prêt à ranger. */

                                              : 'Je vous préviens <b>' + whenLabel(ASK_READ.due, ASK_READ.hasTime) + '</b>')

          }${ASK_READ.urgent ? ' · <span class="urg">Urgent</span>' : ''}${ASK_READ.before && ASK_READ.due ? ' <span style="opacity:.7">(échéance)</span>' : ''}</div>
        </div>

  /* Il a deviné tout seul : il demande avant de ranger. */
  if(ASK_READ.kind === 'tache' || ASK_READ.kind === 'note'){
    const q0 = strip(raw.trim());
    const clash = ACTIONS().filter(a => strip(a.label).includes(q0));
    if(!clash.length){
      const isNote = ASK_READ.kind === 'note';
      ASK_HITS = [];
      list.innerHTML = `<div class="ask-sec">${isNote ? 'On dirait une note' : 'On dirait une tâche'}</div>

            : 'Ajoutez « demain », « vendredi », « \u00e0 18h »\u2026 et je vous pr\u00e9viens \u00e0 l\u2019heure.'}</div>
        </div>`;
      return;
    }
  }
  if(ASK_READ.kind === 'incomplet'){
    ASK_HITS = [];
    list.innerHTML = `<div class="ask-none">Garder quoi ? \u00c9crivez la suite \u2014 « finir les textures du lobby vendredi ».</div>`;

  const q = strip(raw.trim());

  const acts = ACTIONS().filter(a => !q || strip(a.label).includes(q));
  ASK_HITS = [
    ...hitT.map(n => ({ note:n })),
    ...hitN.map(n => ({ note:n })),

  if(ASK_CUR >= ASK_HITS.length) ASK_CUR = 0;

  if(!ASK_HITS.length && raw.trim()){

  ASK_HITS.forEach((h,i)=>{

      </button>`;
    } else {
      html += `<button class="ask-row ${i===ASK_CUR?'cursor':''} ${h.act.done?'done':''}" data-ask="${i}">
        <span>${esc(h.act.label)}</span>
        <svg class="go" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M7 17L17 7M8 7h9v9"/></svg>
      </button>`;
    }
  });
  /* Au repos, il ouvre son vocabulaire : il ne comprend pas encore tout, autant le dire. */
  if(!q) html += `<div class="ask-sec">Ce que je comprends</div>` + skillsHTML();
  list.innerHTML = html;
}

async function submitAsk(){
  const r = ASK_READ;
  if(r && r.kind === 'question'){ BUB.flash('think', 900); return; }
  if(r && r.kind === 'oubli'){

    closeAsk(); await working(); await forget(hit.id);
    BUB.tone('blue'); BUB.flash('squint', 900);
    return;
  }
  if(r && (r.kind === 'tache' || r.kind === 'note') && !ASK_HITS.length)
    return remember(r.kind, r.what, r.due, r.hasTime, r.repeat, r.urgent);

  closeAsk();

  BUB.tone('blue'); BUB.flash('happy', 900);

/* ================= Ce qu'il sait répondre ================= */
const STOP = /^(que|qui|quoi|quel|quelle|dans|pour|avec|sans|mais|donc|est|sont|les|des|une|mon|ma|mes|ce|cette|il|elle|sur|the|and|moi|nous|vous|ai|as|a|de|du|la|le|en|au)$/;
const keywords = q => strip(q).replace(/[^a-z0-9'\s-]/g,' ').split(/\s+/)
  .filter(w => w.length >= 3 && !STOP.test(w));

function answerQ(q){
  const t = strip(q);
  const T = tasks(), N = memos();

  if(/\b(tache|taches|faire|todo)\b/.test(t) && /\b(combien|quoi|qu'est-ce|que|reste|quelle)\b/.test(t)){
    if(/aujourd/.test(t)){
      const end = new Date(); end.setHours(23,59,59);
      const now = Date.now();
      const day = T.filter(n => n.due && n.due <= +end);
      return { text: day.length ? `${day.length} tâche${day.length>1?'s':''} pour aujourd'hui.` : "Rien de daté pour aujourd'hui.", items: day };
    }
    return { text: T.length ? `${T.length} tâche${T.length>1?'s':''} en attente.` : "Aucune tâche. Vous êtes à jour.", items: T.slice(0,4) };
  }
  if(/\bnotes?\b/.test(t) && /\b(combien|quelle|quelles)\b/.test(t))
    return { text: N.length ? `${N.length} note${N.length>1?'s':''} en mémoire.` : 'Aucune note.', items: N.slice(0,4) };

  /* recherche dans tout ce qu'il connaît */
  const ks = keywords(q);
  if(ks.length){
    const scored = [...N, ...T].map(n => {
      const h = strip(n.what);
      return { n, s: ks.filter(k => h.includes(k)).length };
    }).filter(x => x.s > 0).sort((a,b) => b.s - a.s);
    if(scored.length) return { text: scored.length === 1 ? 'Voilà ce que j\u2019ai :' : 'Voilà ce que j\u2019ai là-dessus :', items: scored.slice(0,4).map(x => x.n) };
  }
  return { text: null };
}

/* ---- L'artefact qui sort de Grid et va se ranger ---- */
function flyMem(kind){
  const from = $('gtBlob'), to = $(MEM[kind].orb);
  if(!from || !to || !to.offsetParent) return;
  const a = from.getBoundingClientRect(), b = to.getBoundingClientRect();
  if(!a.width || !b.width) return;

  const S = 20;
  const ax = a.left + a.width/2 - S/2, ay = a.top + a.height/2 - S/2;
  const bx = b.left + b.width/2 - S/2, by = b.top + b.height/2 - S/2;

  const fly = document.createElement('div');
  fly.className = 'fly';
  const core = document.createElement('i');
  core.style.width = core.style.height = S + 'px';
  core.style.background = kind === 'note'
    ? 'radial-gradient(circle at 38% 32%, #EFEAFF, #7C6CF0)'
    : 'radial-gradient(circle at 38% 32%, #FFF3CE, #FFB800)';
  core.style.boxShadow = '0 0 18px ' + (kind === 'note' ? 'rgba(124,108,240,.7)' : 'rgba(255,184,0,.7)');
  fly.appendChild(core);
  document.body.appendChild(fly);

  fly.style.transform  = `translate(${ax}px, 0)`;
  core.style.transform = `translateY(${ay}px) scale(0)`;
  void fly.offsetWidth;

  /* 1 — la bulle naît à côté de Grid, et on la voit naître */
  fly.classList.add('pop');
  core.style.transform = `translateY(${ay}px) scale(1)`;
  BUB.bounce();

  setTimeout(()=>{
    /* 2 — elle part vers la droite, en arc */
    fly.classList.remove('pop');
    fly.classList.add('go');
    fly.style.transform  = `translate(${bx}px, 0)`;
    core.style.transform = `translateY(${by}px) scale(.5)`;
    BUB.look(bx > ax ? 4.6 : -4.6, -1.2);          // Grid la suit du regard

    setTimeout(()=>{
      core.style.opacity = '0';                     // elle ne s'efface qu'en arrivant
      const orb = $(MEM[kind].orb);
      orb.classList.remove('land'); void orb.offsetWidth; orb.classList.add('land');
      setTimeout(()=> fly.remove(), 260);
    }, 700);
  }, 480);
}

async function remember(kind, what, due, hasTime, repeat, urgent){
  /* Il ne note pas deux fois la même chose. */
  const twin = NOTES.find(n => !n.done && n.kind === kind && strip(n.what) === strip(what));
  if(twin){
    closeAsk();
    BUB.flash('curious', 1200);
    return;
  }
  NOTES.push({
    id: Date.now() + '-' + Math.random().toString(36).slice(2,7),
    kind, what, due: due ? due.getTime() : null, hasTime: !!hasTime,
    repeat: repeat || null, urgent: !!urgent,
    done:false, fired:false, created: Date.now(),
  });
  closeAsk();
  await working();
  await saveNotes();
  paintMem(); refreshCal();   // l'artefact apparaît d'abord…
  await wait(60);
  flyMem(kind);               // …puis Grid lui envoie sa bille
  paintBadge();
  await noted();
  BUB.look(0, 0);
}

async function forget(id){
  NOTES = NOTES.filter(n => n.id !== id);
  await saveNotes(); paintMem(); paintBadge(); repaintMemPops(); refreshCal();
}
const PERIOD = { jour:1, semaine:7, mois:0 };
async function finishNote(id){
  const n = NOTES.find(x => x.id === id);
  if(!n) return;
  if(n.repeat && n.due){
    /* Une tâche qui revient ne se termine pas : elle se rejoue. */
    const d = new Date(n.due);
    if(n.repeat === 'mois') d.setMonth(d.getMonth()+1);
    else d.setDate(d.getDate() + PERIOD[n.repeat]);
    while(d <= Date.now()){ n.repeat === 'mois' ? d.setMonth(d.getMonth()+1) : d.setDate(d.getDate() + PERIOD[n.repeat]); }
    n.due = +d; n.fired = false;
    await saveNotes(); paintMem(); paintBadge(); repaintMemPops(); refreshCal(); paintAsk();
    BUB.tone('green'); BUB.flash('happy', 1100);
    setTimeout(()=>BUB.tone('blue'), 1200);
    return;
  }
  n.done = true; n.doneAt = Date.now();
  await saveNotes();
  paintMem(); paintBadge(); repaintMemPops(); paintAsk(); refreshCal();
  BUB.tone('green'); BUB.flash('happy', 1100);
  setTimeout(()=>BUB.tone('blue'), 1200);
}
function repaintMemPops(){
  for(const [k,m] of Object.entries(MEM))
    if($(m.pop).classList.contains('on')) popSize($(m.pop), memHTML(k), 290);
}

for(const [k, m] of Object.entries(MEM)){
  $(m.orb).addEventListener('click', e=>{
    e.stopPropagation();
    const pop = $(m.pop);
    if(pop.classList.contains('on')) return closePop(pop, $(m.orb));
    openPop(pop, $(m.orb));
    popSize(pop, memHTML(k), 290);
  });
  $(m.pop).addEventListener('click', e=>{
    const kill = e.target.closest('[data-kill]');
    if(kill){ e.stopPropagation(); return forget(kill.dataset.kill); }
    const done = e.target.closest('[data-domem]');
    if(done){ e.stopPropagation(); return finishNote(done.dataset.domem); }
  });
}

  if(b.dataset.nudge === 'done'){
    if(n.kind === 'note'){ n.due = null; n.fired = true; await saveNotes(); paintMem(); paintBadge(); BUB.flash('happy', 900); }
    else await finishNote(n.id);
  }
  else {
    n.due = Date.now() + 10*60*1000; n.fired = false;
    await saveNotes(); paintBadge();
    BUB.flash('curious', 900);
  }
  setTimeout(checkDue, 1800);   // un autre attend peut-être son tour
});

function checkDue(){
  if(!$('shell').classList.contains('on')) return;
  paintBadge();
  const n = pending().find(x => x.due && x.due <= Date.now() && !x.fired);
  if(!n || $('nudge').classList.contains('on')) return;
  n.fired = true; saveNotes();
  showNudge(n);
}

document.addEventListener('keydown', e=>{
  if(!$('shell').classList.contains('on')) return;
  if((e.metaKey || e.ctrlKey) && (e.key||'').toLowerCase() === 'k'){
    e.preventDefault();
    return $('ask').classList.contains('on') ? closeAsk() : openAsk();
  }
  if(e.key === 'Escape') return closeAll();
  if(!e.altKey || e.ctrlKey || e.metaKey) return;
  const k = (e.key || '').toUpperCase();
  if(k === 'W'){ e.preventDefault(); return closeTab(ACTIVE); }
  const hit = Object.entries(META).find(([,m]) => m.key === k);
  if(hit){ e.preventDefault(); go(hit[0]); }
});
