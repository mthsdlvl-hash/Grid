<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>brain</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas {
    display: block;
    touch-action: none;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
const DPR = Math.min(window.devicePixelRatio || 1, 2);

function resize() {
  const s = Math.min(window.innerWidth, window.innerHeight);
  canvas.style.width = s + 'px';
  canvas.style.height = s + 'px';
  canvas.width = s * DPR;
  canvas.height = s * DPR;
  gl.viewport(0, 0, canvas.width, canvas.height);
}
resize();
window.addEventListener('resize', resize);

const VS = `
attribute vec2 a_pos;
void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }
`;

const FS = `
precision highp float;
uniform float u_time;
uniform vec2 u_res;

#define PI 3.14159265358979
#define TAU 6.28318530717959

/* ---- noise helpers ---- */
vec3 hash3(vec3 p) {
  p = fract(p * vec3(443.8975, 397.2973, 491.1871));
  p += dot(p.zxy, p.yxz + 19.19);
  return fract(vec3(p.x*p.y, p.y*p.z, p.z*p.x) * 2.46);
}
float noise(vec3 p) {
  vec3 i = floor(p), f = fract(p);
  f = f*f*(3.0-2.0*f);
  return mix(
    mix(mix(dot(hash3(i+vec3(0,0,0))-.5,f-vec3(0,0,0)),dot(hash3(i+vec3(1,0,0))-.5,f-vec3(1,0,0)),f.x),
        mix(dot(hash3(i+vec3(0,1,0))-.5,f-vec3(0,1,0)),dot(hash3(i+vec3(1,1,0))-.5,f-vec3(1,1,0)),f.x),f.y),
    mix(mix(dot(hash3(i+vec3(0,0,1))-.5,f-vec3(0,0,1)),dot(hash3(i+vec3(1,0,1))-.5,f-vec3(1,0,1)),f.x),
        mix(dot(hash3(i+vec3(0,1,1))-.5,f-vec3(0,1,1)),dot(hash3(i+vec3(1,1,1))-.5,f-vec3(1,1,1)),f.x),f.y),
    f.z);
}
float fbm(vec3 p) {
  float v=0., a=0.5;
  for(int i=0;i<5;i++){ v+=a*noise(p); p=p*2.1+vec3(1.7,9.2,3.1); a*=0.5; }
  return v;
}

/* ---- rotation ---- */
mat3 rotY(float a){ float c=cos(a),s=sin(a); return mat3(c,0,s,0,1,0,-s,0,c); }
mat3 rotX(float a){ float c=cos(a),s=sin(a); return mat3(1,0,0,0,c,-s,0,s,c); }
mat3 rotZ(float a){ float c=cos(a),s=sin(a); return mat3(c,-s,0,s,c,0,0,0,1); }

/* ---- SDF: organic glass sphere ---- */
float sdSphere(vec3 p, float r){ return length(p)-r; }

float warp(vec3 p, float t){
  float n = fbm(p*1.8 + vec3(t*0.12, t*0.09, t*0.07));
  float n2 = fbm(p*2.6 - vec3(t*0.08, t*0.13, t*0.05));
  return n*0.18 + n2*0.10;
}

float scene(vec3 p, float t){

    vec3 q = p;

    q *= rotY(t * 0.08);
    q *= rotX(t * 0.04);

    float sphere =
        sdSphere(q, 0.72);

    sphere += warp(q, t);

    return sphere;
}

float layerScene(vec3 p, float t, float offset){

    vec3 q = p;

    q *= rotY(t * 0.12 + offset * 2.0);
    q *= rotX(offset * 1.3);

    float ribbon =
        abs(length(q.xy) - (0.42 + offset * 0.08));

    ribbon +=
        sin(q.z * 6.0 + t * 0.4 + offset * 8.0)
        * 0.03;

    return ribbon;
}

/* ---- normals ---- */
vec3 calcNormal(vec3 p, float t){
  vec2 e = vec2(0.001, 0.0);
  return normalize(vec3(
    scene(p+e.xyy,t)-scene(p-e.xyy,t),
    scene(p+e.yxy,t)-scene(p-e.yxy,t),
    scene(p+e.yyx,t)-scene(p-e.yyx,t)
  ));
}

/* ---- caustic shimmer ---- */
float caustic(vec3 p, float t){
  float c = 0.0;
  c += sin(p.x * 8.0 + t * 0.7) * sin(p.y * 6.0 + t * 0.5) * 0.5 + 0.5;
  c += sin(p.x * 14.0 - t * 0.4 + p.z * 5.0) * 0.25 + 0.25;
  c = pow(c * 0.5, 2.2);
  return c;
}

/* ---- specular highlight ---- */
float specular(vec3 n, vec3 l, vec3 v, float power){
  vec3 h = normalize(l + v);
  return pow(max(dot(n, h), 0.0), power);
}

void main(){
  vec2 uv = (gl_FragCoord.xy / u_res.xy) * 2.0 - 1.0;
  float t = u_time;

  /* levitation */
  float lev = sin(t * 0.55) * 0.028 + sin(t * 0.31) * 0.012;

  /* slow global rotation */
  float slowRot = t * (TAU / 25.0);
  mat3 globalRot = rotY(slowRot) * rotX(sin(t * 0.18) * 0.15) * rotZ(sin(t * 0.13) * 0.06);

  /* ray */
  vec3 ro = vec3(0.0, lev, 2.4);
  vec3 rd = normalize(vec3(uv * 0.7, -1.0));
  rd = rotY(sin(t*0.07)*0.04) * rd;

  /* march */
  float dist = 0.0;
  bool hit = false;
  vec3 p;
  for(int i = 0; i < 96; i++){
    p = ro + rd * dist;
    p = globalRot * p;
    float d = scene(p, t);
    if(d < 0.0008){ hit = true; break; }
    if(dist > 6.0) break;
    dist += d * 0.55;
  }

  vec3 col = vec3(0.0);

  if(hit){
    vec3 n = calcNormal(p, t);
    vec3 v = normalize(ro - p);

    /* pulse intensity */
    float pulse = 0.5 + 0.5 * sin(t * 1.1) * sin(t * 0.73) * 0.6 + 0.4;
    float pulse2 = 0.5 + 0.5 * sin(t * 0.8 + 1.2);

    /* multiple light sources */
    vec3 l1 = normalize(vec3(-1.2, 1.4, 1.8));   /* main blue-white */
    vec3 l2 = normalize(vec3(1.8, -0.6, 1.0));    /* cyan right */
    vec3 l3 = normalize(vec3(0.0, -1.5, 0.8));    /* deep purple under */
    vec3 l4 = normalize(vec3(-0.5, 0.8, -1.0));   /* back rim */

    float diff1 = max(dot(n, l1), 0.0);
    float diff2 = max(dot(n, l2), 0.0);
    float diff3 = max(dot(n, l3), 0.0);

    /* specular highlights */
    float spec1 = specular(n, l1, v, 180.0) * 0.9;
    float spec2 = specular(n, l2, v, 320.0) * 0.7;
    float spec3 = specular(n, l1, v, 2200.0) * 1.1; /* sharp hotspot */
    float spec4 = specular(n, l4, v, 90.0) * 0.4;   /* rim glow */

    /* fresnel */
    float fresnel = pow(1.0 - max(dot(n, v), 0.0), 3.8);
    float fresnelSharp = pow(1.0 - max(dot(n, v), 0.0), 1.4);

    /* caustics on surface */
    float caust = caustic(p * 2.0 + vec3(0.0, 0.0, t * 0.06), t);

    /* base color — deep blue-black interior */
    vec3 baseCol = mix(
      vec3(0.01, 0.02, 0.09),
      vec3(0.04, 0.09, 0.28),
      fresnelSharp * 0.5
    );

    /* depth layers — inner structure */
    float innerFbm = fbm(p * 1.4 + vec3(t*0.06, t*0.04, t*0.05));
    vec3 innerCol = mix(
      vec3(0.02, 0.04, 0.18),
      vec3(0.08, 0.18, 0.55),
      innerFbm
    );

    /* ribbon layer sampling */
    float ribbonN = 0.0;
    for(int li = 0; li < 6; li++){
      float lo = float(li) * 0.7;
      float ld = abs(layerScene(p, t, lo));
      ribbonN += exp(-ld * 45.0) * (0.4 - float(li) * 0.1);
    }
    ribbonN = clamp(ribbonN, 0.0, 1.0);

    vec3 ribbonCol = mix(
    vec3(0.02,0.03,0.25),
    vec3(0.0,0.75,1.0),
      ribbonN
    );

    /* assemble diffuse */
    col = baseCol;
    col = mix(col, innerCol, 0.6);
    col += ribbonCol * ribbonN * 0.55 * pulse2;
    col += vec3(0.04, 0.12, 0.45) * diff1 * 0.5;
    col += vec3(0.0, 0.25, 0.45) * diff2 * 0.35;
    col += vec3(0.08, 0.02, 0.35) * diff3 * 0.25;

    /* caustic shimmer */
    col += vec3(0.0, 0.35, 0.6) * caust * 0.25 * pulse;
    col += vec3(0.1, 0.25, 0.8) * caust * caust * 0.15;

    /* specular layers */
    col += vec3(0.4, 0.65, 1.0) * spec1 * pulse;
    col += vec3(0.0, 0.9, 1.0) * spec2 * 0.8;         /* cyan highlight */
    col += vec3(0.85, 0.92, 1.0) * spec3;              /* sharp white hotspot */
    col += vec3(0.2, 0.5, 1.0) * spec4 * fresnelSharp; /* rim */

    /* fresnel edge glow — cyan */
    col += vec3(0.0, 0.75, 1.0) * fresnel * 0.65 * (0.7 + 0.3 * pulse);
    col += vec3(0.15, 0.3, 1.0) * fresnel * fresnel * 0.45;

    /* internal pulse glow */
    float innerGlow = exp(-length(p) * 2.2);
    col += vec3(0.05, 0.1, 0.5) * innerGlow * pulse * 0.8;
    col += vec3(0.0, 0.2, 0.6) * innerGlow * innerGlow * 0.5;

    /* light waves traveling across surface */
    float wave1 = sin(dot(n, vec3(1,0,0)) * 12.0 + t * 1.4) * 0.5 + 0.5;
    float wave2 = sin(dot(n, vec3(0,1,0.5)) * 9.0 - t * 0.9 + 1.0) * 0.5 + 0.5;
    float waves = wave1 * wave2;
    col += vec3(0.0, 0.4, 0.8) * waves * waves * 0.08;

    /* tonal grading — push toward cinematic */
    col = pow(col, vec3(0.88));
    col *= vec3(0.85, 0.92, 1.0); /* cool cast */

    /* vignette sphere edge */
    col *= 1.0 - fresnel * 0.15;
  }

  /* background vignette only, pure black */
  float vign = 1.0 - dot(uv * 0.6, uv * 0.6);
  if(!hit) {
    col = vec3(0.0);
  }

  /* subtle ambient scatter outside sphere */
  if(!hit){
    float d2sphere = length(uv) - 0.52;
    float halo = exp(-max(d2sphere,0.0) * 14.0);
    col += vec3(0.0, 0.12, 0.35) * halo * 0.18;
    float halo2 = exp(-max(d2sphere,0.0) * 5.0);
    col += vec3(0.0, 0.05, 0.15) * halo2 * 0.08;
  }

  col = clamp(col, 0.0, 1.0);
  gl_FragColor = vec4(col, 1.0);
}
`;

function compile(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src); gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
  return s;
}
const prog = gl.createProgram();
gl.attachShader(prog, compile(gl.VERTEX_SHADER, VS));
gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, FS));
gl.linkProgram(prog);
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
const loc = gl.getAttribLocation(prog, 'a_pos');
gl.enableVertexAttribArray(loc);
gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

const uTime = gl.getUniformLocation(prog, 'u_time');
const uRes = gl.getUniformLocation(prog, 'u_res');

const start = performance.now();
function frame() {
  const t = (performance.now() - start) / 1000;
  gl.uniform1f(uTime, t);
  gl.uniform2f(uRes, canvas.width, canvas.height);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(frame);
}
frame();
</script>
</body>
</html>
