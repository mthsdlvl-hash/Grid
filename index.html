<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grid — en travaux</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Familjen+Grotesk:wght@400;500;600;700&family=Inter+Tight:wght@400;450;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EDEEF0; --card:#FFFFFF; --ink:#15171C; --dim:#3A3F4A; --muted:#8C919B; --hair:#E3E5E9;
    --amber:#FFC42E;
    --display:"Familjen Grotesk",-apple-system,BlinkMacSystemFont,sans-serif;
    --body:"Inter Tight",-apple-system,BlinkMacSystemFont,sans-serif;
    --mono:"JetBrains Mono",ui-monospace,monospace;
    /* Grid, en travaux : sa teinte orange */
    --blob-1:#FFF8EE; --blob-2:#FFC486; --blob-3:#F07C1E; --blob-eye:#FFFAF3;
    --dot-c:#FF9A22; --dot-soft:rgba(255,154,34,.34);
  }
  @media (prefers-color-scheme: dark){
    :root{ --paper:#0F1115; --card:#171A20; --ink:#EDEFF2; --dim:#C3C7CF; --muted:#7A808C; --hair:#252932; }
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--paper);color:var(--ink);font-family:var(--body);
    min-height:100dvh;display:grid;place-items:center;padding:28px;
    -webkit-font-smoothing:antialiased;overflow:hidden;
  }

  .stage{width:100%;max-width:440px;text-align:center;position:relative;z-index:2}

  .pill{
    display:inline-flex;align-items:center;gap:8px;
    font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);
    background:var(--card);border-radius:99px;padding:7px 15px;margin-bottom:34px;
    box-shadow:inset 0 0 0 1px var(--hair), 0 4px 14px rgba(20,23,30,.05);
  }
  .pill .dot{
    width:7px;height:7px;border-radius:50%;background:var(--dot-c);
    box-shadow:0 0 0 3px var(--dot-soft), 0 0 8px var(--dot-c);
    animation:live 1.5s ease-out infinite;
  }
  @keyframes live{
    0%{box-shadow:0 0 0 3px var(--dot-soft), 0 0 8px var(--dot-c), 0 0 0 0 var(--dot-c)}
    75%{box-shadow:0 0 0 3px var(--dot-soft), 0 0 8px var(--dot-c), 0 0 0 8px transparent}
    100%{box-shadow:0 0 0 3px var(--dot-soft), 0 0 8px var(--dot-c), 0 0 0 8px transparent}
  }

  .grid-wrap{position:relative;width:150px;height:150px;margin:0 auto 8px;display:grid;place-items:center}
  .grid-wrap svg.blob{width:118px;height:118px;overflow:visible}
  /* Il flotte doucement pendant qu'il travaille */
  .float{animation:float 4.2s ease-in-out infinite}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}

  .blob .body{transform-origin:50% 56%;animation:breathe 1.1s ease-in-out infinite}
  @keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.055)}}
  .blob .eye{transition:transform .16s ease-out}
  .blob .lid{transform-box:fill-box;transform-origin:center;transform:scaleY(1)}
  .blob .lid.shut{transform:scaleY(.08)}
  .blob ellipse.eye-b{fill:var(--blob-eye)}

  /* Les engrenages qui tournent, très discrets, autour de lui */
  .tools{position:absolute;inset:-14px;pointer-events:none}
  .tools svg{position:absolute;color:var(--muted);opacity:.5}
  .gear-a{top:2px;right:6px;animation:spin 7s linear infinite}
  .gear-b{bottom:8px;left:0;animation:spin 9s linear infinite reverse}
  @keyframes spin{to{transform:rotate(360deg)}}

  h1{
    font-family:var(--display);font-weight:600;font-size:30px;letter-spacing:-.03em;
    line-height:1.12;margin-top:20px;
  }
  h1 em{font-style:normal;color:var(--muted);font-weight:500}

  /* La barre : un chantier qui avance, en boucle */
  .bar{position:relative;height:5px;border-radius:99px;background:var(--hair);overflow:hidden;margin:30px auto 0;max-width:280px}
  .bar i{position:absolute;top:0;left:0;height:100%;width:38%;border-radius:99px;
    background:linear-gradient(90deg, transparent, var(--amber), transparent);
    animation:sweep 1.9s cubic-bezier(.5,0,.5,1) infinite}
  @keyframes sweep{0%{transform:translateX(-120%)}100%{transform:translateX(340%)}}

  .foot{margin-top:34px;font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.02em}
  .foot b{color:var(--dim);font-weight:500}

  @media(max-width:480px){ h1{font-size:25px} .grid-wrap{width:132px;height:132px} .grid-wrap svg.blob{width:104px;height:104px} }
  @media (prefers-reduced-motion: reduce){ .float,.blob .body,.gear-a,.gear-b,.bar i,.pill .dot{animation:none} }
</style>
</head>
<body>
  <div class="stage">
    <div class="pill"><span class="dot"></span>Maintenance</div>

    <div class="grid-wrap">
      <div class="tools">
        <svg class="gear-a" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
          <circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5 5l2 2M17 17l2 2M19 5l-2 2M7 17l-2 2"/>
        </svg>
        <svg class="gear-b" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
          <circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5 5l2 2M17 17l2 2M19 5l-2 2M7 17l-2 2"/>
        </svg>
      </div>
      <div class="float" id="floater"></div>
    </div>

    <h1>Grid fait le ménage.<br><em>On revient très vite.</em></h1>

    <div class="bar"><i></i></div>

    <div class="foot">GRID · <b>en travaux</b> · repassez dans un moment</div>
  </div>

<script>
(function(){
  "use strict";
  var reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;

  // Le même Grid que dans l'app : halo flouté + corps en dégradé, yeux clairs.
  function blobSVG(){
    return '<svg class="blob" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">'
      + '<defs>'
      + '<radialGradient id="gg" cx="50%" cy="36%" r="68%">'
      +   '<stop offset="0" stop-color="var(--blob-1)"/>'
      +   '<stop offset=".52" stop-color="var(--blob-2)"/>'
      +   '<stop offset="1" stop-color="var(--blob-3)"/>'
      + '</radialGradient>'
      + '<filter id="gf" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="3.2"/></filter>'
      + '</defs>'
      + '<g class="body">'
      +   '<path fill="var(--blob-2)" opacity=".28" filter="url(#gf)" d="M50 6c25 0 44 18 44 43S75 95 50 95 6 74 6 49 25 6 50 6z"/>'
      +   '<path fill="url(#gg)" d="M50 5.5c24.6 0 44.5 17.6 44.5 42.8 0 26-19.5 46.7-44.5 46.7S5.5 74.3 5.5 48.3C5.5 23.1 25.4 5.5 50 5.5z"/>'
      +   '<g transform="translate(38.5,53)"><g class="eye" id="eyeL"><g class="lid" id="lidL">'
      +     '<ellipse class="eye-b" rx="7" ry="10.2"/>'
      +   '</g></g></g>'
      +   '<g transform="translate(61.5,49.5)"><g class="eye" id="eyeR"><g class="lid" id="lidR">'
      +     '<ellipse class="eye-b" rx="7.4" ry="10.8"/>'
      +   '</g></g></g>'
      + '</g>'
      + '</svg>';
  }

  var host = document.getElementById('floater');
  host.innerHTML = blobSVG();
  var eyeL = document.getElementById('eyeL'), eyeR = document.getElementById('eyeR');
  var lidL = document.getElementById('lidL'), lidR = document.getElementById('lidR');

  // Il suit le curseur du regard
  var tx = 0, ty = 0, cx = 0, cy = 0;
  function look(x, y){ tx = x; ty = y; }
  function center(){
    var r = host.getBoundingClientRect();
    return { x: r.left + r.width/2, y: r.top + r.height/2 };
  }
  window.addEventListener('pointermove', function(e){
    var c = center();
    var dx = e.clientX - c.x, dy = e.clientY - c.y;
    var d = Math.hypot(dx, dy) || 1;
    var reach = Math.min(d/26, 3.4);
    look(dx/d * reach, dy/d * reach);
  });

  // Boucle douce : les yeux glissent vers la cible
  (function loop(){
    cx += (tx - cx) * 0.16; cy += (ty - cy) * 0.16;
    eyeL.style.transform = 'translate(' + cx + 'px,' + cy + 'px)';
    eyeR.style.transform = 'translate(' + cx + 'px,' + cy + 'px)';
    requestAnimationFrame(loop);
  })();

  // Il cligne, naturellement
  function blink(){
    lidL.classList.add('shut'); lidR.classList.add('shut');
    setTimeout(function(){ lidL.classList.remove('shut'); lidR.classList.remove('shut'); }, 130);
  }
  function schedule(){
    var wait = 2400 + Math.random() * 3600;
    setTimeout(function(){
      blink();
      if(Math.random() < 0.3) setTimeout(blink, 260);   // double battement, parfois
      schedule();
    }, wait);
  }
  if(!reduce) schedule();

  // Un léger regard qui balaie de temps en temps, comme s'il inspectait son travail
  if(!reduce) setInterval(function(){
    if(Math.abs(tx) < 0.4 && Math.abs(ty) < 0.4){
      var a = Math.random() * Math.PI * 2, r = 2.4;
      look(Math.cos(a) * r, Math.sin(a) * r);
      setTimeout(function(){ look(0, 0); }, 900);
    }
  }, 3200);
})();
</script>
</body>
</html>
