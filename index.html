$('account').addEventListener('click', async e=>{
  const nav = e.target.closest('[data-acc]');
  if(nav){
    const to = nav.dataset.acc;
    if(to === 'signout') return signOut();
    return paintAcc(to);
  }
  const act = e.target.closest('[data-act]');
  if(!act) return;
  const msg = $('pMsg');
  const say = (t, ok) => { if(msg){ msg.textContent = t; msg.className = 'pan-msg ' + (ok ? 'ok' : 'err'); } };

  if(act.dataset.act === 'photo') return $('picker').click();

  if(act.dataset.act === 'nophoto'){
    SESSION.photo = null;
    USERS[SESSION.id].photo = null;
    await Store.set(K_USERS, USERS);
    paintAvatars(); paintAcc('profile');
    return;
  }

  if(act.dataset.act === 'name'){
    const v = $('pName').value.trim();
    if(v.length < 3) return say('Trois caractères minimum.');
    if(!/^[a-zA-Z0-9_.\- ]+$/.test(v)) return say('Lettres, chiffres, tirets et points uniquement.');
    const id = v.toLowerCase();
    if(id !== SESSION.id && USERS[id]) return say('Ce nom est déjà pris sur ce navigateur.');
    const rec = USERS[SESSION.id];
    delete USERS[SESSION.id];
    rec.pseudo = v;
    USERS[id] = rec;
    SESSION.id = id; SESSION.pseudo = v;
    await Store.set(K_USERS, USERS);
    await Store.set(K_SESSION, id);
    paintAvatars(); renderView();
    say('Nom enregistré.', true);
    return;
  }

  if(act.dataset.act === 'pass'){
    const oldPw = $('pOld').value, newPw = $('pNew').value;
    const u = USERS[SESSION.id];
    if(!oldPw || !newPw) return say('Remplissez les deux champs.');
    if(!eq(await hash(oldPw, u.salt), u.hash)) return say('Mot de passe actuel incorrect.');
    if(score(newPw) < 3) return say('Nouveau mot de passe trop faible.');
    const s = salt();
    u.salt = s; u.hash = await hash(newPw, s);
    await Store.set(K_USERS, USERS);
    $('pOld').value = ''; $('pNew').value = '';
    say('Mot de passe changé.', true);
  }
});

const GIF_MAX = 1.6e6;   // au-delà, le stockage du navigateur sature
$('picker').addEventListener('change', async e=>{
  const f = e.target.files?.[0];
  e.target.value = '';
  if(!f) return;
  const say = t => { const m = $('pMsg'); if(m){ m.textContent = t; m.className = 'pan-msg err'; } };
  try{
    /* Un GIF redimensionné sur un canvas perd son animation : on le garde intact. */
    const anim = f.type === 'image/gif' || f.type === 'image/webp';
    if(anim && f.size > GIF_MAX)
      return say(`GIF trop lourd (${(f.size/1048576).toFixed(1)} Mo). Maximum 1,6 Mo — sinon il ne tient pas.`);
    const url = anim ? await asDataURL(f) : await downscale(f, 256);
    SESSION.photo = url;
    USERS[SESSION.id].photo = url;
    await Store.set(K_USERS, USERS);
    paintAvatars();
    if(ACC_VIEW === 'profile') paintAcc('profile');
  }catch(err){
    if(ACC_VIEW === 'profile'){ const m = $('pMsg'); if(m){ m.textContent = 'Image illisible. Essayez un JPG ou un PNG.'; m.className='pan-msg err'; } }
  }
});
const asDataURL = file => new Promise((res, rej)=>{
  const fr = new FileReader();
  fr.onerror = rej;
  fr.onload = () => res(String(fr.result));
  fr.readAsDataURL(file);
});
function downscale(file, max){
  return new Promise((res, rej)=>{
    const img = new Image();
    const fr = new FileReader();
    fr.onerror = rej;
    fr.onload = () => { img.src = fr.result; };
    img.onerror = rej;
    img.onload = () => {
      const s = Math.min(max/img.width, max/img.height, 1);
      const w = Math.round(img.width*s), h = Math.round(img.height*s);
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      res(c.toDataURL('image/jpeg', .82));
    };
    fr.readAsDataURL(file);
  });
}
function paintAvatars(){
  $('avSmall').innerHTML = avInner();

/* ================= Entrée ================= */
const RULES = [
  { t:'8 caractères minimum', ok: p => p.length >= 8 },
  { t:'un chiffre',           ok: p => /\d/.test(p) },
  { t:'une majuscule',        ok: p => /[A-Z]/.test(p) },
  { t:'un caractère spécial', ok: p => /[^A-Za-z0-9]/.test(p) },
];
const score = p => RULES.filter(r=>r.ok(p)).length;
const LABELS = ['Trop court','Faible','Correct','Solide','Excellent'];
const COLORS = ['var(--hair)','var(--coral)','var(--amber)','var(--mint)','var(--mint)'];

const auth = $('auth'), shell = $('shell');
const fPseudo = $('pseudo'), fPass = $('pass');
let MODE = 'create';

function gaugePw(){
  const p = fPass.value, n = score(p);
  $('strength').querySelectorAll('i').forEach((el,i)=>{ el.style.background = i < n ? COLORS[n] : 'var(--hair)'; });
  const missing = RULES.filter(r=>!r.ok(p)).map(r=>r.t);
  $('strengthLab').textContent = MODE !== 'create' || !p ? ''
    : n === 4 ? LABELS[4] : `${LABELS[n]} — il manque ${missing.slice(0,2).join(' et ')}`;
  return n;
}
const showErr = m => { $('authErrTxt').textContent = m; $('authErr').classList.add('on'); };
const clearErr = () => $('authErr').classList.remove('on');

function paintAuth(){
  const create = MODE === 'create';
  $('authH').textContent = create ? 'Créez votre profil' : 'Content de vous revoir';
  $('authP').textContent = create ? 'Un pseudo, un mot de passe, et vos îles vous attendent.' : 'Entrez votre mot de passe pour déverrouiller Grid.';
  $('authBtn').textContent = create ? 'Créer le profil' : 'Ouvrir mon compte';
  fPass.autocomplete = create ? 'new-password' : 'current-password';
  $('strength').style.display = create ? 'flex' : 'none';
  $('strengthLab').style.display = create ? 'block' : 'none';
  $('authAlt').innerHTML = create
    ? 'Vous avez déjà un profil ? <button id="swap">Se connecter</button>'
    : 'Première visite ? <button id="swap">Créer un profil</button>';
  $('authNote').style.display = create ? 'block' : 'none';
  clearErr(); gaugePw();
}
$('authAlt').addEventListener('click', e=>{
  if(e.target.id === 'swap'){ MODE = MODE === 'create' ? 'login' : 'create'; paintAuth(); fPseudo.focus(); }
});
$('reveal').addEventListener('click', ()=>{
  const show = fPass.type === 'password';
  fPass.type = show ? 'text' : 'password';
  $('reveal').textContent = show ? 'Cacher' : 'Voir';
});
fPass.addEventListener('input', ()=>{ clearErr(); gaugePw(); });
fPseudo.addEventListener('input', clearErr);

/* Il ne regarde pas votre mot de passe. Il ferme les yeux et le dit en violet. */
function eyesShut(){
  AUTH_BUB.locked = true;
  AUTH_BUB.look(0, 0);
  AUTH_BUB.tone('purple');
  AUTH_BUB.set('shut');
}
function eyesOpen(){
  AUTH_BUB.locked = false;
  AUTH_BUB.tone('blue');
  AUTH_BUB.set('idle');
}
fPass.addEventListener('focus', eyesShut);
fPass.addEventListener('blur', ()=>{ if(fPass.type === 'password') eyesOpen(); });
fPseudo.addEventListener('focus', ()=>{ if(fPass.type === 'password') eyesOpen(); });
/* « Voir » : s'il n'y a plus de secret, il rouvre les yeux */
$('reveal').addEventListener('click', ()=>{
  if(fPass.type === 'text'){ eyesOpen(); AUTH_BUB.flash('curious', 900); }
  else if(document.activeElement === fPass) eyesShut();
});
[fPseudo, fPass].forEach(el => el.addEventListener('keydown', e=>{ if(e.key==='Enter') submit(); }));
$('authBtn').addEventListener('click', submit);

async function submit(){
  const pseudo = fPseudo.value.trim(), pw = fPass.value, btn = $('authBtn');
  if(pseudo.length < 3) return showErr('Choisissez un pseudo d\u2019au moins 3 caractères.');
  if(!/^[a-zA-Z0-9_.\- ]+$/.test(pseudo)) return showErr('Lettres, chiffres, tirets et points uniquement.');
  if(!pw) return showErr('Entrez votre mot de passe.');

  USERS = (await Store.get(K_USERS)) || {};
  const id = pseudo.toLowerCase();
  btn.disabled = true;
  try{
    if(MODE === 'create'){
      if(USERS[id]){ MODE = 'login'; paintAuth(); return showErr('Ce pseudo existe déjà. Connectez-vous.'); }
      if(gaugePw() < 3) return showErr('Mot de passe trop faible pour protéger un business.');
      const s = salt();
      USERS[id] = { pseudo, salt:s, hash: await hash(pw, s), photo:null, created:Date.now() };
      await Store.set(K_USERS, USERS);
    } else {
      const u = USERS[id];
      if(!u) return showErr('Aucun profil à ce pseudo sur ce navigateur.');
      if(!eq(await hash(pw, u.salt), u.hash)) return showErr('Mot de passe incorrect.');
    }
    await Store.set(K_SESSION, id);
    await enter(id);
  } finally { btn.disabled = false; }
}

async function enter(id){
  const u = USERS[id];
  SESSION = { id, pseudo:u.pseudo, photo:u.photo || null };
  auth.classList.remove('on');
  shell.classList.add('on');
  paintAvatars();
  await loadNotes(); paintMem(); paintBadge();
  setTimeout(()=>{ BUB.bounce(); BUB.flash('happy', 1200); checkDue(); }, 900);
  const saved = await Store.get('grid:tabs:'+id);
  TABS = (saved?.tabs || []).filter(t=>META[t]);
  if(!TABS.includes('dashboard')) TABS.unshift('dashboard');
  ACTIVE = META[saved?.active] ? saved.active : 'dashboard';
  go(ACTIVE);
}
async function signOut(){
  await Store.del(K_SESSION);
  closeAll();
  shell.classList.remove('on');
  fPass.value = ''; fPass.type = 'password'; $('reveal').textContent = 'Voir';
  fPseudo.value = SESSION.pseudo;
  MODE = 'login'; paintAuth(); eyesOpen();
  auth.classList.add('on');
  fPass.focus();
}

/* ================= Lancement ================= */
/* Après 20h, Grid met son bonnet et dort. C'est vous qui le réveillez. */
const NIGHT = () => { const h = new Date().getHours(); return h >= 20 || h < 7; };
let ASLEEP = false;
const boot = $('boot'), bootBar = $('bootBar'), bootStatus = $('bootStatus');
const STEPS = [['Ouverture de Grid',18],['Lecture du profil',46],['Cycle de paiement',74],['Prêt',100]];

/* les trois bulles vivantes : entrée, lancement, barre du haut */
const BUB      = new Blob($('gtBlob'));
const BOOT_BUB = new Blob($('bootBlob'));
const AUTH_BUB = new Blob($('authBlob'));
LIVE.push(BUB, AUTH_BUB);
/* Le lancement s'arrête et attend, plutôt que d'enchaîner. */
function gateWait(){
  boot.classList.add('gate');
  const blob = $('bootBlob'), cta = $('bootCta');
  blob.setAttribute('role','button');
  blob.setAttribute('tabindex','0');
  blob.setAttribute('aria-label', ASLEEP ? 'Réveiller Grid' : 'Entrer dans Grid');
  if(ASLEEP){
    cta.textContent = 'Réveillez Grid';
  } else {
    BOOT_BUB.flash('curious', 1400);
  }

  return new Promise(res => {
    const done = async e => {
      e.preventDefault();
      blob.removeEventListener('click', done);
      cta.removeEventListener('click', done);
      blob.removeEventListener('keydown', onKey);
      cta.removeEventListener('keydown', onKey);
      blob.removeEventListener('pointerenter', peek);
      blob.style.cursor = 'default';

      if(ASLEEP){
        /* Le réveil, en trois temps : il émerge, il réalise, il sourit. */
        BOOT_BUB.locked = false;
        BOOT_BUB.set('squint');  BOOT_BUB.bounce();
        await wait(260);
        await BOOT_BUB.blink();
        BOOT_BUB.set('wow');
        await wait(420);
        BOOT_BUB.set('happy');
        await wait(360);
      } else {
        BOOT_BUB.bounce(); BOOT_BUB.set('happy');
        await wait(380);
      }
      res();
    };
    const onKey = e => { if(e.key === 'Enter' || e.key === ' ') done(e); };
    const peek = () => { if(!ASLEEP) BOOT_BUB.flash('wow', 800); };   // on ne réveille pas en passant
    blob.addEventListener('click', done);
    cta.addEventListener('click', done);
    blob.addEventListener('keydown', onKey);
    cta.addEventListener('keydown', onKey);
    blob.addEventListener('pointerenter', peek);
  });
}
async function bootOut(){
  boot.classList.add('out');
  await wait(reduce ? 0 : 500);
  boot.classList.remove('on','out','gate');
}
async function runBoot(){
  boot.classList.add('on');
  ASLEEP = NIGHT();
  BOOT_BUB.night(ASLEEP); AUTH_BUB.night(ASLEEP);

  BOOT_BUB.set('sleep');
  BOOT_BUB.locked = true;                // endormi, il ne suit rien du regard
  BOOT_BUB.look(0, 0);
  await wait(760);

  if(!ASLEEP){
    BOOT_BUB.locked = false;
    BOOT_BUB.set('idle');                // il ouvre les yeux
    await wait(200);
    BOOT_BUB.look(-3.4, -1.6); await wait(420);
    BOOT_BUB.look(3.4, -1.6);  await wait(420);
    BOOT_BUB.look(0, 0);
    BOOT_BUB.flash('wow', 700);          // il vous voit
  }

  for(const [label, pct] of STEPS){
    bootStatus.textContent = label;
    bootBar.style.width = pct + '%';
    await wait(340);
  }
  if(!ASLEEP) BOOT_BUB.set('idle');      // la nuit, il continue de dormir
  await wait(260);
}

(async function start(){
  await applyTheme((await Store.get(K_THEME)) === 'dark', false);
  await runBoot();

  USERS = (await Store.get(K_USERS)) || {};
  const last = await Store.get(K_SESSION);

  /* Pas de reprise automatique : Grid redemande le mot de passe à chaque lancement. */
  MODE = Object.keys(USERS).length ? 'login' : 'create';
  if(MODE === 'login') fPseudo.value = (USERS[last] || Object.values(USERS)[0]).pseudo;
  paintAuth();

  await gateWait();          // Grid grandit et attend le clic
  await bootOut();
  auth.classList.add('on');
  (MODE === 'login' ? fPass : fPseudo).focus();
})();
