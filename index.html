      <span class="mm-port b" data-port="${n.id}"></span><span class="mm-port l" data-port="${n.id}"></span>
    </div>`).join('');
  measure(); paintLinks(); paintPick();
  MM_BORN = null;
}
/* Une bulle courte est ronde ; dès qu'elle passe à la ligne, elle s'arrondit moins. */
function measure(){
  MM_SZ = {};
  for(const el of $('mmNodes').children){
    const w = el.offsetWidth, h = el.offsetHeight;
    MM_SZ[el.dataset.node] = { w, h };
    if(el.classList.contains('s-bulle')) el.style.borderRadius = h < 46 ? '999px' : '19px';
  }
}
/* Le côté par lequel le trait sort dépend de la position relative des deux blocs. */
function side(a, b){
  const sa = MM_SZ[a.id] || { w:120, h:40 }, sb = MM_SZ[b.id] || { w:120, h:40 };
  const ax = a.x + sa.w/2, ay = a.y + sa.h/2, bx = b.x + sb.w/2, by = b.y + sb.h/2;
  const dx = bx - ax, dy = by - ay;
  if(Math.abs(dx) >= Math.abs(dy))
    return dx >= 0 ? { x:a.x + sa.w, y:ay, d:'r' } : { x:a.x, y:ay, d:'l' };
  return dy >= 0 ? { x:ax, y:a.y + sa.h, d:'b' } : { x:ax, y:a.y, d:'t' };
}
function curve(p, q){
  const k = Math.max(38, Math.hypot(q.x-p.x, q.y-p.y) * 0.38);
  const off = (pt, k) => pt.d === 'r' ? [pt.x+k, pt.y] : pt.d === 'l' ? [pt.x-k, pt.y]
                       : pt.d === 'b' ? [pt.x, pt.y+k] : [pt.x, pt.y-k];
  const [c1x,c1y] = off(p, k), [c2x,c2y] = off(q, k);
  return `M${p.x} ${p.y} C${c1x} ${c1y}, ${c2x} ${c2y}, ${q.x} ${q.y}`;
}
function paintLinks(){
  const m = curMap(), by = id => m.nodes.find(n => n.id === id);
  $('mmLinks').innerHTML = m.links.map(l => {
    const a = by(l.a), b = by(l.b);
    if(!a || !b) return '';
    const d = curve(side(a, b), side(b, a));
    const sel = MM_SEL === l.id;
    return `<path class="mm-link ${sel?'sel':''}" d="${d}" data-draw="${l.id}" marker-end="url(#${sel?'mmArrowSel':'mmArrow'})"></path>
            <path class="mm-hit" d="${d}" data-link="${l.id}"></path>`;
  }).join('');
}
function paintPick(){
  document.querySelector('.mm-pick')?.remove();
  const m = curMap(), n = m.nodes.find(x => x.id === MM_SEL);
  if(!n) return;
  const sz = MM_SZ[n.id] || { w:120, h:40 };
  MM_SHAPE = n.shape || 'bulle';

    + `<span class="sp"></span>`
    + (n.root ? '' : `<button class="kill" data-nodekill="${n.id}" aria-label="Supprimer">${svg('trash',12)}</button>`);
  $('mmCanvas').appendChild(bar);
}
const paintMM = () => { paintNodes(); applyView(); };

/* Un seul travail par image d'affichage : c'est ça, la fluidité. */
let FRAME = null, FRAME_JOB = null;
function frame(job){
  FRAME_JOB = job;
  if(FRAME) return;
  FRAME = requestAnimationFrame(()=>{ FRAME = null; FRAME_JOB?.(); FRAME_JOB = null; });
}

/* Le zoom des boutons glisse au lieu de sauter. */
function glide(to, ms = 320){
  const from = { ...MM }, t0 = performance.now();
  const ease = t => 1 - Math.pow(1 - t, 3);
  const step = now => {
    const k = Math.min(1, (now - t0) / ms), e = ease(k);
    MM.x = from.x + (to.x - from.x) * e;
    MM.y = from.y + (to.y - from.y) * e;
    MM.z = from.z + (to.z - from.z) * e;
    applyView(); paintPick();
    if(k < 1) requestAnimationFrame(step);
  };
  requestAnimationFrame(step);
}


/* ---- Les gestes ---- */
MOUNT.mindmap = () => {
  if(!MAPS.length) return;
  paintMM();
  const cv = $('mmCanvas');
  let pan = null, drag = null;
  $('mmLinks').addEventListener('pointerover', e => {
    const h = e.target.closest('[data-link]'); if(!h) return;
    $('mmLinks').querySelector(`[data-draw="${h.dataset.link}"]`)?.classList.add('hot');
  });
  $('mmLinks').addEventListener('pointerout', e => {
    const h = e.target.closest('[data-link]'); if(!h) return;
    $('mmLinks').querySelector(`[data-draw="${h.dataset.link}"]`)?.classList.remove('hot');
  });

  /* On ne refait PAS le DOM : sinon la bulle qu'on tient est détachée
     et on déplace un fantôme pendant que les flèches, elles, suivent le modèle. */
  const pickNode = id => {
    MM_SEL = id;
    for(const el of $('mmNodes').children) el.classList.toggle('sel', el.dataset.node === id);
    paintLinks(); paintPick();
  };

  cv.addEventListener('pointerdown', e => {
    if(e.target.closest('.mm-pick') || e.target.closest('.mm-tool')) return;
    const port = e.target.closest('[data-port]');
    const node = e.target.closest('[data-node]');
    const link = e.target.closest('[data-link]');

    /* tirer une flèche */
    if(port){
      e.preventDefault(); e.stopPropagation();
      cv.classList.add('linking');
      MM_LINK = { from:port.dataset.port, x:0, y:0 };
      cv.setPointerCapture(e.pointerId);
      return;
    }
    /* déplacer un bloc — sauf si on est en train d'écrire dedans */
    if(node){
      if(e.target.closest('[data-text]') && MM_SEL === node.dataset.node) return;
      e.preventDefault();
      const n = curMap().nodes.find(x => x.id === node.dataset.node);
      const p = toWorld(e.clientX, e.clientY);
      drag = { n, el:node, dx:p.x - n.x, dy:p.y - n.y, moved:false };
      if(MM_SEL !== n.id) pickNode(n.id);
      cv.setPointerCapture(e.pointerId);
      return;
    }
    if(link){ MM_SEL = link.dataset.link; paintLinks(); paintPick(); return; }

    /* sinon : on déplace le monde */
    if(MM_SEL){ pickNode(null); }
    pan = { sx:e.clientX, sy:e.clientY, ox:MM.x, oy:MM.y };
    cv.classList.add('panning');
    cv.setPointerCapture(e.pointerId);
  });

  cv.addEventListener('pointermove', e => {
    if(MM_LINK){
      const p = toWorld(e.clientX, e.clientY);
      const cx = e.clientX, cy = e.clientY;
      /* Tout dans la même image : elementFromPoint force un recalcul,
         on ne le paie qu'une fois par rafraîchissement. */
      frame(()=>{
        const a = curMap().nodes.find(n => n.id === MM_LINK?.from);
        if(!a) return;
        const fake = { id:'_', x:p.x - 1, y:p.y - 1 };
        MM_SZ._ = { w:2, h:2 };
        const g = $('mmGhost');
        g.style.display = '';
        g.setAttribute('d', curve(side(a, fake), { x:p.x, y:p.y, d:side(fake, a).d }));
        const over = document.elementFromPoint?.(cx, cy)?.closest('[data-node]');
        for(const el of $('mmNodes').children)
          el.classList.toggle('sel', el === over && el.dataset.node !== MM_LINK.from);
      });
      cv.classList.add('dirty');
      return;
    }
    if(drag){
      const p = toWorld(e.clientX, e.clientY);
      drag.n.x = Math.round(p.x - drag.dx); drag.n.y = Math.round(p.y - drag.dy);
      if(!drag.moved){ drag.moved = true; drag.el.classList.add('drag'); }
      drag.el.style.transform = `translate(${drag.n.x}px,${drag.n.y}px)`;
      frame(()=>{ paintLinks(); paintPick(); });     // une seule fois par image
      cv.classList.add('dirty');
      return;
    }
    if(pan){
      MM.x = pan.ox + (e.clientX - pan.sx); MM.y = pan.oy + (e.clientY - pan.sy);
      frame(()=>{ applyView(); paintPick(); });
    }
  });

  cv.addEventListener('pointerup', async e => {
    cv.classList.remove('panning','linking');
    if(MM_LINK){
      $('mmGhost').style.display = 'none';
      const over = document.elementFromPoint?.(e.clientX, e.clientY)?.closest('[data-node]');
      const m = curMap();
      let to = over?.dataset.node;
      /* lâché dans le vide : on crée le bloc au bout du trait */
      if(!to){
        const p = toWorld(e.clientX, e.clientY);
        const n = { id:nid(), x:Math.round(p.x - 40), y:Math.round(p.y - 18), text:'', color:'plain', shape:MM_SHAPE };
        m.nodes.push(n); to = n.id; MM_BORN = n.id;
      }
      if(to !== MM_LINK.from && !m.links.some(l => (l.a===MM_LINK.from && l.b===to) || (l.a===to && l.b===MM_LINK.from)))
        m.links.push({ id:nid(), a:MM_LINK.from, b:to });
      MM_SEL = to; MM_LINK = null;
      paintNodes(); touchMap();
      const t = $('mmNodes').querySelector(`[data-text="${to}"]`);
      if(t && !t.textContent) t.focus();
      return;
    }
    if(drag){
      drag.el.classList.remove('drag');
      if(drag.moved){ touchMap(); paintPick(); }
      drag = null; return;
    }
    pan = null;
  });

  /* poser un bloc */
  cv.addEventListener('dblclick', e => {
    if(e.target.closest('[data-node]') || e.target.closest('.mm-pick')) return;
    const p = toWorld(e.clientX, e.clientY);
    const n = { id:nid(), x:Math.round(p.x - 40), y:Math.round(p.y - 18), text:'', color:'plain', shape:MM_SHAPE };
    curMap().nodes.push(n); MM_SEL = n.id; MM_BORN = n.id;
    paintNodes(); touchMap(); cv.classList.add('dirty');
    $('mmNodes').querySelector(`[data-text="${n.id}"]`)?.focus();
  });

  /* zoom : molette + Ctrl, ou pincement. Molette seule = on se déplace. */
  cv.addEventListener('wheel', e => {
    e.preventDefault();
    if(e.ctrlKey || e.metaKey){
      const r = cv.getBoundingClientRect();
      const mx = e.clientX - r.left, my = e.clientY - r.top;
      const z = Math.min(2.4, Math.max(.3, MM.z * (1 - e.deltaY * 0.0022)));
      MM.x = mx - (mx - MM.x) * (z / MM.z);
      MM.y = my - (my - MM.y) * (z / MM.z);
      MM.z = z;
    } else { MM.x -= e.deltaX; MM.y -= e.deltaY; }
    applyView(); paintPick();
  }, { passive:false });

  $('mmNodes').addEventListener('input', e => {
    const t = e.target.closest('[data-text]'); if(!t) return;
    const n = curMap().nodes.find(x => x.id === t.dataset.text);
    if(n){ n.text = t.textContent; measure(); paintLinks(); paintPick(); touchMap(); }
  });
  $('mmNodes').addEventListener('dblclick', e => {
    const t = e.target.closest('[data-text]');
    if(t) t.focus();
  });
};


/* ---- Télécharger la carte ----
   On ne peut pas photographier du HTML. Alors on la redessine :
   mêmes formes, mêmes couleurs, mêmes courbes, mais sur un canevas. */
const cssv = (el, k) => getComputedStyle(el).getPropertyValue(k).trim();

function wrap(ctx, text, max){
  const out = [];
  for(const para of String(text || '').split('\n')){
    if(!para){ out.push(''); continue; }
    let line = '';
    for(const word of para.split(/\s+/)){
      const t = line ? line + ' ' + word : word;
      if(ctx.measureText(t).width > max && line){ out.push(line); line = word; }
      else line = t;
    }
    out.push(line);
  }
  return out;
}
function shapePath(ctx, sh, x, y, w, h, r){
  ctx.beginPath();
  if(sh === 'rond'){ ctx.ellipse(x + w/2, y + h/2, w/2, h/2, 0, 0, Math.PI*2); return; }
  if(sh === 'losange'){
    ctx.moveTo(x + w/2, y); ctx.lineTo(x + w, y + h/2);
    ctx.lineTo(x + w/2, y + h); ctx.lineTo(x, y + h/2); ctx.closePath(); return;
  }
  if(sh === 'nuage'){
    const rx = w/2, ry = h/2, cx = x + rx, cy = y + ry;
    ctx.moveTo(cx, y);
    ctx.bezierCurveTo(cx + rx*.86, y, x + w, cy - ry*.5, x + w, cy + ry*.08);
    ctx.bezierCurveTo(x + w, cy + ry*.78, cx + rx*.6, y + h, cx - rx*.06, y + h);
    ctx.bezierCurveTo(cx - rx*.76, y + h, x, cy + ry*.66, x, cy - ry*.1);
    ctx.bezierCurveTo(x, cy - ry*.74, cx - rx*.72, y, cx, y);
    ctx.closePath(); return;
  }
  ctx.roundRect(x, y, w, h, sh === 'carte' ? 13 : Math.min(r, h/2));
}

async function exportPNG(){
  const m = curMap();
  if(!m?.nodes.length) return;
  BUB.tone('orange'); BUB.set('think');
  await wait(180);

  const PAD = 56, S = 2;
  let x1 = Infinity, y1 = Infinity, x2 = -Infinity, y2 = -Infinity;
  for(const n of m.nodes){
    const z = MM_SZ[n.id] || { w:120, h:40 };
    x1 = Math.min(x1, n.x); y1 = Math.min(y1, n.y);
    x2 = Math.max(x2, n.x + z.w); y2 = Math.max(y2, n.y + z.h);
  }
  const W = x2 - x1 + PAD*2, H = y2 - y1 + PAD*2 + 26;
  const cvs = document.createElement('canvas');
  cvs.width = W * S; cvs.height = H * S;
  const ctx = cvs.getContext('2d');
  ctx.scale(S, S);
  ctx.translate(PAD - x1, PAD - y1 + 26);

  const root = document.documentElement;
  ctx.save(); ctx.setTransform(S, 0, 0, S, 0, 0);
  ctx.fillStyle = cssv(root, '--card') || '#fff';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = cssv(root, '--muted') || '#888';
  ctx.font = '600 12px "Familjen Grotesk", system-ui, sans-serif';
  ctx.textBaseline = 'top';
  ctx.fillText(m.name, PAD, 20);
  ctx.restore();

  /* les traits d'abord, ils passent dessous */
  const by = id => m.nodes.find(n => n.id === id);
  const linkC = cssv($('mmSvg'), '--link-c') || '#8C919B';
  ctx.strokeStyle = linkC; ctx.fillStyle = linkC;
  ctx.lineWidth = 2; ctx.lineCap = 'round';
  for(const l of m.links){
    const a = by(l.a), b = by(l.b);
    if(!a || !b) continue;
    const p = side(a, b), q = side(b, a);
    const k = Math.max(38, Math.hypot(q.x-p.x, q.y-p.y) * 0.38);
    const off = (pt, k) => pt.d === 'r' ? [pt.x+k, pt.y] : pt.d === 'l' ? [pt.x-k, pt.y]
                         : pt.d === 'b' ? [pt.x, pt.y+k] : [pt.x, pt.y-k];
    const [c1x,c1y] = off(p, k), [c2x,c2y] = off(q, k);
    ctx.beginPath();
    ctx.moveTo(p.x, p.y); ctx.bezierCurveTo(c1x, c1y, c2x, c2y, q.x, q.y);
    ctx.stroke();
    /* la pointe, orientée par la tangente d'arrivée */
    const ang = Math.atan2(q.y - c2y, q.x - c2x), L = 9, S2 = 3.8;
    ctx.beginPath();
    ctx.moveTo(q.x, q.y);
    ctx.lineTo(q.x - L*Math.cos(ang) + S2*Math.sin(ang), q.y - L*Math.sin(ang) - S2*Math.cos(ang));
    ctx.lineTo(q.x - L*Math.cos(ang) - S2*Math.sin(ang), q.y - L*Math.sin(ang) + S2*Math.cos(ang));
    ctx.closePath(); ctx.fill();
  }

  /* puis les bulles, avec les couleurs vraiment calculées par le navigateur */
  for(const n of m.nodes){
    const el = $('mmNodes').querySelector(`[data-node="${n.id}"]`);
    const z  = MM_SZ[n.id] || { w:120, h:40 };
    const sh = n.shape || 'bulle';
    const c1 = el ? cssv(el, '--n-1') : '#fff', c2 = el ? cssv(el, '--n-2') : '#eee';
    const fg = el ? cssv(el, '--n-fg') : '#15171C', rim = el ? cssv(el, '--n-rim') : 'rgba(0,0,0,.1)';

    ctx.save();
    ctx.shadowColor = el ? cssv(el, '--n-glow') : 'rgba(0,0,0,.1)';
    ctx.shadowBlur = 20; ctx.shadowOffsetY = 7;
    const g = ctx.createLinearGradient(n.x, n.y, n.x + z.w*.35, n.y + z.h);
    g.addColorStop(0, c1); g.addColorStop(1, c2);
    ctx.fillStyle = g;
    shapePath(ctx, sh, n.x, n.y, z.w, z.h, 999);
    ctx.fill();
    ctx.restore();

    ctx.strokeStyle = rim; ctx.lineWidth = 1;
    shapePath(ctx, sh, n.x, n.y, z.w, z.h, 999);
    ctx.stroke();

    ctx.fillStyle = fg;
    ctx.font = `${n.root ? 600 : 400} 13px "Inter Tight", system-ui, sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const inner = z.w - (sh === 'rond' ? 48 : sh === 'losange' ? 68 : 34);
    const lines = wrap(ctx, n.text, Math.max(20, inner));
    const LH = 18.5, top = n.y + z.h/2 - (lines.length - 1) * LH/2;
    lines.forEach((ln, i) => ctx.fillText(ln, n.x + z.w/2, top + i*LH));
  }

  const blob = await new Promise(r => cvs.toBlob(r, 'image/png'));
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (m.name || 'carte').replace(/[^\w\u00C0-\u017F -]/g, '').trim() + '.png';
  a.click();
  setTimeout(()=> URL.revokeObjectURL(url), 4000);
  BUB.tone('green'); BUB.set('happy'); BUB.bounce();
  setTimeout(()=>{ BUB.tone('blue'); BUB.set('idle'); }, 1400);
}

/* ---- Zoom pour tout voir ---- */
function fitMap(){
  const m = curMap(); if(!m?.nodes.length) return;
  const cv = $('mmCanvas'), r = cv.getBoundingClientRect();
  let x1 = Infinity, y1 = Infinity, x2 = -Infinity, y2 = -Infinity;
  for(const n of m.nodes){
    const sz = MM_SZ[n.id] || { w:120, h:40 };
    x1 = Math.min(x1, n.x); y1 = Math.min(y1, n.y);
    x2 = Math.max(x2, n.x + sz.w); y2 = Math.max(y2, n.y + sz.h);
  }
  const pad = 60;
  const z = Math.min(1.6, Math.max(.3, Math.min((r.width - pad*2)/(x2-x1 || 1), (r.height - pad*2)/(y2-y1 || 1))));
  glide({ z, x: r.width/2 - (x1 + x2)/2 * z, y: r.height/2 - (y1 + y2)/2 * z }, 380);
}

/* ---- La barre du haut ---- */
$('view').addEventListener('click', async e => {
  const go = e.target.closest('[data-mmgo]');
  if(go){ MAP_I = +go.dataset.mmgo; MM = { x:0, y:0, z:1 }; MM_SEL = null; renderView(); setTimeout(fitMap, 30); return; }

  const sh = e.target.closest('[data-shape]');
  if(sh){
    MM_SHAPE = sh.dataset.shape;
    $('view').querySelectorAll('[data-shape]').forEach(b => b.setAttribute('aria-pressed', b.dataset.shape === MM_SHAPE));
    const n = curMap()?.nodes.find(x => x.id === MM_SEL);
    if(n){ n.shape = MM_SHAPE; paintNodes(); touchMap(); }   // un bloc choisi : il change de forme
    return;
  }
  const col = e.target.closest('[data-col]');
  if(col){
    const n = curMap().nodes.find(x => x.id === MM_SEL);
    if(n){ n.color = col.dataset.col; paintNodes(); touchMap(); }
    return;
  }
  const k = e.target.closest('[data-nodekill]');
  if(k){
    const m = curMap(), id = k.dataset.nodekill;
    m.nodes = m.nodes.filter(n => n.id !== id);
    m.links = m.links.filter(l => l.a !== id && l.b !== id);
    MM_SEL = null; paintNodes(); touchMap();
    return;
  }
  const a = e.target.closest('[data-mm]');
  if(!a) return;
  const act = a.dataset.mm;
  if(act === 'new'){
    MAPS.push(newMap()); MAP_I = MAPS.length - 1;
    MM = { x:0, y:0, z:1 }; MM_SEL = null;
    await saveMaps(); renderView(); setTimeout(fitMap, 30);
    BUB.flash('happy', 900);
  }
  else if(act === 'in'  || act === 'out'){
    const cv = $('mmCanvas'), r = cv.getBoundingClientRect();
    const mx = r.width/2, my = r.height/2;                 // on zoome sur le centre de l'écran
    const z = Math.min(2.4, Math.max(.3, MM.z * (act === 'in' ? 1.25 : .8)));
    glide({ x: mx - (mx - MM.x) * (z / MM.z), y: my - (my - MM.y) * (z / MM.z), z }, 240);
  }
  else if(act === 'fit') fitMap();
  else if(act === 'png') exportPNG();
  else if(act === 'rename'){
    const chip = $('view').querySelector('.mm-chip[aria-selected="true"] span');
    chip.contentEditable = 'plaintext-only'; chip.focus();
    document.getSelection().selectAllChildren(chip);
    const done = async () => {
      chip.contentEditable = 'false';
      curMap().name = chip.textContent.trim() || 'Sans titre';
      await saveMaps(); renderView();
    };
    chip.addEventListener('blur', done, { once:true });
    chip.addEventListener('keydown', ev => { if(ev.key === 'Enter'){ ev.preventDefault(); chip.blur(); } });
  }
  else if(act === 'kill'){
    MAPS.splice(MAP_I, 1); MAP_I = Math.max(0, MAP_I - 1);
    MM = { x:0, y:0, z:1 }; MM_SEL = null;
    await saveMaps(); renderView(); if(MAPS.length) setTimeout(fitMap, 30);
  }
});

/* ---- Clavier ---- */
document.addEventListener('keydown', e => {
  if(ACTIVE !== 'mindmap' || !MM_SEL) return;
  if(e.target.isContentEditable || e.target.tagName === 'INPUT') return;
  if(e.key === 'Escape'){
    MM_SEL = null;
    for(const el of $('mmNodes').children) el.classList.remove('sel');
    paintLinks(); paintPick(); return;
  }
  if(e.key === 'Delete' || e.key === 'Backspace'){
    e.preventDefault();
    const m = curMap();
    const n = m.nodes.find(x => x.id === MM_SEL);
    if(n?.root) return;
    if(n){ m.nodes = m.nodes.filter(x => x.id !== MM_SEL); m.links = m.links.filter(l => l.a !== MM_SEL && l.b !== MM_SEL); }
    else m.links = m.links.filter(l => l.id !== MM_SEL);
    MM_SEL = null; paintNodes(); touchMap();
  }
});


/* ================= Matériaux Maker =================
   Le moteur (SDF, éclairage, k-means, autocorrélation) est repris tel quel :
   il marche. Seule la peau change. */
const MXC = { colors:[{h:112,s:.78,v:.83},{h:112,s:.82,v:.52}], active:0, damier:false,
              shape:'tiles', angle:45, tiling:2 };
const MX_PRESETS = ['#44D32E','#1E9ED4','#8A2BE2','#C81E1E','#FF4FA3','#E8A317','#B8C0CC','#2A2E36','#7CFC4D','#FF6A2B'];
const MX_SHAPES = [['tiles','Tuiles'],['dashes','Dashes'],['smooth','Lisse']];
const cl = (n,a,b) => n<a?a:(n>b?b:n);
function hsv2rgb(h,s,v){
  h=((h%360)+360)%360; const c=v*s, x=c*(1-Math.abs((h/60)%2-1)), m=v-c;
  let r=0,g=0,b=0;
  if(h<60){r=c;g=x;} else if(h<120){r=x;g=c;} else if(h<180){g=c;b=x;}
  else if(h<240){g=x;b=c;} else if(h<300){r=x;b=c;} else {r=c;b=x;}
  return [(r+m)*255,(g+m)*255,(b+m)*255];
}
const hx = rgb => '#' + rgb.map(n => cl(Math.round(n),0,255).toString(16).padStart(2,'0')).join('').toUpperCase();
function hex2hsv(h){
  const m = /^#?([0-9a-f]{6})$/i.exec(h); if(!m) return null;
  const n = parseInt(m[1],16), r=(n>>16&255)/255, g=(n>>8&255)/255, b=(n&255)/255;
  return rgb2hsv([r*255,g*255,b*255]);
}
function rgb2hsv(p){
  const r=p[0]/255,g=p[1]/255,b=p[2]/255,mx=Math.max(r,g,b),mn=Math.min(r,g,b),d=mx-mn;
  let h=0;
  if(d){ if(mx===r)h=((g-b)/d)%6; else if(mx===g)h=(b-r)/d+2; else h=(r-g)/d+4; h*=60; if(h<0)h+=360; }
  return { h, s: mx?d/mx:0, v: mx };
}
const mxCur = () => MXC.colors[MXC.active];
const MX_L = (()=>{ let x=.7, y=-.72; const n=Math.hypot(x,y); return { x:x/n, y:y/n }; })();

function mxPal(col,k){
  return {
    bg: hsv2rgb(col.h, col.s, col.v),
    face: hsv2rgb(col.h, col.s*.92, cl(col.v*1.015,0,1)),
    hi: hsv2rgb(col.h, col.s*cl(1-.45*k,0,1), cl(col.v*(1+.10*k),0,1)),
    sh: hsv2rgb(col.h, cl(col.s*1.03,0,1), cl(col.v*(1-.55*k),0,1)),
  };
}
function mxShade(buf,size,cells,tileR,radiusR,k,M){
  M = M || 1;
  const p0 = mxPal(MXC.colors[0],k), p1 = MXC.damier ? mxPal(MXC.colors[1],k) : p0;
  const cell = size/cells, half = cell*tileR/2;
  let idx = 0;
  const isDash = MXC.shape === 'dashes', sm = MXC.shape === 'smooth';
  let rad,hxx,hyy,L,T,rr2,ca,sa,bev;
  if(isDash){
    L = half*1.3; T = half*.36; rr2 = T;
    const th = MXC.angle*Math.PI/180; ca = Math.cos(th); sa = Math.sin(th);
    bev = Math.max(2, T*.9);
  } else {
    rad = 2*half*radiusR; hxx = half-rad; hyy = half-rad; bev = Math.max(2, 2*half*.26);
  }
  for(let y=0;y<size;y++){
    const crow = Math.floor(y/cell), brow = Math.floor(crow/M), ly = (y%cell)-cell/2;
    const xoff = (isDash && (crow&1)) ? cell*.5 : 0;
    for(let x=0;x<size;x++){
      const bsel = brow + Math.floor(Math.floor(x/cell)/M);
      const p = (MXC.damier && (bsel&1)) ? p1 : p0;
      const bg=p.bg, face=p.face, hi=p.hi, sh=p.sh;
      if(sm){ buf[idx++]=bg[0]; buf[idx++]=bg[1]; buf[idx++]=bg[2]; buf[idx++]=255; continue; }
      let sdf,nx,ny;
      if(isDash){
        const lx = (((x-xoff)%cell)+cell)%cell - cell/2;
        const rx = lx*ca+ly*sa, ry = -lx*sa+ly*ca;
        const qx = Math.abs(rx)-(L-rr2), qy = Math.abs(ry)-(T-rr2);
        const ax = qx>0?qx:0, ay = qy>0?qy:0, outl = Math.sqrt(ax*ax+ay*ay);
        sdf = outl + Math.min(Math.max(qx,qy),0) - rr2;
        let nrx,nry;
        if(qx>0&&qy>0){ const Lr=outl+1e-6; nrx=(rx<0?-1:1)*ax/Lr; nry=(ry<0?-1:1)*ay/Lr; }
        else if(qx>qy){ nrx=(rx<0?-1:1); nry=0; } else { nrx=0; nry=(ry<0?-1:1); }
        nx = ca*nrx - sa*nry; ny = sa*nrx + ca*nry;
      } else {
        const lx2 = (x%cell)-cell/2;
        const qx2 = Math.abs(lx2)-hxx, qy2 = Math.abs(ly)-hyy;
        const ax2 = qx2>0?qx2:0, ay2 = qy2>0?qy2:0, outl2 = Math.sqrt(ax2*ax2+ay2*ay2);
        sdf = outl2 + Math.min(Math.max(qx2,qy2),0) - rad;
        if(qx2>0&&qy2>0){ const Lr2=outl2+1e-6; nx=(lx2<0?-1:1)*ax2/Lr2; ny=(ly<0?-1:1)*ay2/Lr2; }
        else if(qx2>qy2){ nx=(lx2<0?-1:1); ny=0; } else { nx=0; ny=(ly<0?-1:1); }
      }
      const cov = cl(.5-sdf,0,1);
      let r,g,b;
      if(cov<=0){ r=bg[0]; g=bg[1]; b=bg[2]; }
      else {
        const dot = nx*MX_L.x + ny*MX_L.y;
        const rim = Math.pow(cl(1-Math.abs(sdf)/bev,0,1), .7);
        const pos = (dot>0?dot:0)*rim, neg = (dot<0?-dot:0)*rim, bw = 1-pos-neg;
        r = bg[0] + (face[0]*bw+hi[0]*pos+sh[0]*neg - bg[0])*cov;
        g = bg[1] + (face[1]*bw+hi[1]*pos+sh[1]*neg - bg[1])*cov;
        b = bg[2] + (face[2]*bw+hi[2]*pos+sh[2]*neg - bg[2])*cov;
      }
      buf[idx++]=r; buf[idx++]=g; buf[idx++]=b; buf[idx++]=255;
    }
  }
}
function mxRender(canvas,size,c){
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d'), img = ctx.createImageData(size,size);
  mxShade(img.data, size, c.cells, c.tileR, c.radiusR, c.k, c.M);
  ctx.putImageData(img,0,0);
}

function mxWheelDraw(){
  const W = $('mxWheel'), ctx = W.getContext('2d'), R = 64;
  const img = ctx.createImageData(128,128), d = img.data;
  for(let y=0;y<128;y++) for(let x=0;x<128;x++){
    const dx=x-R, dy=y-R, dist=Math.sqrt(dx*dx+dy*dy), i=(y*128+x)*4;
    if(dist<=R){
      let hue = Math.atan2(dy,dx)*180/Math.PI; if(hue<0) hue+=360;
      const c = hsv2rgb(hue, Math.min(dist/R,1), 1);
      d[i]=c[0]; d[i+1]=c[1]; d[i+2]=c[2]; d[i+3]=255;
    } else d[i+3]=0;
  }
  ctx.putImageData(img,0,0);
  const col = mxCur(), ang = col.h*Math.PI/180, rr = col.s*R;
  const px = R+Math.cos(ang)*rr, py = R+Math.sin(ang)*rr;
  ctx.beginPath(); ctx.arc(px,py,6.5,0,7); ctx.strokeStyle='#fff'; ctx.lineWidth=3; ctx.stroke();
  ctx.beginPath(); ctx.arc(px,py,6.5,0,7); ctx.strokeStyle='rgba(20,23,30,.5)'; ctx.lineWidth=1.5; ctx.stroke();
}
function mxUpdate(){
  if(ACTIVE !== 'material' || !$('mxPreview')) return;
  const c = mxRead();
  if(MXC.shape === 'dashes' && !MXC.damier && (c.cells & 1)){ c.cells = Math.max(2, c.cells-1); $('mxCells').value = c.cells; }
  if(MXC.damier){ $('mxBlocksO').textContent = c.blocks+'×'+c.blocks; $('mxTpbO').textContent = c.tpb; }
  else $('mxCellsO').textContent = c.cells+'×'+c.cells;

  $('mxDepthO').textContent = Math.round(c.k*100)+'%';

  MX.off ||= document.createElement('canvas');
  mxRender(MX.off, c.cells*16, c);
  const pv = $('mxPreview'), ctx = pv.getContext('2d'), ps = 512;
  pv.width = ps; pv.height = ps;
  ctx.clearRect(0,0,ps,ps); ctx.imageSmoothingEnabled = true;
  const step = ps/MXC.tiling;
  for(let i=0;i<MXC.tiling;i++) for(let j=0;j<MXC.tiling;j++) ctx.drawImage(MX.off, i*step, j*step, step, step);

  const col = mxCur(), h = hx(hsv2rgb(col.h,col.s,col.v));
  $('mxHex').value = h; $('mxSw').style.background = h; $('mxVal').value = Math.round(col.v*100);
  [0,1].forEach(i => $('mxDot'+i).style.background = hx(hsv2rgb(MXC.colors[i].h, MXC.colors[i].s, MXC.colors[i].v)));

}

/* ---- Lire une texture existante ----
   Deux couleurs par k-means, la grille par autocorrélation des contours.
   Repris tel quel : c'est ce qui marche. */
const mxDraw = (img,w,h) => { const c = document.createElement('canvas'); c.width=w; c.height=h;
  c.getContext('2d').drawImage(img,0,0,w,h); return c; };
const mxPix = c => c.getContext('2d').getImageData(0,0,c.width,c.height).data;
const d2 = (p,c) => (p[0]-c[0])**2 + (p[1]-c[1])**2 + (p[2]-c[2])**2;

function mxKmeans(pts){
  const lum = p => .299*p[0] + .587*p[1] + .114*p[2];
  let mn=0, mx=0;
  for(let i=1;i<pts.length;i++){ if(lum(pts[i])<lum(pts[mn])) mn=i; if(lum(pts[i])>lum(pts[mx])) mx=i; }
  let c0 = pts[mn].slice(), c1 = pts[mx].slice();
  for(let it=0;it<12;it++){
    const s0=[0,0,0], s1=[0,0,0]; let n0=0, n1=0;
    for(const p of pts){
      if(d2(p,c1) < d2(p,c0)){ s1[0]+=p[0]; s1[1]+=p[1]; s1[2]+=p[2]; n1++; }
      else { s0[0]+=p[0]; s0[1]+=p[1]; s0[2]+=p[2]; n0++; }
    }
    if(!n0 || !n1) break;
    c0 = [s0[0]/n0, s0[1]/n0, s0[2]/n0]; c1 = [s1[0]/n1, s1[1]/n1, s1[2]/n1];
  }
  let k0=0, k1=0;
  for(const p of pts) (d2(p,c1) < d2(p,c0)) ? k1++ : k0++;
  return { centers:[c0,c1], counts:[k0,k1] };
}
function mxEdges(img,S){
  const d = mxPix(mxDraw(img,S,S)), g = new Float32Array(S*S);
  for(let i=0;i<S*S;i++) g[i] = .299*d[i*4] + .587*d[i*4+1] + .114*d[i*4+2];
  const px = new Float64Array(S), py = new Float64Array(S);
  for(let y=0;y<S;y++) for(let x=0;x<S;x++){
    const i = y*S+x;
    px[x] += Math.abs(g[i] - g[y*S + (x>0?x-1:x)]);
    py[y] += Math.abs(g[i] - g[(y>0?y-1:y)*S + x]);
  }
  return { px, py };
}
function mxPeak(prof,minlag,maxlag){
  const n = prof.length;
  let mean = 0; for(let i=0;i<n;i++) mean += prof[i]; mean /= n;
  const p = new Float64Array(n); for(let i=0;i<n;i++) p[i] = prof[i]-mean;
  const ac = []; let mx = -1e18;
  for(let lag=minlag;lag<maxlag;lag++){
    let s = 0; for(let i=0;i<n-lag;i++) s += p[i]*p[i+lag];
    s /= (n-lag); ac.push(s); if(s>mx) mx = s;
  }
  if(mx <= 0) return null;
  const thr = .25*mx;
  for(let i=1;i<ac.length-1;i++) if(ac[i]>ac[i-1] && ac[i]>=ac[i+1] && ac[i]>thr) return minlag+i;
  return null;
}
function mxGrid(img){
  const S = 200, pr = mxEdges(img,S);
  const a = mxPeak(pr.px, Math.max(4,Math.floor(S/16)), Math.floor(S/2));
  const b = mxPeak(pr.py, Math.max(4,Math.floor(S/16)), Math.floor(S/2));
  const cand = []; if(a) cand.push(S/a); if(b) cand.push(S/b);
  if(!cand.length) return 8;
  return cl(Math.round(cand.reduce((x,y)=>x+y,0)/cand.length), 2, 16);
}
function mxMap(img,N,centers){
  const d = mxPix(mxDraw(img,N,N)), m = [];
  for(let y=0;y<N;y++){
    const row = [];
    for(let x=0;x<N;x++){
      const i = (y*N+x)*4, p = [d[i],d[i+1],d[i+2]];
      row.push(d2(p,centers[1]) < d2(p,centers[0]) ? 1 : 0);
    }
    m.push(row);
  }
  return m;
}
function mxRun(m){
  const N = m.length, runs = {};
  const scan = get => { for(let a=0;a<N;a++){ let r=1;
    for(let b=1;b<N;b++){ if(get(a,b) === get(a,b-1)) r++; else { runs[r]=(runs[r]||0)+1; r=1; } }
    runs[r]=(runs[r]||0)+1; } };
  scan((a,b)=>m[a][b]); scan((a,b)=>m[b][a]);
  let best=1, bc=0;
  for(const k in runs) if(runs[k]>bc){ bc=runs[k]; best=+k; }
  return best;
}
function mxAnalyze(img){
  const d = mxPix(mxDraw(img,150,150)), pts = [];
  for(let i=0;i<d.length;i+=4) pts.push([d[i],d[i+1],d[i+2]]);
  const km = mxKmeans(pts), total = km.counts[0]+km.counts[1];
  const share = Math.min(km.counts[0],km.counts[1])/total;
  const dist = Math.sqrt(d2(km.centers[0], km.centers[1]));
  const isD = share > .30 && dist > 28;
  const cells = mxGrid(img);
  const r = { damier:isD, cells, centers:km.centers, counts:km.counts };
  if(isD){
    const M = cl(mxRun(mxMap(img, cells, km.centers)), 1, 5);
    let blocks = Math.max(2, Math.round(cells/M));
    if(blocks % 2) blocks++;
    r.tpb = M; r.blocks = Math.min(8, blocks);
  }
  return r;
}
function mxApply(r){
  if(r.damier){
    MXC.colors[0] = rgb2hsv(r.centers[0]); MXC.colors[1] = rgb2hsv(r.centers[1]);
    $('mxBlocks').value = r.blocks; $('mxTpb').value = r.tpb;
    MXC.active = 0;
    $('mxTwo').querySelectorAll('[data-i]').forEach(b => b.setAttribute('aria-selected', b.dataset.i === '0'));
    mxDamier(true);
    return `Damier — deux couleurs, <b>${r.blocks}×${r.blocks} blocs</b> de <b>${r.tpb} tuiles</b>.`;
  }
  const big = r.counts[0] >= r.counts[1] ? r.centers[0] : r.centers[1];
  MXC.colors[0] = rgb2hsv(big);
  const n = cl(r.cells, 2, 16);
  $('mxCells').value = n; MXC.active = 0;
  mxDamier(false);
  return `Texture unie — couleur calée, grille <b>≈ ${n}×${n}</b>.`;
}
async function mxTake(f){
  const said = $('mxSaid');
  if(!f || !/^image\//.test(f.type)){ said.textContent = 'Fichier non reconnu — envoyez une image.'; return; }
  const url = URL.createObjectURL(f), img = new Image();
  img.onerror = () => { said.textContent = 'Image illisible.'; };
  img.onload = async () => {
    $('mxThumb').src = url; $('mxThumb').hidden = false; $('mxZoneT').style.display = 'none';
    said.textContent = 'Analyse…'; said.classList.remove('ok');
    BUB.tone('orange'); BUB.set('think');
    await wait(40);
    try {
      const msg = mxApply(mxAnalyze(img));
      said.innerHTML = '<b>Reproduit.</b> ' + msg + ' Affinez si besoin.';
      said.classList.add('ok');
      BUB.tone('green'); BUB.set('happy'); BUB.bounce();
      setTimeout(()=>{ BUB.tone('blue'); BUB.set('idle'); }, 1400);
    } catch(err) {
      said.textContent = 'Analyse impossible sur cette image. Essayez une texture plus nette, ou réglez à la main.';
      BUB.tone('blue'); BUB.flash('squint', 900);
    }
  };
  img.src = url;
}


/* ================= Dossiers =================
   Un arbre de dossiers, des fichiers dedans. Les images sont stockées
   dans le navigateur (data URL), compressées, avec un quota assumé. */
let VAULT = { folders:[], files:[] };
let VT_CUR = null, VT_OPEN = {}, VT_Q = '';
const vaultKey = () => 'grid:vault:' + SESSION.id;
const saveVault = () => Store.set(vaultKey(), VAULT);
async function loadVault(){ VAULT = (await Store.get(vaultKey())) || { folders:[], files:[] }; }
const fid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);

const VT_PALETTE = ['plain','amber','mint','coral','violet','sky'];
const VT_SWATCH = { plain:'#4A515E', amber:'#F0A319', mint:'#12A05C', coral:'#E8412A', violet:'#6B4EE8', sky:'#0A84FF' };
const IMG_MAX = 4.4e6;                       // au-delà, le quota du navigateur sature vite
const kids  = pid => VAULT.folders.filter(f => f.parent === pid);
const inDir = fid => VAULT.files.filter(f => f.folder === fid);
const folderById = id => VAULT.folders.find(f => f.id === id);
/* tout ce qui est sous un dossier, en profondeur */
function subtree(id){
  const out = [id]; let i = 0;
  while(i < out.length){ for(const k of kids(out[i])) out.push(k.id); i++; }
  return out;
}
const KB = b => b < 1024 ? b + ' o' : b < 1048576 ? (b/1024).toFixed(0) + ' Ko' : (b/1048576).toFixed(1) + ' Mo';
const fDate = ts => new Date(ts).toLocaleDateString('fr-FR', { day:'numeric', month:'short', year:'2-digit' });

/* ---- L'arbre de gauche ---- */
function treeRows(pid, depth){
  return kids(pid).map(f => {
    const has = kids(f.id).length, open = VT_OPEN[f.id];
    const n = inDir(f.id).length;
    return `<div>
      <div class="vt-node ${VT_CUR===f.id?'on':''}" data-vtgo="${f.id}">
        <span class="tw ${has?'':'leaf'} ${open?'open':''}" data-vttw="${f.id}">${has?svg('chev',11):''}</span>
        <span class="ico">${svg('folderMini',15)}</span>
        <span class="lbl">${esc(f.name)}</span>
        <span class="ct">${n||''}</span>
      </div>
      ${has && open ? `<div class="vt-kids">${treeRows(f.id, depth+1)}</div>` : ''}
    </div>`;
  }).join('');
}

const FTYPE = f => f.kind === 'pdf' ? 'pdf' : f.kind === 'image' ? 'image' : 'file';
function fileIcon(f){
  if(f.kind === 'image' && f.data) return `<span class="vt-fic"><img src="${f.data}" alt=""></span>`;
  if(f.kind === 'pdf') return `<span class="vt-fic pdf">${svg('filePdf',17)}</span>`;
  return `<span class="vt-fic">${svg('fileGen',17)}</span>`;
}
/* les 3 pastilles de type sur la carte dossier */
function folderBadges(id){
  const files = inDir(id);
  const seen = [], out = [];
  for(const f of files){ const t = FTYPE(f); if(!seen.includes(t)){ seen.push(t); out.push(t); } if(out.length===3) break; }
  const ic = { image:'img', pdf:'filePdf', file:'fileGen' };
  return out.map(t => `<span>${svg(ic[t],13)}</span>`).join('');
}

function crumbs(){
  const chain = [];
  let c = VT_CUR;
  while(c){ const f = folderById(c); if(!f) break; chain.unshift(f); c = f.parent; }
  return `<button class="${VT_CUR?'mut':''}" data-vtgo="">Dossiers</button>` +
    chain.map((f,i) => `<span class="sl">/</span><button class="${i<chain.length-1?'mut':''}" data-vtgo="${f.id}">${esc(f.name)}</button>`).join('');
}

/* ---- Recevoir des fichiers ---- */
async function vtIngest(fileList){
  const files = [...fileList];
  if(!files.length) return;
  BUB.tone('orange'); BUB.set('think'); BUB.bounce();
  let added = 0, skipped = [];
  for(const f of files){
    const isImg = /^image\//.test(f.type);
    const isPdf = f.type === 'application/pdf';
    if(!isImg && !isPdf){ skipped.push(f.name + ' (type non géré)'); continue; }
    try {
      let data = null, kind = isPdf ? 'pdf' : 'image';
      if(isImg){
        const anim = f.type === 'image/gif' || f.type === 'image/webp';
        if(anim && f.size > IMG_MAX){ skipped.push(f.name + ' (trop lourd)'); continue; }
        data = anim ? await asDataURL(f) : await downscale(f, 1600);
      } else {
        if(f.size > IMG_MAX){ skipped.push(f.name + ' (PDF > 4,4 Mo)'); continue; }
        data = await asDataURL(f);
      }
      VAULT.files.push({
        id:fid(), name:f.name, kind, data,
        size:f.size, folder:VT_CUR, created:Date.now(),
      });
      added++;
    } catch(e){ skipped.push(f.name); }
  }
  await saveVault();
  refreshVault();
  if(added){ BUB.tone('green'); BUB.set('happy'); setTimeout(()=>{ BUB.tone('blue'); BUB.set('idle'); }, 1300); }
  else { BUB.tone('blue'); BUB.flash('squint', 900); }
  if(skipped.length){
    const d = $('vtDrop');
    if(d) d.querySelector('small').textContent = 'Non ajouté : ' + skipped.slice(0,3).join(', ');
  }
}

const ago = ts => {
  const s = Math.round((Date.now() - ts) / 1000);
  if(s < 60) return "à l'instant";
  if(s < 3600) return 'il y a ' + Math.round(s/60) + ' min';
  if(s < 86400) return 'il y a ' + Math.round(s/3600) + ' h';
  const j = Math.round(s/86400);
  return j === 1 ? 'hier' : 'il y a ' + j + ' j';
};

/* ================= Ce que Grid comprend ================= */
const strip = t => t.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
const DAYS   = {dimanche:0,lundi:1,mardi:2,mercredi:3,jeudi:4,vendredi:5,samedi:6};
const MONTHS = {janvier:0,fevrier:1,mars:2,avril:3,mai:4,juin:5,juillet:6,aout:7,septembre:8,octobre:9,novembre:10,decembre:11};
/* Les moments de la journée, tels qu'on les dit vraiment. */
const PART = {matin:9, matinee:10, midi:12, aprem:15, 'apres-midi':15, 'apres midi':15, soir:20, soiree:20, nuit:22, minuit:0};

/* Repère une date, une heure, une récurrence. Dit ce qu'il a consommé. */
function readWhen(raw){
  const t = strip(raw);
  const now = new Date();
  const d = new Date(now); d.setSeconds(0,0);
  let hasDay = false, hasTime = false, repeat = null, before = false, past = false;
  const eaten = [];
  const eat = re => { const m = t.match(re); if(m) eaten.push(m[0]); return m; };
  const done = () => {
    if(!hasDay && !hasTime) return { due:null, eaten:[], hasTime:false, repeat:null, before:false, past:false };
    if(!hasTime) d.setHours(9,0,0,0);
    if(!hasDay && d <= now) d.setDate(d.getDate()+1);
    return { due:d, eaten, hasTime, repeat, before, past: d < now };
  };
  let m;

  /* --- récurrence : « tous les jours », « chaque lundi » --- */
  if((m = eat(/\b(?:tous les|toutes les|chaque)\s+(jours?|matins?|soirs?|semaines?|mois|lundis?|mardis?|mercredis?|jeudis?|vendredis?|samedis?|dimanches?)\b/))){
    const u = m[1];
    hasDay = true;
    if(/^jour|^matin|^soir/.test(u)){
      repeat = 'jour';
      if(/matin/.test(u)){ d.setHours(9,0); hasTime = true; }
      if(/soir/.test(u)){ d.setHours(20,0); hasTime = true; }
    } else if(/^semaine/.test(u)) repeat = 'semaine';
    else if(/^mois/.test(u))      repeat = 'mois';
    else {
      repeat = 'semaine';
      const gap = (DAYS[u.replace(/s$/,'')] - d.getDay() + 7) % 7 || 7;
      d.setDate(d.getDate() + gap);
    }
  }

  /* --- échéance : « avant vendredi », « d'ici lundi » --- */
  if(eat(/\b(avant|d'?ici)\s+(?=[a-z0-9])/)) before = true;

  /* --- durées : « dans une demi-heure », « dans 1h30 », « dans 3 jours » --- */
  if(!repeat){
    if(eat(/\bdans\s+(?:une?\s+)?demi[- ]heure\b/)){ d.setMinutes(d.getMinutes()+30); hasDay = hasTime = true; return done(); }
    if(eat(/\bdans\s+(?:un\s+)?quart\s+d'?heure\b/)){ d.setMinutes(d.getMinutes()+15); hasDay = hasTime = true; return done(); }
    if((m = eat(/\bdans\s+(\d+)\s*h\s*(\d{2})\b/))){
      d.setHours(d.getHours() + +m[1]); d.setMinutes(d.getMinutes() + +m[2]);
      hasDay = hasTime = true; return done();
    }
    if((m = eat(/\bdans\s+(une?|\d+)\s*(min\w*|h\b|heures?|jours?|semaines?|mois|ans?)\b/))){
      const n = /^une?$/.test(m[1]) ? 1 : parseInt(m[1],10), u = m[2];
      if(/^min/.test(u))       d.setMinutes(d.getMinutes()+n);
      else if(/^h/.test(u))    d.setHours(d.getHours()+n);
      else if(/^jour/.test(u)) d.setDate(d.getDate()+n);
      else if(/^sem/.test(u))  d.setDate(d.getDate()+n*7);
      else if(/^mois/.test(u)) d.setMonth(d.getMonth()+n);
      else                     d.setFullYear(d.getFullYear()+n);
      hasDay = hasTime = true; return done();
    }
  }

  /* --- le jour --- */
  if(!hasDay){
    if(eat(/\bapres[- ]demain\b/))                     { d.setDate(d.getDate()+2); hasDay = true; }
    else if(eat(/\bdemain\b/))                         { d.setDate(d.getDate()+1); hasDay = true; }
    else if(eat(/\bhier\b/))                           { d.setDate(d.getDate()-1); hasDay = past = true; }
    else if(eat(/\baujourd'?hui\b/))                   { hasDay = true; }
    else if(eat(/\bce week[- ]?end\b/))                { d.setDate(d.getDate() + ((6 - d.getDay() + 7) % 7 || 7)); d.setHours(10,0); hasDay = hasTime = true; }
    else if(eat(/\bla semaine prochaine\b/))           { d.setDate(d.getDate()+7); hasDay = true; }
    else if(eat(/\ble mois prochain\b/))               { d.setMonth(d.getMonth()+1); hasDay = true; }
    else if((m = eat(/\b(?:ce\s+)?(lundi|mardi|mercredi|jeudi|vendredi|samedi|dimanche)(\s+prochain)?\b/))){
      let gap = (DAYS[m[1]] - d.getDay() + 7) % 7;
      if(gap === 0 || m[2]) gap = gap || 7;
      d.setDate(d.getDate() + gap); hasDay = true;
    }
    else if((m = eat(/\b(?:le\s+)?(\d{1,2})\s+(janvier|fevrier|mars|avril|mai|juin|juillet|aout|septembre|octobre|novembre|decembre)\b/))){
      d.setMonth(MONTHS[m[2]], +m[1]);
      if(d < now) d.setFullYear(d.getFullYear()+1);
      hasDay = true;
    }
    else if((m = eat(/\b(\d{1,2})[\/](\d{1,2})\b/))){
      d.setMonth(+m[2]-1, +m[1]);
      if(d < now) d.setFullYear(d.getFullYear()+1);
      hasDay = true;
    }
    else if((m = eat(/\b(debut|mi|fin)[- ](janvier|fevrier|mars|avril|mai|juin|juillet|aout|septembre|octobre|novembre|decembre)\b/))){
      d.setMonth(MONTHS[m[2]], m[1]==='debut' ? 3 : m[1]==='mi' ? 15 : 27);
      if(d < now) d.setFullYear(d.getFullYear()+1);
      hasDay = true;
    }
  }

  /* --- l'heure au cadran : « à 18h », « 18h30 », « à 8h du soir » --- */
  const tm = t.match(/\b(?:a|vers)\s*(\d{1,2})\s*h\s*(\d{2})?\b/)
          || t.match(/\b(\d{1,2})\s*h\s*(\d{2})\b/)
          || t.match(/\b(?:a|vers)\s+(\d{1,2})\s*:\s*(\d{2})\b/);
  if(tm){
    let H = +tm[1]; const M = tm[2] ? +tm[2] : 0;
    if(H <= 23 && M <= 59){
      const pm = t.match(/\bdu soir\b|\bde l'?apres[- ]midi\b/);
      if(pm && H < 12){ H += 12; eaten.push(pm[0]); }
      const am = t.match(/\bdu matin\b/);
      if(am) eaten.push(am[0]);
      eaten.push(tm[0]); d.setHours(H, M, 0, 0); hasTime = true;
    }
  }

  /* --- le moment de la journée : « demain matin », « vendredi soir », « à midi » --- */
  if(!hasTime && (m = eat(/\b(?:ce |cet |cette |le |la |a |de la )?(matinee|matin|midi|minuit|apres[- ]midi|aprem|soiree|soir|nuit)\b/))){
    const key = m[1].replace('apres-midi','apres-midi').replace('apres midi','apres-midi');
    const h = PART[key] ?? PART[key.replace('-',' ')];
    if(h !== undefined){
      d.setHours(h, 0, 0, 0); hasTime = true;
      if(!hasDay){ hasDay = true; if(d <= now) d.setDate(d.getDate()+1); }
    }
  }

  return done();
}

/* --- Les verbes d'un créateur au travail. --- */
const VERBS = ['fini','termin','achev','boucl','fair','fais','fass','ref','pay','regl','rembours','factur',
 'envoy','envoi','transmet','soumet','publi','depos','post','partag','upload','export','import',
 'corrig','fix','repar','test','essay','verifi','check','relir','valid','revoir','revois',
 'relanc','recontact','contact','appel','ecrir','ecris','repond','demand','prevenir','previen',
 'achet','command','vend','negoci','renouvel','annul','resili','reserv','planifi','organis','prepar',
 'creer','cree','construir','construis','build','deploy','install','configur','optimis','nettoy',
 'rang','tri','class','compar','analys','mesur','calcul','budget','sauvegard','backup','archiv',
 'ajout','retir','supprim','chang','modifi','mettre','met','lanc','demarr','arret','stop',
 'mont','edit','rendre','stream','film','regarder','regard','lire','lis','suivre','suiv','boost','promouvoir'];
const VERB_RE = new RegExp('^(?:' + VERBS.join('|') + ')');
const NOT_VERBS = /^(bonjour|salut|coucou|merci|oui|non|ok|hey|yo|hier|super|cher|mer|fier|leger|premier|dernier|entier|papier|metier|quartier|hiver|amer|clair|noir|soir|faire-part)$/;

function looksLikeTask(raw){
  const words = strip(raw).replace(/[^a-z0-9'\s-]/g,' ').trim().split(/\s+/).filter(Boolean);
  if(!words.length) return false;
  if(NOT_VERBS.test(words[0])) return false;
  const w = words[0].replace(/^(re|r)(?=[a-z]{4})/, '');
  if(VERB_RE.test(w) || VERB_RE.test(words[0])) return true;   // « finir », « payer » : un mot suffit
  if(words.length < 2) return false;
  return /(?:er|ir|re|oir)$/.test(words[0]);
}

/* Une phrase qui décrit un état, pas une action : c'est une note. */
const STATE = /\b(est|sont|etait|etaient|sera|seront|ai|as|ont|avait|prend|prennent|coute|coutent|vaut|valent|gagne|gagnent|rapporte|rapportent|fait|font|cloture|termine|commence|passe|represente|correspond|equivaut|reste|dure|contient|utilise|s'appelle|signifie|sort|sortent|paie|paient|repond|repondent)\b/;
const DET   = /^(le|la|les|l'|un|une|des|du|de|mon|ma|mes|ton|ta|tes|son|sa|ses|notre|nos|ce|cet|cette|ces|il|elle|on|ils|elles|nous|vous|ca|cela)$/;

function looksLikeNote(raw){
  const t = strip(raw);
  const words = t.replace(/[^a-z0-9'\s-]/g,' ').trim().split(/\s+/).filter(Boolean);
  if(words.length < 3) return false;
  if(STATE.test(t)) return true;
  return DET.test(words[0]) && words.length >= 4;
}

/* --- Les portes d'entrée, tolérantes aux fautes --- */
const TASK_TRIG = /^\s*(rap+el+e?z?[- ]?(?:moi|nous)|rap+el+e?z?\b|n'?oubli[ez]+\s+pas|pense[zr]?[- ]?y|pense[zr]?|tache\s*:?|todo\s*:?)\s*(?:de\s+|d'|qu'|que\s+|[aà]\s+)?/i;
const DUTY_TRIG = /^\s*(je\s+dois|j'?ai\s+[aà]\s|il\s+faut(?:\s+que\s+je|\s+que\s+j'|\s+qu'on)?|faut(?:\s+que\s+je|\s+qu'on)?|j'?ai\s+besoin\s+d[e']|[aà]\s+faire\s*:?)\s*(?:de\s+|d')?/i;
const NOTE_TRIG = /^\s*(note[rz]?\s*(?:que\s+|:\s*)?|retiens?\s*(?:que\s+)?|souviens[- ]toi\s*(?:que\s+)?|pour\s+info\s*:?\s*|info\s*:\s*|[aà]\s+savoir\s*:?\s*)/i;
const FORGET    = /^\s*(annule[rz]?|oublie[rz]?|supprime[rz]?|efface[rz]?|enleve[rz]?|retire[rz]?|vire[rz]?)\s+/i;
const QUESTION  = /^\s*(combien|comment|quand|pourquoi|qui\s|quoi|quel|quelle|quels|quelles|ou\s+(est|sont)|est-ce|qu'est-ce|c'est\s+quoi|y\s+a-t-il)/i;
const URGENT    = /\b(urgent(?:e|es|s)?|asap|au plus vite|en urgence|tres important|important)\b/;

const clean = w => w.replace(/\s+/g,' ')
  .replace(/^\s*[:,\-–]\s*/,'')
  .replace(/^\s*(de|d'|à|a|au|aux|que|qu')\s+/i,'')
  .replace(/\s+(avant|pour|d'ici|vers|jusqu'a|jusqu'à|le|la|les|du|de|à|a|et)\s*$/i,'')
  .replace(/[\s,.;:–-]+$/,'').trim();

/* Comprend un message. Le type se déduit, on ne le demande jamais. */
function read(raw){
  const q0 = raw.trim();
  if(!q0) return { kind:'vide' };
  const flat0 = strip(q0);

  /* 1. Une question ? Il répondra avec ce qu'il sait. */
  if(QUESTION.test(flat0) || /\?\s*$/.test(q0)) return { kind:'question', what:q0, sure:true };

  /* 2. Un ordre d'oublier ? */
  const fm = flat0.match(FORGET);
  if(fm){
    const target = clean(q0.slice(fm[0].length).replace(/^(le\s+|la\s+|les\s+|mon\s+|ma\s+)?(rappel|tache|tâche|note|truc)\s*(de\s+|sur\s+|du\s+|d')?/i,''));
    return target ? { kind:'oubli', what:target, sure:true } : { kind:'incomplet' };
  }

  /* 3. L'urgence se retire avant tout : elle qualifie, elle ne classe pas. */
  let q = q0, urgent = false;
  const um = strip(q).match(URGENT);
  if(um){
    urgent = true;
    const i = strip(q).indexOf(um[0]);
    q = (q.slice(0, i) + q.slice(i + um[0].length)).replace(/\s+/g,' ').trim();
    q = q.replace(/^\s*[:,\-–]\s*/,'').replace(/\s*[:,\-–]\s*$/,'').trim();
  }
  if(!q) return { kind:'incomplet' };

  const flat = strip(q);
  const when = readWhen(q);

  let kind = null, trig = null;
  if(NOTE_TRIG.test(flat))       { kind = 'note';  trig = NOTE_TRIG; }
  else if(TASK_TRIG.test(flat))  { kind = 'tache'; trig = TASK_TRIG; }
  else if(DUTY_TRIG.test(flat))  { kind = 'tache'; trig = DUTY_TRIG; }
  else if(looksLikeTask(q))      { kind = 'tache'; }
  else if(looksLikeNote(q))      { kind = 'note';  }
  else if(when.due)              { kind = 'tache'; }
  else return { kind:'inconnu' };

  let what = trig ? q.replace(new RegExp(trig.source, 'i'), '') : q;
  for(const bit of when.eaten){
    const i = strip(what).indexOf(bit);
    if(i >= 0) what = what.slice(0, i) + what.slice(i + bit.length);
  }
  what = clean(what);
  if(!what) return { kind: trig ? 'incomplet' : 'inconnu' };

  return {
    kind, urgent,
    sure: !!(trig || when.due || urgent),
    what: what.charAt(0).toUpperCase() + what.slice(1),
    due: when.due, hasTime: when.hasTime,
    repeat: when.repeat, before: when.before, past: when.past,
  };
}

/* ---- mise en mots d'une échéance ---- */
const HM = d => d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
function whenLabel(due, hasTime=true, repeat=null){
  if(!due) return 'sans échéance';
  const h = hasTime ? ' à ' + HM(due) : '';
  if(repeat === 'jour')    return 'tous les jours' + h;
  if(repeat === 'semaine') return 'chaque ' + due.toLocaleDateString('fr-FR',{weekday:'long'}) + h;
  if(repeat === 'mois')    return 'chaque mois le ' + due.getDate() + h;
  const now = new Date();
  const day = x => new Date(x.getFullYear(), x.getMonth(), x.getDate());
  const gap = Math.round((day(due) - day(now)) / 86400000);
  if(gap === 0)  return "aujourd'hui" + h;
  if(gap === 1)  return 'demain' + h;
  if(gap === -1) return 'hier' + h;
  if(gap < 0)    return 'le ' + due.toLocaleDateString('fr-FR',{day:'numeric',month:'short'}) + h;
  if(gap < 7)    return due.toLocaleDateString('fr-FR',{weekday:'long'}) + h;
  return 'le ' + due.toLocaleDateString('fr-FR',{day:'numeric',month:'long'}) + h;
}

/* Chaque bulle vivante est pilotée par un Blob */
class Blob {
  constructor(host){
    host.innerHTML = blobSVG();
    this.el = host.querySelector('.blob');
    this.eyes = [...this.el.querySelectorAll('.eye')];
    this.mood = 'idle';
    this.locked = false;
    if(!reduce){ this.loopBlink(); this.loopIdle(); }
  }
  /* --- clignement : deux battements rapprochés de temps en temps --- */
  loopBlink(){
    const next = 2200 + Math.random()*3600;
    this._b = setTimeout(async ()=>{
      await this.blink();
      if(Math.random() < .3){ await wait(140); await this.blink(); }
      this.loopBlink();
    }, next);
  }
  async blink(){
    if(this.mood === 'sleep' || this.mood === 'shut') return;
    this.el.classList.add('blink');
    await wait(105);
    this.el.classList.remove('blink');
  }
  /* --- regard baladeur quand personne ne bouge la souris --- */
  loopIdle(){
    this._i = setTimeout(()=>{
      if(!this.locked && Date.now() - LAST_MOVE > 2400){
        const a = Math.random()*Math.PI*2, r = 2 + Math.random()*3.4;
        this.look(Math.cos(a)*r, Math.sin(a)*r*.7);
        if(Math.random() < .22) this.flash('curious', 1100);
      }
      this.loopIdle();
    }, 1600 + Math.random()*1800);
  }
  look(x, y){
    this.eyes.forEach(e => e.style.transform = `translate(${x.toFixed(2)}px, ${y.toFixed(2)}px)`);
  }
  set(m){
    this.el.classList.remove('ex-happy','ex-squint','ex-wow','ex-think','ex-sleep','ex-curious','ex-shut');
    this.mood = m;
    if(m !== 'idle') this.el.classList.add('ex-' + m);
  }
  flash(m, ms=900){
    this.set(m);
    clearTimeout(this._f);
    this._f = setTimeout(()=>{ if(this.mood === m) this.set('idle'); }, ms);
  }
  destroy(){ clearTimeout(this._b); clearTimeout(this._i); clearTimeout(this._f); const i = LIVE.indexOf(this); if(i>=0) LIVE.splice(i,1); }
  night(on){ this.el.classList.toggle('night', !!on); }
  tone(t){
    this.el.classList.remove('tone-green','tone-orange','tone-red','tone-purple');
    if(t !== 'blue') this.el.classList.add('tone-' + t);
    const host = this.el.closest('[data-tone-host]');   // la pastille suit
    if(host) host.dataset.tone = t;
  }
  bounce(){
    this.el.classList.remove('bounce'); void this.el.offsetWidth;
    this.el.classList.add('bounce');
    setTimeout(()=>this.el.classList.remove('bounce'), 560);
  }
}

/* --- la bulle suit le curseur --- */
let LAST_MOVE = 0;
const LIVE = [];
function eyesTo(e){
  LAST_MOVE = Date.now();
  if(reduce) return;
  for(const b of LIVE){
    if(b.locked) continue;
    const r = b.el.getBoundingClientRect();
    if(!r.width) continue;
    const dx = e.clientX - (r.left + r.width/2);
    const dy = e.clientY - (r.top + r.height/2);
    const d = Math.hypot(dx, dy) || 1;
    const amp = Math.min(d/26, 4.6);
    b.look(dx/d*amp, dy/d*amp*.75);
  }
}
window.addEventListener('pointermove', eyesTo, {passive:true});
window.addEventListener('pointerdown', eyesTo, {passive:true});

/* ================= Ce qu'il sait répondre ================= */
const STOP = /^(que|qui|quoi|quel|quelle|dans|pour|avec|sans|mais|donc|est|sont|les|des|une|mon|ma|mes|ce|cette|il|elle|sur|the|and|moi|nous|vous|ai|as|a|de|du|la|le|en|au)$/;
const keywords = q => strip(q).replace(/[^a-z0-9'\s-]/g,' ').split(/\s+/)
  .filter(w => w.length >= 3 && !STOP.test(w));

function answerQ(q){
  const t = strip(q);
  const T = tasks(), N = memos();

  if(/\b(tache|taches|faire|todo)\b/.test(t) && /\b(combien|quoi|qu'est-ce|que|reste|quelle)\b/.test(t)){
    if(/aujourd/.test(t)){
      const end = new Date(); end.setHours(23,59,59);
      const now = Date.now();
      const day = T.filter(n => n.due && n.due <= +end);
      return { text: day.length ? `${day.length} tâche${day.length>1?'s':''} pour aujourd'hui.` : "Rien de daté pour aujourd'hui.", items: day };
    }
    return { text: T.length ? `${T.length} tâche${T.length>1?'s':''} en attente.` : "Aucune tâche. Vous êtes à jour.", items: T.slice(0,4) };
  }
  if(/\bnotes?\b/.test(t) && /\b(combien|quelle|quelles)\b/.test(t))
    return { text: N.length ? `${N.length} note${N.length>1?'s':''} en mémoire.` : 'Aucune note.', items: N.slice(0,4) };

  /* recherche dans tout ce qu'il connaît */
  const ks = keywords(q);
  if(ks.length){
    const scored = [...N, ...T].map(n => {
      const h = strip(n.what);
      return { n, s: ks.filter(k => h.includes(k)).length };
    }).filter(x => x.s > 0).sort((a,b) => b.s - a.s);
    if(scored.length) return { text: scored.length === 1 ? 'Voilà ce que j\u2019ai :' : 'Voilà ce que j\u2019ai là-dessus :', items: scored.slice(0,4).map(x => x.n) };
  }
  return { text: null };
}

/* ---- L'artefact qui sort de Grid et va se ranger ---- */
function flyMem(kind){
  const from = $('gtBlob'), to = $(MEM[kind].orb);
  if(!from || !to || !to.offsetParent) return;
  const a = from.getBoundingClientRect(), b = to.getBoundingClientRect();
  if(!a.width || !b.width) return;

  const S = 20;
  const ax = a.left + a.width/2 - S/2, ay = a.top + a.height/2 - S/2;
  const bx = b.left + b.width/2 - S/2, by = b.top + b.height/2 - S/2;

  const fly = document.createElement('div');
  fly.className = 'fly';
  const core = document.createElement('i');
  core.style.width = core.style.height = S + 'px';
  core.style.background = kind === 'note'
    ? 'radial-gradient(circle at 38% 32%, #EFEAFF, #7C6CF0)'
    : 'radial-gradient(circle at 38% 32%, #FFF3CE, #FFB800)';
  core.style.boxShadow = '0 0 18px ' + (kind === 'note' ? 'rgba(124,108,240,.7)' : 'rgba(255,184,0,.7)');
  fly.appendChild(core);
  document.body.appendChild(fly);

  fly.style.transform  = `translate(${ax}px, 0)`;
  core.style.transform = `translateY(${ay}px) scale(0)`;
  void fly.offsetWidth;

  /* 1 — la bulle naît à côté de Grid, et on la voit naître */
  fly.classList.add('pop');
  core.style.transform = `translateY(${ay}px) scale(1)`;
  BUB.bounce();

  setTimeout(()=>{
    /* 2 — elle part vers la droite, en arc */
    fly.classList.remove('pop');
    fly.classList.add('go');
    fly.style.transform  = `translate(${bx}px, 0)`;
    core.style.transform = `translateY(${by}px) scale(.5)`;
    BUB.look(bx > ax ? 4.6 : -4.6, -1.2);          // Grid la suit du regard

    setTimeout(()=>{
      core.style.opacity = '0';                     // elle ne s'efface qu'en arrivant
      const orb = $(MEM[kind].orb);
      orb.classList.remove('land'); void orb.offsetWidth; orb.classList.add('land');
      setTimeout(()=> fly.remove(), 260);
    }, 700);
  }, 480);
}

async function remember(kind, what, due, hasTime, repeat, urgent){
  /* Il ne note pas deux fois la même chose. */
  const twin = NOTES.find(n => !n.done && n.kind === kind && strip(n.what) === strip(what));
  if(twin){
    closeAsk();
    BUB.flash('curious', 1200);
    return;
  }
  NOTES.push({
    id: Date.now() + '-' + Math.random().toString(36).slice(2,7),
    kind, what, due: due ? due.getTime() : null, hasTime: !!hasTime,
    repeat: repeat || null, urgent: !!urgent,
    done:false, fired:false, created: Date.now(),
  });
  closeAsk();
  await working();
  await saveNotes();
  paintMem(); refreshCal();   // l'artefact apparaît d'abord…
  await wait(60);
  flyMem(kind);               // …puis Grid lui envoie sa bille
  paintBadge();
  await noted();
  BUB.look(0, 0);
}

async function forget(id){
  NOTES = NOTES.filter(n => n.id !== id);
  await saveNotes(); paintMem(); paintBadge(); repaintMemPops(); refreshCal();
}
const PERIOD = { jour:1, semaine:7, mois:0 };
async function finishNote(id){
  const n = NOTES.find(x => x.id === id);
  if(!n) return;
  if(n.repeat && n.due){
    /* Une tâche qui revient ne se termine pas : elle se rejoue. */
    const d = new Date(n.due);
    if(n.repeat === 'mois') d.setMonth(d.getMonth()+1);
    else d.setDate(d.getDate() + PERIOD[n.repeat]);
    while(d <= Date.now()){ n.repeat === 'mois' ? d.setMonth(d.getMonth()+1) : d.setDate(d.getDate() + PERIOD[n.repeat]); }
    n.due = +d; n.fired = false;
    await saveNotes(); paintMem(); paintBadge(); repaintMemPops(); refreshCal(); paintAsk();
    BUB.tone('green'); BUB.flash('happy', 1100);
    setTimeout(()=>BUB.tone('blue'), 1200);
    return;
  }
  n.done = true; n.doneAt = Date.now();
  await saveNotes();
  paintMem(); paintBadge(); repaintMemPops(); paintAsk(); refreshCal();
  BUB.tone('green'); BUB.flash('happy', 1100);
  setTimeout(()=>BUB.tone('blue'), 1200);
}

const asDataURL = file => new Promise((res, rej)=>{
  const fr = new FileReader();
  fr.onerror = rej;
  fr.onload = () => res(String(fr.result));
  fr.readAsDataURL(file);
});
function downscale(file, max){
  return new Promise((res, rej)=>{
    const img = new Image();
    const fr = new FileReader();
    fr.onerror = rej;
    fr.onload = () => { img.src = fr.result; };
    img.onerror = rej;
    img.onload = () => {
      const s = Math.min(max/img.width, max/img.height, 1);
      const w = Math.round(img.width*s), h = Math.round(img.height*s);
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      res(c.toDataURL('image/jpeg', .82));
    };
    fr.readAsDataURL(file);
  });
}

async function submit(){
  const pseudo = fPseudo.value.trim(), pw = fPass.value, btn = $('authBtn');
  if(pseudo.length < 3) return showErr('Choisissez un pseudo d\u2019au moins 3 caractères.');
  if(!/^[a-zA-Z0-9_.\- ]+$/.test(pseudo)) return showErr('Lettres, chiffres, tirets et points uniquement.');
  if(!pw) return showErr('Entrez votre mot de passe.');

  USERS = (await Store.get(K_USERS)) || {};
  const id = pseudo.toLowerCase();
  btn.disabled = true;
  try{
    if(MODE === 'create'){
      if(USERS[id]){ MODE = 'login'; paintAuth(); return showErr('Ce pseudo existe déjà. Connectez-vous.'); }
      if(gaugePw() < 3) return showErr('Mot de passe trop faible pour protéger un business.');
      const s = salt();
      USERS[id] = { pseudo, salt:s, hash: await hash(pw, s), photo:null, created:Date.now() };
      await Store.set(K_USERS, USERS);
    } else {
      const u = USERS[id];
      if(!u) return showErr('Aucun profil à ce pseudo sur ce navigateur.');
      if(!eq(await hash(pw, u.salt), u.hash)) return showErr('Mot de passe incorrect.');
    }
    await Store.set(K_SESSION, id);
    await enter(id);
  } finally { btn.disabled = false; }
}

    cta.textContent = 'Réveillez Grid';
  } else {
    BOOT_BUB.flash('curious', 1400);
  }

  return new Promise(res => {
    const done = async e => {
      e.preventDefault();
      blob.removeEventListener('click', done);
      cta.removeEventListener('click', done);
      blob.removeEventListener('keydown', onKey);
      cta.removeEventListener('keydown', onKey);
      blob.removeEventListener('pointerenter', peek);
      blob.style.cursor = 'default';

      if(ASLEEP){
        /* Le réveil, en trois temps : il émerge, il réalise, il sourit. */
        BOOT_BUB.locked = false;
        BOOT_BUB.set('squint');  BOOT_BUB.bounce();
        await wait(260);
        await BOOT_BUB.blink();
        BOOT_BUB.set('wow');
        await wait(420);
        BOOT_BUB.set('happy');
        await wait(360);
      } else {
        BOOT_BUB.bounce(); BOOT_BUB.set('happy');
        await wait(380);
      }
      res();
    };
    const onKey = e => { if(e.key === 'Enter' || e.key === ' ') done(e); };
    const peek = () => { if(!ASLEEP) BOOT_BUB.flash('wow', 800); };   // on ne réveille pas en passant
    blob.addEventListener('click', done);
    cta.addEventListener('click', done);
    blob.addEventListener('keydown', onKey);
    cta.addEventListener('keydown', onKey);
    blob.addEventListener('pointerenter', peek);
  });
}
async function bootOut(){
  boot.classList.add('out');
  await wait(reduce ? 0 : 500);
  boot.classList.remove('on','out','gate');
}
async function runBoot(){
  boot.classList.add('on');
  ASLEEP = NIGHT();
  BOOT_BUB.night(ASLEEP); AUTH_BUB.night(ASLEEP);

  BOOT_BUB.set('sleep');
  BOOT_BUB.locked = true;                // endormi, il ne suit rien du regard
  BOOT_BUB.look(0, 0);
  await wait(760);

  if(!ASLEEP){
    BOOT_BUB.locked = false;
    BOOT_BUB.set('idle');                // il ouvre les yeux
    await wait(200);
    BOOT_BUB.look(-3.4, -1.6); await wait(420);
    BOOT_BUB.look(3.4, -1.6);  await wait(420);
    BOOT_BUB.look(0, 0);
    BOOT_BUB.flash('wow', 700);          // il vous voit
  }

  for(const [label, pct] of STEPS){
    bootStatus.textContent = label;
    bootBar.style.width = pct + '%';
    await wait(340);
  }
  if(!ASLEEP) BOOT_BUB.set('idle');      // la nuit, il continue de dormir
  await wait(260);
}

(async function start(){
  await applyTheme((await Store.get(K_THEME)) === 'dark', false);
  await runBoot();

  USERS = (await Store.get(K_USERS)) || {};
  const last = await Store.get(K_SESSION);

  /* Pas de reprise automatique : Grid redemande le mot de passe à chaque lancement. */
  MODE = Object.keys(USERS).length ? 'login' : 'create';
  if(MODE === 'login') fPseudo.value = (USERS[last] || Object.values(USERS)[0]).pseudo;
  paintAuth();

  await gateWait();          // Grid grandit et attend le clic
  await bootOut();
  auth.classList.add('on');
  (MODE === 'login' ? fPass : fPseudo).focus();
})();
</script>
