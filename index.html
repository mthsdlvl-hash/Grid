<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Grid — Gestion de business UEFN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Familjen+Grotesk:wght@400;500;600;700&family=Inter+Tight:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#EDEEF0;
  --card:#FFFFFF;
  --ink:#15171C;
  --muted:#8C919B;
  --hair:#E4E6EA;
  --amber:#FFC42E;
  --amber-soft:#FFF3D0;
  --mint:#4FBF8B;
  --coral:#F0655A;
  --violet:#7C6CF0;
  --r:18px;
  --shadow:0 1px 2px rgba(20,23,30,.04), 0 8px 24px rgba(20,23,30,.06);
  --shadow-lift:0 2px 4px rgba(20,23,30,.05), 0 18px 48px rgba(20,23,30,.10);
  --display:'Familjen Grotesk',system-ui,sans-serif;
  --body:'Inter Tight',system-ui,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:
    radial-gradient(1200px 600px at 70% -10%, #FFFFFF 0%, transparent 60%),
    var(--paper);
  color:var(--ink);
  font-family:var(--body);
  font-weight:400;
  -webkit-font-smoothing:antialiased;
}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
a{color:inherit;text-decoration:none}
:focus-visible{outline:2px solid var(--ink);outline-offset:2px;border-radius:6px}

/* ---------- Shell ---------- */
.app{
  display:grid;
  grid-template-columns:248px 1fr;
  height:100vh;
  gap:12px;
  padding:12px;
}

/* ---------- Sidebar ---------- */
.side{
  background:var(--card);
  border-radius:var(--r);
  box-shadow:var(--shadow);
  padding:20px 14px;
  display:flex;
  flex-direction:column;
  overflow:auto;
}
.brand{
  display:flex;align-items:center;gap:9px;
  padding:2px 8px 22px;
}
.brand-mark{
  width:22px;height:22px;flex:none;
  display:grid;grid-template:repeat(2,1fr)/repeat(2,1fr);gap:2.5px;
}
.brand-mark i{
  display:block;border-radius:2.5px;background:var(--ink);
  transition:background .35s ease, transform .35s ease;
}
.brand-mark i:nth-child(2){background:var(--amber)}
.brand:hover .brand-mark i:nth-child(2){transform:scale(1.2)}
.brand-name{
  font-family:var(--display);font-weight:700;
  text-transform:uppercase;letter-spacing:.13em;font-size:13px;
  padding-left:1px;
}

.side-search{
  display:flex;align-items:center;gap:8px;
  padding:9px 10px;margin:0 4px 18px;
  border-bottom:1px solid var(--hair);
  color:var(--muted);font-size:13px;
}
.side-search input{
  border:none;background:none;outline:none;width:100%;
  font:inherit;color:var(--ink);
}
.side-search input::placeholder{color:var(--muted)}

.nav-label{
  font-size:10px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--muted);padding:0 10px;margin:14px 0 8px;
}
.nav-item{
  display:flex;align-items:center;gap:11px;
  width:100%;padding:9px 10px;border-radius:11px;
  font-size:13.5px;color:#4A4F59;
  transition:background .15s, color .15s;
}
.nav-item:hover{background:#F5F6F8;color:var(--ink)}
.nav-item[aria-current="page"]{
  background:#F2F3F5;color:var(--ink);font-weight:500;
  box-shadow:inset 0 0 0 1px var(--hair);
}
.nav-item svg{flex:none;opacity:.7}
.nav-item[aria-current="page"] svg{opacity:1}
.nav-count{
  margin-left:auto;font-family:var(--mono);font-size:10.5px;color:var(--muted);
}
.side-foot{margin-top:auto;padding-top:18px}
.payout-mini{
  background:#F7F8FA;border-radius:14px;padding:13px;
}
.payout-mini .t{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.payout-mini .v{font-family:var(--display);font-size:22px;font-weight:600;letter-spacing:-.03em;margin:4px 0 8px}
.bar{height:4px;border-radius:99px;background:#E7E9ED;overflow:hidden}
.bar > i{display:block;height:100%;background:var(--amber);border-radius:99px}
.payout-mini .s{font-size:11px;color:var(--muted);margin-top:7px}

/* ---------- Main ---------- */
.main{overflow:auto;padding-right:2px}
.topbar{
  display:flex;align-items:center;gap:10px;
  padding:4px 4px 16px;
}
.chip{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--card);border-radius:99px;padding:8px 14px;
  box-shadow:var(--shadow);font-size:13px;
}
.chip.ghost{box-shadow:inset 0 0 0 1px var(--hair);background:transparent}
.dot{width:6px;height:6px;border-radius:50%;background:var(--mint);flex:none}
.topbar .spacer{flex:1}
.search-wide{
  display:flex;align-items:center;gap:9px;
  background:var(--card);border-radius:99px;padding:9px 14px;
  box-shadow:var(--shadow);min-width:280px;color:var(--muted);font-size:13px;
}
.search-wide input{border:none;background:none;outline:none;font:inherit;color:var(--ink);width:100%}
.kbd{font-family:var(--mono);font-size:10px;color:var(--muted);border:1px solid var(--hair);border-radius:5px;padding:2px 5px}

.page-head{padding:0 4px 18px}
.eyebrow{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
h1{
  font-family:var(--display);font-weight:500;
  font-size:clamp(28px,3.2vw,40px);letter-spacing:-.035em;line-height:1.05;
  margin-top:7px;
}
h1 em{font-style:normal;color:var(--muted)}

.grid{display:grid;gap:12px}
.cols-3{grid-template-columns:repeat(3,1fr)}
.cols-2{grid-template-columns:1.55fr 1fr}

.card{
  background:var(--card);border-radius:var(--r);
  box-shadow:var(--shadow);padding:18px;
  transition:box-shadow .25s, transform .25s;
}
.card.interactive:hover{box-shadow:var(--shadow-lift);transform:translateY(-2px)}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title{font-size:13px;font-weight:500}
.card-head .arrow{color:var(--muted);transition:transform .2s}
.card.interactive:hover .arrow{transform:translateX(3px);color:var(--ink)}

/* Signature: le cycle de paiement */
.cycle{
  grid-column:span 3;
  background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);
  padding:22px 24px;display:grid;grid-template-columns:auto 1fr auto;gap:28px;align-items:center;
}
.cycle-num{font-family:var(--display);font-size:44px;font-weight:600;letter-spacing:-.04em;line-height:1}
.cycle-num span{font-size:16px;color:var(--muted);font-weight:400;letter-spacing:0}
.cycle-sub{font-size:12px;color:var(--muted);margin-top:5px}
.river{position:relative;height:44px}
.river svg{width:100%;height:100%;display:block;overflow:visible}
.river-legend{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9.5px;color:var(--muted);margin-top:6px}
.cycle-eta{text-align:right}
.cycle-eta .d{font-family:var(--display);font-size:20px;font-weight:500;letter-spacing:-.02em}
.cycle-eta .l{font-size:11px;color:var(--muted);margin-top:3px}

.stat-row{display:flex;align-items:baseline;gap:8px}
.stat-big{font-family:var(--display);font-size:26px;font-weight:600;letter-spacing:-.03em}
.stat-delta{font-size:11.5px;font-weight:500}
.up{color:var(--mint)} .down{color:var(--coral)}
.stat-note{font-size:11.5px;color:var(--muted);margin-top:4px}

.legend{display:flex;gap:18px;margin-bottom:12px}
.legend div{font-size:11px;color:var(--muted)}
.legend b{display:block;font-family:var(--display);font-size:19px;font-weight:600;color:var(--ink);letter-spacing:-.02em;margin-bottom:2px}
.legend i{display:inline-block;width:5px;height:5px;border-radius:50%;margin-right:5px;vertical-align:middle}

.meter{height:6px;border-radius:99px;background:#EFF0F3;display:flex;overflow:hidden;gap:2px}
.meter i{display:block;height:100%;border-radius:99px}

.rev-line{margin-bottom:14px}
.rev-line:last-child{margin-bottom:0}
.rev-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.rev-v{font-family:var(--display);font-size:19px;font-weight:600;letter-spacing:-.02em}
.rev-l{font-size:11px;color:var(--muted)}

/* Table */
.table-wrap{grid-column:span 3;background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);padding:18px 6px 6px}
.table-head{display:flex;align-items:center;justify-content:space-between;padding:0 12px 14px}
.table-title{font-family:var(--display);font-size:17px;font-weight:500;letter-spacing:-.02em}
.filters{display:flex;gap:6px}
.filter{font-size:12px;color:var(--muted);padding:5px 11px;border-radius:99px}
.filter[aria-pressed="true"]{background:#F2F3F5;color:var(--ink);box-shadow:inset 0 0 0 1px var(--hair)}
table{width:100%;border-collapse:collapse}
th{
  text-align:left;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--muted);font-weight:400;padding:0 12px 10px;
}
th.num,td.num{text-align:right}
tbody tr{transition:background .15s}
tbody tr:hover{background:#F8F9FB}
td{padding:13px 12px;border-top:1px solid var(--hair);font-size:13px;vertical-align:middle}
tbody tr:first-child td{border-top:1px solid var(--hair)}
.map-name{display:flex;align-items:center;gap:11px}
.map-thumb{width:30px;height:30px;border-radius:9px;flex:none;box-shadow:inset 0 0 0 1px rgba(0,0,0,.05)}
.map-name b{font-weight:500;display:block}
.code{font-family:var(--mono);font-size:10.5px;color:var(--muted);letter-spacing:-.01em}
.tag{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:#4A4F59}
.tag i{width:5px;height:5px;border-radius:50%;flex:none}
.num{font-family:var(--mono);font-size:12px}
.row-action{color:var(--muted);opacity:0;transition:opacity .15s}
tr:hover .row-action{opacity:1}

/* Bottom */
.gauge-card{display:grid;grid-template-columns:1fr auto;gap:20px;align-items:center}
.gauge{position:relative;width:100%;max-width:220px;margin:0 auto}
.gauge svg{width:100%;display:block}
.gauge-val{
  position:absolute;left:50%;bottom:6px;transform:translateX(-50%);
  text-align:center;
}
.gauge-val b{font-family:var(--display);font-size:34px;font-weight:600;letter-spacing:-.04em;display:block;line-height:1}
.gauge-val small{font-size:10.5px;color:var(--muted)}
.gauge-lab{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);text-align:center;margin-bottom:8px}
.breakdown{display:flex;flex-direction:column;gap:14px;min-width:150px}
.bd-item .t{font-size:11.5px;color:var(--muted);display:flex;align-items:center;gap:7px}
.bd-item .v{font-family:var(--display);font-size:17px;font-weight:600;letter-spacing:-.02em;margin-top:2px}

.feed{display:flex;flex-direction:column}
.feed-item{
  display:flex;align-items:center;gap:12px;
  padding:11px 0;border-top:1px solid var(--hair);font-size:12.5px;
}
.feed-item:first-of-type{border-top:none}
.feed-item .when{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--muted);white-space:nowrap}
.feed-ic{width:26px;height:26px;border-radius:8px;background:#F4F5F7;display:grid;place-items:center;flex:none;color:var(--muted)}

.empty{padding:60px 20px;text-align:center}
.empty h2{font-family:var(--display);font-weight:500;font-size:22px;letter-spacing:-.02em;margin-bottom:8px}
.empty p{font-size:13px;color:var(--muted);max-width:340px;margin:0 auto 18px}
.btn{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--ink);color:#fff;border-radius:99px;padding:10px 18px;font-size:13px;font-weight:500;
}
.btn:hover{opacity:.88}

@media(max-width:1100px){
  .cols-3{grid-template-columns:1fr 1fr}
  .cycle{grid-column:span 2}
  .table-wrap{grid-column:span 2}
  .cols-2{grid-template-columns:1fr}
}
@media(max-width:860px){
  .app{grid-template-columns:1fr}
  .side{display:none}
  .cols-3{grid-template-columns:1fr}
  .cycle{grid-column:span 1;grid-template-columns:1fr;gap:18px}
  .cycle-eta{text-align:left}
  .table-wrap{grid-column:span 1;overflow-x:auto}
  table{min-width:640px}
  .search-wide{min-width:0}
}
@media(prefers-reduced-motion:reduce){
  *{transition:none!important;animation:none!important}
}
</style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <aside class="side">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true"><i></i><i></i><i></i><i></i></div>
      <div class="brand-name">Grid</div>
    </div>

    <label class="side-search">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></svg>
      <input placeholder="Chercher une île, un joueur…">
    </label>

    <div class="nav-label">Pilotage</div>
    <nav id="nav">
      <button class="nav-item" data-page="dashboard" aria-current="page">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M3 12l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
        Tableau de bord
      </button>
      <button class="nav-item" data-page="maps">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M9 4L3 7v13l6-3 6 3 6-3V4l-6 3-6-3z"/><path d="M9 4v13M15 7v13"/></svg>
        Mes îles <span class="nav-count">7</span>
      </button>
      <button class="nav-item" data-page="revenue">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M4 19V9M10 19V5M16 19v-6M22 19H2"/></svg>
        Revenus
      </button>
      <button class="nav-item" data-page="players">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="9" cy="8" r="3.2"/><path d="M3 19c0-3.3 2.7-5 6-5s6 1.7 6 5"/><path d="M16 5.2a3.2 3.2 0 010 5.6M18 14c2.4.6 3.9 2.3 3.9 5"/></svg>
        Joueurs
      </button>

      <div class="nav-label">Production</div>
      <button class="nav-item" data-page="pipeline">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="6" cy="6" r="2.5"/><circle cx="6" cy="18" r="2.5"/><circle cx="18" cy="12" r="2.5"/><path d="M6 8.5v7M8.5 6h4a3 3 0 013 3v.5M8.5 18h4a3 3 0 003-3v-.5"/></svg>
        Publications
      </button>
      <button class="nav-item" data-page="team">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M12 3v18M4 8h16M4 16h16"/></svg>
        Équipe &amp; parts
      </button>
      <button class="nav-item" data-page="costs">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="3" y="6" width="18" height="13" rx="2.5"/><path d="M3 10h18M7 15h4"/></svg>
        Charges
      </button>
    </nav>

    <div class="side-foot">
      <div class="payout-mini">
        <div class="t">Prochain versement</div>
        <div class="v">4 812 $</div>
        <div class="bar"><i style="width:68%"></i></div>
        <div class="s">Cycle juillet — 68 % écoulé</div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main" id="main"></main>
</div>

<script>
/* ---------------- Données (mock — à brancher plus tard) ---------------- */
const DATA = {
  cycle: { earned: 4812, target: 7000, progress: 68, close: "31 juil.", pay: "vers le 15 août" },
  maps: [
    { name:"Neon Drift Circuit", code:"8421-9037-1156", grad:"linear-gradient(135deg,#FFD86E,#FF9C6E)", status:"live",    ccu:1284, d7:41.2, mins:18.4, rev:2140 },
    { name:"Prop Hunt: Atrium",  code:"7710-4432-9908", grad:"linear-gradient(135deg,#9FE7C5,#5AC8A8)", status:"live",    ccu:642,  d7:33.8, mins:22.1, rev:1180 },
    { name:"Tower Siege v3",     code:"3390-1187-2245", grad:"linear-gradient(135deg,#B7B2FF,#7C6CF0)", status:"live",    ccu:388,  d7:19.4, mins:11.2, rev:610  },
    { name:"Zone Zero — Escape", code:"5502-8871-4419", grad:"linear-gradient(135deg,#FFB3AC,#F0655A)", status:"declin",  ccu:126,  d7:9.1,  mins:7.6,  rev:214  },
    { name:"Skyforge Parkour",   code:"6614-2290-7735", grad:"linear-gradient(135deg,#CFD3DA,#9AA1AC)", status:"review",  ccu:0,    d7:0,    mins:0,    rev:0    },
    { name:"Boxfight Arena Pro", code:"1128-6603-5540", grad:"linear-gradient(135deg,#FFE59E,#FFC42E)", status:"live",    ccu:512,  d7:28.6, mins:14.9, rev:668  },
    { name:"Horde Nights",       code:"9903-3318-6721", grad:"linear-gradient(135deg,#A8D8FF,#5FA8E8)", status:"draft",   ccu:0,    d7:0,    mins:0,    rev:0    },
  ],
  status: {
    live:   { label:"En ligne",     color:"var(--mint)"   },
    declin: { label:"En baisse",    color:"var(--coral)"  },
    review: { label:"En relecture", color:"var(--amber)"  },
    draft:  { label:"Brouillon",    color:"#C3C7CE"       },
  },
  feed: [
    { t:"Tower Siege v3 — mise à jour 3.2 publiée", w:"il y a 2 h" },
    { t:"Skyforge Parkour envoyée en relecture Epic", w:"il y a 9 h" },
    { t:"Part de Kenzo ajustée à 20 % sur Neon Drift", w:"hier" },
    { t:"Zone Zero : rétention J7 sous le seuil de 12 %", w:"hier" },
    { t:"Relevé de juin téléchargé", w:"3 juil." },
  ],
};
const nf = n => n.toLocaleString('fr-FR');
const money = n => nf(n) + " $";

/* ---------------- Rendu : courbe d'engagement ---------------- */
function river(){
  const pts = [12,18,15,24,31,27,38,44,41,52,48,61,58,66];
  const w = 100, h = 40, max = 70;
  const step = w/(pts.length-1);
  const xy = pts.map((p,i)=>[i*step, h - (p/max)*h]);
  const line = xy.map(([x,y],i)=> (i? "L":"M") + x.toFixed(2)+","+y.toFixed(2)).join(" ");
  const area = line + ` L${w},${h} L0,${h} Z`;
  return `<div class="river">
    <svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
      <defs><linearGradient id="rg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="var(--amber)" stop-opacity=".22"/>
        <stop offset="1" stop-color="var(--amber)" stop-opacity="0"/>
      </linearGradient></defs>
      <path d="${area}" fill="url(#rg)"/>
      <path d="${line}" fill="none" stroke="var(--amber)" stroke-width="1.4" vector-effect="non-scaling-stroke" stroke-linejoin="round" stroke-linecap="round"/>
      <circle cx="${xy.at(-1)[0]}" cy="${xy.at(-1)[1]}" r="2.4" fill="var(--ink)" vector-effect="non-scaling-stroke"/>
    </svg>
    <div class="river-legend"><span>01 juil</span><span>08</span><span>15</span><span>aujourd'hui</span></div>
  </div>`;
}

/* ---------------- Rendu : jauge ---------------- */
function gauge(pct){
  const r=78, c=Math.PI*r;
  return `<svg viewBox="0 0 200 112">
    <path d="M22 100 A78 78 0 0 1 178 100" fill="none" stroke="#EFF0F3" stroke-width="10" stroke-linecap="round"/>
    <path d="M22 100 A78 78 0 0 1 178 100" fill="none" stroke="url(#gg)" stroke-width="10" stroke-linecap="round"
      stroke-dasharray="${c}" stroke-dashoffset="${c*(1-pct/100)}"/>
    <defs><linearGradient id="gg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="var(--amber)"/><stop offset="1" stop-color="#FF9C6E"/>
    </linearGradient></defs>
  </svg>`;
}

/* ---------------- Pages ---------------- */
const PAGES = {};

PAGES.dashboard = () => {
  const live = DATA.maps.filter(m=>m.status==='live');
  const ccu = DATA.maps.reduce((s,m)=>s+m.ccu,0);
  const rows = DATA.maps.map(m=>{
    const st = DATA.status[m.status];
    return `<tr>
      <td>
        <div class="map-name">
          <span class="map-thumb" style="background:${m.grad}"></span>
          <span><b>${m.name}</b><span class="code">${m.code}</span></span>
        </div>
      </td>
      <td><span class="tag"><i style="background:${st.color}"></i>${st.label}</span></td>
      <td class="num">${m.ccu ? nf(m.ccu) : "—"}</td>
      <td class="num">${m.d7 ? m.d7.toFixed(1)+" %" : "—"}</td>
      <td class="num">${m.mins ? m.mins.toFixed(1) : "—"}</td>
      <td class="num">${m.rev ? money(m.rev) : "—"}</td>
      <td class="num"><span class="row-action">→</span></td>
    </tr>`;
  }).join("");

  return `
  <div class="topbar">
    <span class="chip"><span class="dot"></span>Compte créateur vérifié</span>
    <span class="chip ghost">Cycle juillet 2026</span>
    <span class="spacer"></span>
    <label class="search-wide">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></svg>
      <input placeholder="Chercher dans Grid">
      <span class="kbd">⌘K</span>
    </label>
  </div>

  <div class="page-head">
    <div class="eyebrow">Vue d'ensemble</div>
    <h1>Bonjour Ron. <em>7 îles, 2 952 joueurs en ligne.</em></h1>
  </div>

  <div class="grid cols-3">

    <section class="cycle">
      <div>
        <div class="eyebrow">Gagné ce cycle</div>
        <div class="cycle-num" style="margin-top:8px">${nf(DATA.cycle.earned)}<span> $</span></div>
        <div class="cycle-sub">Objectif ${money(DATA.cycle.target)} · ${DATA.cycle.progress} % du mois écoulé</div>
      </div>
      ${river()}
      <div class="cycle-eta">
        <div class="d">${DATA.cycle.close}</div>
        <div class="l">Clôture du cycle<br>Versement ${DATA.cycle.pay}</div>
      </div>
    </section>

    <article class="card interactive">
      <div class="card-head"><span class="card-title">Ce qui bouge</span><span class="arrow">→</span></div>
      <p style="font-size:13px;line-height:1.5;color:#4A4F59">
        <b style="font-weight:600">Neon Drift Circuit</b> capte 44 % de vos minutes jouées mais 27 % du temps de dev.
        <b style="font-weight:600">Zone Zero</b> perd des joueurs depuis 11 jours — la rétention J7 est passée sous 12 %.
      </p>
      <div style="margin-top:14px;display:flex;gap:6px;flex-wrap:wrap">
        <span class="chip ghost" style="font-size:11.5px;padding:5px 11px">Doubler la mise sur Drift</span>
        <span class="chip ghost" style="font-size:11.5px;padding:5px 11px">Archiver Zone Zero</span>
      </div>
    </article>

    <article class="card interactive">
      <div class="card-head"><span class="card-title">Santé du portefeuille</span><span class="arrow">→</span></div>
      <div class="legend">
        <div><b>4</b><i style="background:var(--mint)"></i>Saines</div>
        <div><b>1</b><i style="background:var(--coral)"></i>En baisse</div>
        <div><b>2</b><i style="background:#C3C7CE"></i>Hors ligne</div>
      </div>
      <div class="meter">
        <i style="background:var(--mint);width:57%"></i>
        <i style="background:var(--coral);width:14%"></i>
        <i style="background:#DDE0E5;width:29%"></i>
      </div>
      <div class="stat-note" style="margin-top:10px">Une île sur sept demande une décision cette semaine.</div>
    </article>

    <article class="card interactive">
      <div class="card-head"><span class="card-title">Coûts &amp; marge</span><span class="arrow">→</span></div>
      <div class="rev-line">
        <div class="rev-top"><span class="rev-v">1 320 $</span><span class="rev-l">Charges · 27 %</span></div>
        <div class="bar"><i style="width:27%;background:var(--ink)"></i></div>
      </div>
      <div class="rev-line">
        <div class="rev-top"><span class="rev-v">3 492 $</span><span class="rev-l">Marge · 73 %</span></div>
        <div class="bar"><i style="width:73%"></i></div>
      </div>
      <div class="stat-note">Parts collaborateurs incluses (2 personnes).</div>
    </article>

    <section class="table-wrap">
      <div class="table-head">
        <span class="table-title">Mes îles</span>
        <div class="filters">
          <button class="filter" aria-pressed="true">Toutes</button>
          <button class="filter" aria-pressed="false">En ligne</button>
          <button class="filter" aria-pressed="false">À décider</button>
        </div>
      </div>
      <table>
        <thead><tr>
          <th>Île</th><th>Statut</th><th class="num">Joueurs</th>
          <th class="num">Rétention J7</th><th class="num">Min / joueur</th><th class="num">Revenu du cycle</th><th></th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </section>

    <div class="grid cols-2" style="grid-column:span 3">
      <article class="card gauge-card">
        <div>
          <div class="gauge-lab">Part des minutes payées</div>
          <div class="gauge">
            ${gauge(57)}
            <div class="gauge-val"><b>57 %</b><small>des sessions dépassent 5 min</small></div>
          </div>
        </div>
        <div class="breakdown">
          <div class="bd-item">
            <div class="t"><i style="width:5px;height:5px;border-radius:50%;background:var(--amber);display:inline-block"></i>Sessions longues</div>
            <div class="v">18 400</div>
          </div>
          <div class="bd-item">
            <div class="t"><i style="width:5px;height:5px;border-radius:50%;background:#DDE0E5;display:inline-block"></i>Sessions courtes</div>
            <div class="v">13 900</div>
          </div>
          <div class="bd-item">
            <div class="t">Écart vs. juin</div>
            <div class="v up" style="color:var(--mint)">+6,2 pts</div>
          </div>
        </div>
      </article>

      <article class="card">
        <div class="card-head"><span class="card-title">Journal</span><span class="arrow">→</span></div>
        <div class="feed">
          ${DATA.feed.map(f=>`<div class="feed-item">
            <span class="feed-ic"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg></span>
            <span>${f.t}</span><span class="when">${f.w}</span>
          </div>`).join("")}
        </div>
      </article>
    </div>

  </div>`;
};

/* Pages à construire aux étapes suivantes */
const soon = (title, desc) => () => `
  <div class="page-head" style="padding-top:8px">
    <div class="eyebrow">Grid</div>
    <h1>${title}</h1>
  </div>
  <div class="card empty">
    <h2>Pas encore construit</h2>
    <p>${desc}</p>
    <button class="btn" data-goto="dashboard">Retour au tableau de bord</button>
  </div>`;

PAGES.maps     = soon("Mes îles",        "Ici vivront la fiche de chaque île, ses versions publiées et son historique de joueurs.");
PAGES.revenue  = soon("Revenus",         "Relevés Epic par cycle, projections et rapprochement avec vos versements réels.");
PAGES.players  = soon("Joueurs",         "Rétention par cohorte, provenance des sessions et courbes de fidélisation.");
PAGES.pipeline = soon("Publications",    "Suivi des soumissions Epic, relectures, et calendrier de sortie de vos mises à jour.");
PAGES.team     = soon("Équipe & parts",  "Répartition des parts entre collaborateurs et calcul automatique de chaque versement.");
PAGES.costs    = soon("Charges",         "Assets achetés, sous-traitance, outils : ce qui part avant que la marge n'arrive.");

/* ---------------- Routeur ---------------- */
const main = document.getElementById('main');
function go(page){
  main.innerHTML = (PAGES[page] || PAGES.dashboard)();
  main.scrollTop = 0;
  document.querySelectorAll('#nav .nav-item').forEach(b=>{
    b.toggleAttribute('aria-current', b.dataset.page===page);
    if(b.dataset.page===page) b.setAttribute('aria-current','page');
  });
}
document.getElementById('nav').addEventListener('click', e=>{
  const b = e.target.closest('.nav-item'); if(b) go(b.dataset.page);
});
main.addEventListener('click', e=>{
  const g = e.target.closest('[data-goto]'); if(g) go(g.dataset.goto);
  const f = e.target.closest('.filter');
  if(f){ f.parentElement.querySelectorAll('.filter').forEach(x=>x.setAttribute('aria-pressed','false')); f.setAttribute('aria-pressed','true'); }
});
go('dashboard');
</script>
</body>
</html>
